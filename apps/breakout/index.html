<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout — Becknology</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/bridge/js/shared/progression.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #1a0f1f; color: #fff; font-family: 'Courier New', Consolas, monospace; height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }

  /* ─────────── Cabinet (Breakout: candy / Lite-Brite) ─────────── */
  .cabinet {
    position: relative;
    width: min(720px, 98vw);
    background:
      linear-gradient(180deg, #fff5fb 0%, #fce4f0 35%, #f5d0e8 70%, #fff5fb 100%);
    border: 2px solid #ff8ec8;
    border-radius: 20px;
    padding: 14px;
    box-shadow:
      0 30px 70px rgba(255,142,200,0.35),
      0 0 30px rgba(255,210,90,0.25),
      inset 0 1px 0 rgba(255,255,255,0.9),
      inset 0 -2px 0 rgba(0,0,0,0.05);
  }
  /* candy polka-dot speckle */
  .cabinet::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 18% 10%, rgba(255,142,200,0.12) 4px, transparent 5px),
      radial-gradient(circle at 80% 22%, rgba(120,200,255,0.12) 3px, transparent 4px),
      radial-gradient(circle at 30% 88%, rgba(255,210,90,0.12) 5px, transparent 6px),
      radial-gradient(circle at 75% 70%, rgba(180,130,255,0.12) 3px, transparent 4px);
    background-repeat: repeat;
    background-size: 70px 70px, 90px 90px, 110px 110px, 80px 80px;
    border-radius: 20px;
  }

  .marquee {
    position: relative; height: 60px;
    background: linear-gradient(90deg, #ff6ec1 0%, #ff9354 16%, #ffd64a 33%, #6ed46a 50%, #5dc0e0 66%, #b78cff 83%, #ff6ec1 100%);
    border: 2px solid #fff;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    box-shadow:
      0 4px 16px rgba(255,142,200,0.3),
      inset 0 -3px 0 rgba(0,0,0,0.1),
      inset 0 2px 0 rgba(255,255,255,0.4);
  }
  .marquee-text {
    font-family: 'Courier New', monospace;
    font-size: 1.7rem;
    font-weight: bold;
    letter-spacing: 10px;
    color: #fff;
    text-shadow:
      2px 2px 0 #ff39c0,
      4px 4px 0 #5dc0e0,
      0 0 12px rgba(255,255,255,0.6);
  }

  .marquee-bulbs {
    position: absolute; top: 4px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; pointer-events: none;
  }
  .marquee-bulbs.bottom { top: auto; bottom: 4px; }
  .bulb { width: 7px; height: 7px; border-radius: 50%; }
  .bulb.b1 { background: #ff39c0; box-shadow: 0 0 6px #ff39c0; }
  .bulb.b2 { background: #ffd64a; box-shadow: 0 0 6px #ffd64a; }
  .bulb.b3 { background: #6ed46a; box-shadow: 0 0 6px #6ed46a; }
  .bulb.b4 { background: #5dc0e0; box-shadow: 0 0 6px #5dc0e0; }
  .bulb.b5 { background: #b78cff; box-shadow: 0 0 6px #b78cff; }
  .bulb.flicker { animation: bulb-flicker 4s steps(1) infinite; animation-delay: var(--d, 0s); }
  @keyframes bulb-flicker { 0%, 92%, 100% { opacity: 1; } 93%, 95% { opacity: 0.1; } 96% { opacity: 1; } }

  .cabinet-body {
    display: grid;
    grid-template-columns: 70px 1fr 70px;
    gap: 10px; margin: 12px 0;
  }

  .side-art {
    background: linear-gradient(180deg, #ff8ec8 0%, #ffd6e8 50%, #b3e5ff 100%);
    border: 2px solid #fff;
    border-radius: 10px;
    position: relative; overflow: hidden;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), inset 0 -2px 0 rgba(0,0,0,0.05);
  }
  /* repeating rainbow brick pattern */
  .side-art::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(0deg, transparent 50%, #ff6ec1 50%, #ff6ec1 60%, transparent 60%),
      linear-gradient(0deg, transparent 60%, #ffd64a 60%, #ffd64a 70%, transparent 70%),
      linear-gradient(0deg, transparent 70%, #6ed46a 70%, #6ed46a 80%, transparent 80%),
      linear-gradient(0deg, transparent 80%, #5dc0e0 80%, #5dc0e0 90%, transparent 90%),
      linear-gradient(0deg, transparent 90%, #b78cff 90%, #b78cff 100%, transparent 100%);
    opacity: 0.5;
    background-size: 20px 200px;
    background-repeat: repeat;
  }
  /* polka dots on side */
  .side-art::after {
    content: ''; position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 50% 8%, #fff 4px, transparent 5px),
      radial-gradient(circle at 30% 18%, #fff 3px, transparent 4px),
      radial-gradient(circle at 70% 28%, #fff 4px, transparent 5px),
      radial-gradient(circle at 40% 40%, #fff 3px, transparent 4px);
  }
  .side-label {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%) rotate(-90deg);
    transform-origin: center; transform: translateX(-50%) rotate(-90deg) translateY(40px);
    font-size: 0.55rem; letter-spacing: 4px; color: #ff39c0; font-weight: bold;
    white-space: nowrap; pointer-events: none;
    text-shadow: 1px 1px 0 #fff;
  }

  .screen-bezel {
    background: #1a0f1f;
    border: 8px solid #2d1838;
    border-radius: 14px;
    padding: 8px;
    box-shadow:
      inset 0 0 30px rgba(0,0,0,0.7),
      0 0 30px rgba(255,142,200,0.3);
    position: relative;
  }

  .stage { position: relative; width: 100%; aspect-ratio: 4/5; }
  canvas { width: 100%; height: 100%; display: block; background: #1a0f1f; cursor: none; }

  .hud {
    position: absolute; top: 10px; left: 14px; right: 14px;
    display: flex; justify-content: space-between;
    pointer-events: none; font-size: 13px;
    color: #ffd64a; letter-spacing: 2px;
    text-shadow: 0 0 6px #ffd64a, 1px 1px 0 #ff39c0;
    z-index: 2;
  }

  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(26,15,31,0.9); text-align: center; padding: 20px; z-index: 3;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 1.9rem; color: #fff; letter-spacing: 8px; margin-bottom: 0.5rem;
    text-shadow: 3px 3px 0 #ff39c0, 6px 6px 0 #5dc0e0, 0 0 12px rgba(255,255,255,0.5);
  }
  .overlay p { color: #d0c8e8; margin: 0.4rem 0; font-size: 0.85rem; letter-spacing: 1px; }
  .overlay .key { color: #ffd64a; text-shadow: 0 0 6px #ffd64a; }
  .overlay .new-best { color: #ffd64a; text-shadow: 0 0 12px #ffd64a; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  .stage::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 4;
    background: repeating-linear-gradient(transparent, transparent 3px, rgba(0,0,0,0.16) 3px, rgba(0,0,0,0.16) 4px);
    mix-blend-mode: multiply;
  }

  .back {
    position: absolute; bottom: 10px; left: 14px;
    color: #ff8ec8; font-size: 0.7rem; letter-spacing: 2px; text-decoration: none;
    pointer-events: auto; z-index: 5; text-shadow: 0 0 4px #ff39c0;
  }
  .back:hover { color: #ffd64a; }

  .control-panel {
    height: 44px;
    background: linear-gradient(180deg, #fff 0%, #fce4f0 100%);
    border: 2px solid #ff8ec8;
    border-radius: 12px;
    display: flex; align-items: center; padding: 0 18px; gap: 14px;
    font-family: 'Courier New', monospace;
    font-size: 0.7rem; color: #ff39c0; letter-spacing: 3px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
  }
  .control-panel .knob {
    width: 22px; height: 22px;
    border: 2px solid #fff;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff8ec8, #ff39c0);
    box-shadow: 0 2px 6px rgba(255,57,192,0.4), inset 0 -2px 0 rgba(0,0,0,0.15);
  }
  .control-panel .btn {
    padding: 4px 12px;
    border: 2px solid #fff;
    border-radius: 16px;
    color: #fff; font-size: 0.65rem; letter-spacing: 2px; font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15), inset 0 -2px 0 rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .control-panel .btn.pink { background: #ff39c0; }
  .control-panel .btn.yellow { background: #ffd64a; color: #ff39c0; }
  .control-panel .btn.cyan { background: #5dc0e0; }
  .control-panel .credit {
    margin-left: auto; color: #ff39c0; font-weight: bold;
    text-shadow: 1px 1px 0 #fff;
  }
  .control-panel .credit::before { content: '🍬'; margin-right: 6px; }

  @media (max-width: 700px) {
    body { padding: 6px; }
    .cabinet { padding: 8px; border-radius: 14px; }
    .cabinet-body { grid-template-columns: 0 1fr 0; gap: 0; }
    .side-art { display: none; }
    .marquee { height: 44px; }
    .marquee-text { font-size: 1.05rem; letter-spacing: 6px; }
    .control-panel { padding: 0 10px; gap: 8px; font-size: 0.6rem; }
    .control-panel .btn { padding: 3px 8px; }
  }
</style>
</head>
<body>

<div class="cabinet">
  <div class="marquee">
    <div class="marquee-bulbs">
      <span class="bulb b1"></span><span class="bulb b2"></span><span class="bulb b3"></span>
      <span class="bulb b4 flicker" style="--d: 0s"></span><span class="bulb b5"></span>
      <span class="bulb b1"></span><span class="bulb b2"></span>
      <span class="bulb b3 flicker" style="--d: 1.7s"></span>
      <span class="bulb b4"></span><span class="bulb b5"></span><span class="bulb b1"></span>
      <span class="bulb b2"></span>
    </div>
    <span class="marquee-text">BREAKOUT</span>
    <div class="marquee-bulbs bottom">
      <span class="bulb b5"></span><span class="bulb b4"></span><span class="bulb b3"></span>
      <span class="bulb b2"></span><span class="bulb b1"></span><span class="bulb b5"></span>
      <span class="bulb b4 flicker" style="--d: 2.3s"></span>
      <span class="bulb b3"></span><span class="bulb b2"></span><span class="bulb b1"></span>
      <span class="bulb b5"></span><span class="bulb b4"></span>
    </div>
  </div>

  <div class="cabinet-body">
    <div class="side-art">
      <span class="side-label">SUGAR · RUSH</span>
    </div>
    <div class="screen-bezel">
      <div class="stage">
        <canvas id="game"></canvas>
        <div class="hud">
          <span id="score">SCORE 0</span>
          <span id="combo"></span>
          <span id="level">LV 1</span>
          <span id="lives">♥♥♥</span>
        </div>
        <div class="overlay" id="overlay">
          <h1>BREAKOUT</h1>
          <p>MOVE WITH <span class="key">MOUSE</span> OR <span class="key">← →</span></p>
          <p>BREAK ALL BRICKS · CATCH POWER-UPS</p>
          <p style="color:#9080a0;font-size:0.75rem;margin-top:0.6rem;">P PAUSE · M MUTE · R RESTART</p>
          <p style="margin-top:1.2rem;color:#ffd64a;">CLICK OR PRESS SPACE TO LAUNCH</p>
        </div>
        <a class="back" href="/">← back</a>
      </div>
    </div>
    <div class="side-art">
      <span class="side-label">CANDY · TOWN</span>
    </div>
  </div>

  <div class="control-panel">
    <span class="knob"></span>
    <span class="btn pink">LAUNCH</span>
    <span class="btn yellow">CATCH</span>
    <span class="btn cyan">PAUSE</span>
    <span class="credit">1 CREDIT</span>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const levelEl = document.getElementById('level');
  const livesEl = document.getElementById('lives');
  const overlay = document.getElementById('overlay');

  let W = 0, H = 0;
  function resize() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.floor(rect.width);
    canvas.height = Math.floor(rect.height);
    W = canvas.width; H = canvas.height;
  }
  window.addEventListener('resize', resize);
  resize();

  // Audio
  let muted = localStorage.getItem('breakout-muted') === '1';
  let audioCtx = null;
  function ensureAudio() {
    if (audioCtx) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  function blip(freq, dur, type, vol) {
    if (!audioCtx || muted) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'square'; o.frequency.value = freq;
    g.gain.value = vol || 0.08;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  }
  function playBrickBreak(row) { blip(400 + row * 80, 0.08, 'square', 0.06); }
  function playPaddle() { blip(220, 0.06, 'sine', 0.07); }
  function playPowerup() { blip(880, 0.15, 'square', 0.08); setTimeout(() => blip(1320, 0.12, 'square', 0.06), 80); }
  function playLose() { blip(150, 0.4, 'sawtooth', 0.12); }
  function playLevel() { blip(523, 0.1, 'square'); setTimeout(() => blip(659, 0.1, 'square'), 100); setTimeout(() => blip(784, 0.18, 'square'), 200); }

  const ROWS = 6, COLS = 9;
  // Pastel candy palette
  const ROW_COLORS = ['#ff6ec1', '#ff9354', '#ffd64a', '#6ed46a', '#5dc0e0', '#b78cff'];
  const ROW_DARK = ['#cc3884', '#cc6630', '#cc9924', '#3da542', '#3092b3', '#7e54cf'];
  let paddle = { x: 0, w: 110, h: 14, wideTimer: 0 };
  let balls = [];
  let bricks = [];
  let powerups = [];
  let particles = [];
  let popups = [];
  let trail = [];
  let score = 0, lives = 3, level = 1, combo = 0, bestScore = parseInt(localStorage.getItem('breakout-best') || '0', 10);
  let state = 'menu';
  let mouseX = null;
  let leftDown = false, rightDown = false;
  let shake = 0;
  let levelIntroTimer = 0;
  let beatBest = false;

  function newLevel(lv) {
    bricks = [];
    const top = 70, pad = 7;
    const bw = (W - pad * (COLS + 1)) / COLS;
    const bh = 22;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        let hp = 1;
        if (lv >= 2 && Math.random() < 0.15 + (lv - 2) * 0.04) hp = 2;
        if (lv >= 4 && Math.random() < 0.05) hp = 3;
        bricks.push({
          x: pad + c * (bw + pad),
          y: top + r * (bh + pad),
          w: bw, h: bh,
          color: ROW_COLORS[r % ROW_COLORS.length],
          dark: ROW_DARK[r % ROW_DARK.length],
          alive: true, row: r, hp, maxHp: hp,
        });
      }
    }
  }

  function resetBall() {
    balls = [{
      x: paddle.x + paddle.w / 2,
      y: H - 60,
      vx: (Math.random() < 0.5 ? -1 : 1) * (3.5 + level * 0.2),
      vy: -(3.8 + level * 0.2),
      r: 7, stuck: true, hue: 0,
    }];
    combo = 0;
    updateHud();
  }

  function start() {
    ensureAudio();
    score = 0; lives = 3; level = 1; combo = 0; beatBest = false;
    paddle.w = 110; paddle.wideTimer = 0;
    paddle.x = W / 2 - paddle.w / 2;
    newLevel(level);
    resetBall();
    powerups = []; particles = []; popups = []; trail = [];
    state = 'ready';
    overlay.classList.add('hidden');
    updateHud();
  }

  function nextLevel() {
    level++;
    paddle.w = Math.max(70, paddle.w - 4);
    newLevel(level);
    resetBall();
    powerups = []; popups = [];
    state = 'levelIntro';
    levelIntroTimer = 90;
    playLevel();
    updateHud();
  }

  function updateHud() {
    scoreEl.textContent = 'SCORE ' + score;
    levelEl.textContent = 'LV ' + level;
    livesEl.textContent = lives > 0 ? '♥'.repeat(lives) : '—';
    comboEl.textContent = combo > 2 ? 'x' + combo : '';
  }

  function loseLife() {
    lives--;
    shake = 16;
    playLose();
    spawnParticles(paddle.x + paddle.w / 2, H - 30, '#ff6ec1', 16);
    updateHud();
    if (lives <= 0) {
      state = 'over';
      if (score > bestScore) { bestScore = score; beatBest = true; localStorage.setItem('breakout-best', String(bestScore)); }
      overlay.innerHTML = '<h1>GAME OVER</h1>' +
        '<p>SCORE <span class="key">' + score + '</span></p>' +
        '<p>LEVEL <span class="key">' + level + '</span></p>' +
        (beatBest ? '<p class="new-best">★ NEW BEST ★</p>' : '<p>BEST <span class="key">' + bestScore + '</span></p>') +
        '<p style="margin-top:1.5rem;color:#ffd64a;">CLICK OR PRESS SPACE TO RESTART</p>';
      overlay.classList.remove('hidden');
      // ---- Bridge progression ----
      if (typeof BridgeProgression !== 'undefined') {
        var coinsEarned = Math.floor(score / 20) + (beatBest ? 25 : 0);
        if (coinsEarned > 0) BridgeProgression.awardCoins(coinsEarned, 'breakout_game', { score: score, level: level });
        BridgeProgression.recordAchievement('first_light', 100, { game: 'breakout' });
        BridgeProgression.recordAchievement('played_breakout', 0, { score: score }).then(function () {
          BridgeProgression.maybeAwardCabinetCrusher();
        });
      }
    } else {
      resetBall();
      powerups = [];
      paddle.w = 110;
      paddle.wideTimer = 0;
      state = 'ready';
    }
  }

  function spawnParticles(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 1 + Math.random() * 3.5;
      // confetti colors mix in
      const colors = [color, '#ffd64a', '#5dc0e0', '#ff6ec1', '#6ed46a', '#fff'];
      particles.push({
        x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 28, color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI * 2, vrot: (Math.random() - 0.5) * 0.4,
      });
    }
  }

  function maybeDropPowerup(x, y) {
    if (Math.random() < 0.13) {
      const types = ['WIDE', 'MULTI', 'SLOW', 'LIFE'];
      const weights = [4, 4, 3, 1];
      let total = weights.reduce((a, b) => a + b, 0);
      let pick = Math.random() * total;
      let typeIdx = 0;
      for (let i = 0; i < weights.length; i++) {
        if (pick < weights[i]) { typeIdx = i; break; }
        pick -= weights[i];
      }
      powerups.push({ x, y, type: types[typeIdx], vy: 1.4, t: 0 });
    }
  }

  function applyPowerup(t) {
    playPowerup();
    if (t === 'WIDE') {
      paddle.w = Math.min(220, paddle.w + 40);
      paddle.wideTimer = 600;
      popups.push({ text: 'WIDE!', x: paddle.x + paddle.w / 2, y: H - 50, life: 40, vy: -1, color: '#5dc0e0' });
    } else if (t === 'MULTI') {
      const newBalls = [];
      for (const b of balls) {
        if (b.stuck) continue;
        for (let k = -1; k <= 1; k++) {
          const ang = Math.atan2(b.vy, b.vx) + k * 0.4;
          const speed = Math.hypot(b.vx, b.vy);
          newBalls.push({ x: b.x, y: b.y, vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed, r: 7, stuck: false, hue: 0 });
        }
      }
      if (newBalls.length) balls = newBalls;
      popups.push({ text: 'MULTI!', x: W / 2, y: H * 0.4, life: 50, vy: -0.6, color: '#ff6ec1' });
    } else if (t === 'SLOW') {
      for (const b of balls) { b.vx *= 0.75; b.vy *= 0.75; }
      popups.push({ text: 'SLOW!', x: paddle.x + paddle.w / 2, y: H - 50, life: 40, vy: -1, color: '#b78cff' });
    } else if (t === 'LIFE') {
      lives = Math.min(5, lives + 1);
      popups.push({ text: '+LIFE', x: paddle.x + paddle.w / 2, y: H - 50, life: 60, vy: -1, color: '#ff6ec1' });
      updateHud();
    }
  }

  function update() {
    if (state === 'menu' || state === 'over' || state === 'paused') {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.rot += p.vrot; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      shake *= 0.85;
      return;
    }
    if (state === 'levelIntro') {
      levelIntroTimer--;
      if (levelIntroTimer <= 0) state = 'ready';
      return;
    }

    const speed = 9;
    if (mouseX !== null) paddle.x = mouseX - paddle.w / 2;
    else {
      if (leftDown) paddle.x -= speed;
      if (rightDown) paddle.x += speed;
    }
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

    if (paddle.wideTimer > 0) {
      paddle.wideTimer--;
      if (paddle.wideTimer === 0) paddle.w = 110;
    }

    for (const b of balls) {
      if (!b.stuck) {
        b.hue = (b.hue + 6) % 360;
        trail.push({ x: b.x, y: b.y, life: 14, hue: b.hue });
      }
    }
    while (trail.length > 100) trail.shift();
    for (let i = trail.length - 1; i >= 0; i--) { trail[i].life--; if (trail[i].life <= 0) trail.splice(i, 1); }

    for (let i = balls.length - 1; i >= 0; i--) {
      const b = balls[i];
      if (b.stuck) {
        b.x = paddle.x + paddle.w / 2;
        b.y = H - 32 - b.r;
        continue;
      }
      b.x += b.vx; b.y += b.vy;

      if (b.x < b.r) { b.x = b.r; b.vx *= -1; blip(180, 0.04, 'square', 0.04); }
      else if (b.x > W - b.r) { b.x = W - b.r; b.vx *= -1; blip(180, 0.04, 'square', 0.04); }
      if (b.y < b.r) { b.y = b.r; b.vy *= -1; blip(180, 0.04, 'square', 0.04); }

      if (Math.abs(b.vy) < 0.6) b.vy += b.vy >= 0 ? 0.3 : -0.3;

      if (b.vy > 0 && b.y + b.r > H - 30 && b.y < H - 18 &&
          b.x > paddle.x && b.x < paddle.x + paddle.w) {
        b.y = H - 30 - b.r;
        const hit = (b.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        const speed = Math.min(8.5, Math.hypot(b.vx, b.vy) * 1.02);
        const ang = hit * (Math.PI / 3);
        b.vx = Math.sin(ang) * speed;
        b.vy = -Math.cos(ang) * speed;
        playPaddle();
        combo = 0;
        updateHud();
      }

      for (const br of bricks) {
        if (!br.alive) continue;
        if (b.x + b.r > br.x && b.x - b.r < br.x + br.w &&
            b.y + b.r > br.y && b.y - b.r < br.y + br.h) {
          const overlapL = (b.x + b.r) - br.x;
          const overlapR = (br.x + br.w) - (b.x - b.r);
          const overlapT = (b.y + b.r) - br.y;
          const overlapB = (br.y + br.h) - (b.y - b.r);
          const minOv = Math.min(overlapL, overlapR, overlapT, overlapB);
          if (minOv === overlapT || minOv === overlapB) b.vy *= -1;
          else b.vx *= -1;
          br.hp--;
          if (br.hp <= 0) {
            br.alive = false;
            combo++;
            const baseScore = 10 + br.row * 2;
            const gain = baseScore * (1 + Math.floor(combo / 5));
            score += gain;
            spawnParticles(br.x + br.w / 2, br.y + br.h / 2, br.color, 12);
            if (combo >= 5 && combo % 5 === 0) {
              popups.push({ text: 'x' + Math.floor(combo / 5 + 1) + ' COMBO', x: br.x + br.w / 2, y: br.y, life: 35, vy: -0.8, color: '#ffd64a' });
            }
            maybeDropPowerup(br.x + br.w / 2, br.y + br.h / 2);
            shake = 4;
          } else {
            spawnParticles(br.x + br.w / 2, br.y + br.h / 2, br.color, 4);
            shake = 2;
          }
          playBrickBreak(br.row);
          updateHud();
          break;
        }
      }

      if (b.y - b.r > H) balls.splice(i, 1);
    }

    if (balls.length === 0) loseLife();

    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.y += p.vy;
      p.t += 0.15;
      if (p.y > H - 30 && p.y < H - 14 && p.x > paddle.x && p.x < paddle.x + paddle.w) {
        applyPowerup(p.type);
        powerups.splice(i, 1);
        continue;
      }
      if (p.y > H) powerups.splice(i, 1);
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.rot += p.vrot; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    for (let i = popups.length - 1; i >= 0; i--) {
      const p = popups[i];
      p.y += p.vy; p.life--;
      if (p.life <= 0) popups.splice(i, 1);
    }

    shake *= 0.85;

    if (bricks.every(b => !b.alive)) {
      score += 100 * level;
      updateHud();
      nextLevel();
    }
  }

  function draw() {
    const sx = (Math.random() - 0.5) * shake;
    const sy = (Math.random() - 0.5) * shake;
    ctx.save();
    ctx.translate(sx, sy);

    // dreamy pastel gradient bg
    const t = performance.now() / 8000;
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#3d1f4f');
    grad.addColorStop(0.5, '#2d1838');
    grad.addColorStop(1, '#1a0f1f');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // soft floating sparkles in bg
    for (let i = 0; i < 20; i++) {
      const x = (i * 73 + t * 200) % W;
      const y = (i * 91 + Math.sin(t * 6 + i) * 10) % H;
      const a = 0.15 + Math.sin(t * 4 + i) * 0.1;
      ctx.fillStyle = 'rgba(255,200,240,' + a + ')';
      ctx.fillRect(x, y, 2, 2);
    }

    // bricks — chunky pastel with neon piping
    for (const br of bricks) {
      if (!br.alive) continue;
      const hpRatio = br.hp / br.maxHp;
      // body fill
      const grad = ctx.createLinearGradient(br.x, br.y, br.x, br.y + br.h);
      grad.addColorStop(0, br.color);
      grad.addColorStop(1, br.dark);
      ctx.globalAlpha = 0.35 + hpRatio * 0.65;
      ctx.fillStyle = grad;
      ctx.fillRect(br.x + 1, br.y + 1, br.w - 2, br.h - 2);
      ctx.globalAlpha = 1;
      // sheen
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(br.x + 2, br.y + 2, br.w - 4, 3);
      // outer neon outline
      ctx.strokeStyle = br.color;
      ctx.lineWidth = 1.5;
      ctx.shadowColor = br.color;
      ctx.shadowBlur = 6;
      ctx.strokeRect(br.x + 0.5, br.y + 0.5, br.w - 1, br.h - 1);
      ctx.shadowBlur = 0;
      // hp dots
      if (br.maxHp > 1) {
        ctx.fillStyle = '#fff';
        for (let h = 0; h < br.hp; h++) {
          ctx.fillRect(br.x + 5 + h * 4, br.y + 6, 2, 2);
        }
      }
    }

    // ball trail (rainbow comet)
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const a = t.life / 14;
      ctx.fillStyle = 'hsl(' + t.hue + ',90%,65%)';
      ctx.shadowColor = 'hsl(' + t.hue + ',90%,65%)';
      ctx.shadowBlur = 8 * a;
      ctx.globalAlpha = a * 0.8;
      const sz = 8 * a;
      ctx.beginPath();
      ctx.arc(t.x, t.y, sz, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // confetti particles (squares with rotation)
    for (const p of particles) {
      const a = p.life / 28;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a;
      ctx.fillRect(-2, -3, 4, 6);
      ctx.restore();
    }
    ctx.globalAlpha = 1;

    // powerups (rounded candy capsules)
    for (const p of powerups) {
      const colors = { WIDE: '#5dc0e0', MULTI: '#ff6ec1', SLOW: '#b78cff', LIFE: '#ff3a55' };
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Math.sin(p.t) * 0.15);
      ctx.fillStyle = colors[p.type];
      ctx.shadowColor = colors[p.type];
      ctx.shadowBlur = 14;
      // rounded rect
      const w = 38, h = 18, r = 9;
      ctx.beginPath();
      ctx.moveTo(-w/2 + r, -h/2);
      ctx.lineTo(w/2 - r, -h/2);
      ctx.arcTo(w/2, -h/2, w/2, -h/2 + r, r);
      ctx.lineTo(w/2, h/2 - r);
      ctx.arcTo(w/2, h/2, w/2 - r, h/2, r);
      ctx.lineTo(-w/2 + r, h/2);
      ctx.arcTo(-w/2, h/2, -w/2, h/2 - r, r);
      ctx.lineTo(-w/2, -h/2 + r);
      ctx.arcTo(-w/2, -h/2, -w/2 + r, -h/2, r);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      // sheen
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(-w/2 + 4, -h/2 + 2, w - 8, 3);
      // text
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px "Courier New"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.type, 0, 1);
      ctx.restore();
    }

    // paddle (glossy chrome with rainbow underglow)
    ctx.shadowColor = 'rgba(255,142,200,0.7)';
    ctx.shadowBlur = 18;
    const pg = ctx.createLinearGradient(paddle.x, H - 30, paddle.x, H - 30 + paddle.h);
    pg.addColorStop(0, '#ffffff');
    pg.addColorStop(0.5, '#ffd6e8');
    pg.addColorStop(1, '#ff8ec8');
    ctx.fillStyle = pg;
    ctx.fillRect(paddle.x, H - 30, paddle.w, paddle.h);
    ctx.shadowBlur = 0;
    // rainbow piping
    const stripeW = paddle.w / 6;
    const stripeColors = ['#ff6ec1', '#ff9354', '#ffd64a', '#6ed46a', '#5dc0e0', '#b78cff'];
    for (let i = 0; i < 6; i++) {
      ctx.fillStyle = stripeColors[i];
      ctx.fillRect(paddle.x + i * stripeW, H - 30 + paddle.h - 3, stripeW, 3);
    }
    // sheen
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillRect(paddle.x + 2, H - 28, paddle.w - 4, 2);
    if (paddle.wideTimer > 0 && paddle.wideTimer < 120 && Math.floor(paddle.wideTimer / 6) % 2 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(paddle.x, H - 30, paddle.w, paddle.h);
    }

    // balls (glowing with rainbow halo)
    for (const b of balls) {
      ctx.save();
      ctx.fillStyle = 'hsl(' + b.hue + ',90%,75%)';
      ctx.shadowColor = 'hsl(' + b.hue + ',90%,65%)';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(b.x - 2, b.y - 2, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // popups
    for (const p of popups) {
      ctx.globalAlpha = Math.min(1, p.life / 30);
      ctx.fillStyle = p.color;
      ctx.font = 'bold 18px "Courier New"';
      ctx.textAlign = 'center';
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      ctx.fillText(p.text, p.x, p.y);
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    if (state === 'levelIntro') {
      ctx.fillStyle = 'rgba(26,15,31,0.85)';
      ctx.fillRect(0, H * 0.4, W, H * 0.2);
      ctx.fillStyle = '#ffd64a';
      ctx.font = 'bold 32px "Courier New"';
      ctx.textAlign = 'center';
      ctx.shadowColor = '#ff39c0'; ctx.shadowBlur = 12;
      ctx.fillText('LEVEL ' + level, W / 2, H * 0.5);
      ctx.shadowBlur = 0;
      ctx.font = '12px "Courier New"';
      ctx.fillStyle = '#ff8ec8';
      ctx.fillText('GET READY!', W / 2, H * 0.5 + 24);
    }

    if (state === 'paused') {
      ctx.fillStyle = 'rgba(26,15,31,0.7)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ffd64a';
      ctx.font = 'bold 32px "Courier New"';
      ctx.textAlign = 'center';
      ctx.shadowColor = '#ff39c0'; ctx.shadowBlur = 14;
      ctx.fillText('PAUSED', W / 2, H / 2);
      ctx.shadowBlur = 0;
      ctx.font = '12px "Courier New"';
      ctx.fillStyle = '#ff8ec8';
      ctx.fillText('PRESS P TO RESUME', W / 2, H / 2 + 26);
    }

    if (muted) {
      ctx.fillStyle = '#ff39c0';
      ctx.font = '11px "Courier New"';
      ctx.textAlign = 'right';
      ctx.fillText('MUTED', W - 14, H - 14);
    }

    ctx.restore();
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  function launch() {
    if (state === 'menu' || state === 'over') { start(); return; }
    if (state === 'ready') {
      for (const b of balls) b.stuck = false;
      state = 'play';
    }
  }

  window.addEventListener('keydown', e => {
    if (e.key === 'm' || e.key === 'M') { muted = !muted; localStorage.setItem('breakout-muted', muted ? '1' : '0'); return; }
    if (e.key === 'p' || e.key === 'P') {
      if (state === 'play') state = 'paused';
      else if (state === 'paused') state = 'play';
      return;
    }
    if (e.key === 'r' || e.key === 'R') { if (state !== 'menu') start(); return; }
    if (e.code === 'Space') { e.preventDefault(); launch(); }
    if (e.key === 'ArrowLeft') { leftDown = true; mouseX = null; }
    if (e.key === 'ArrowRight') { rightDown = true; mouseX = null; }
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft') leftDown = false;
    if (e.key === 'ArrowRight') rightDown = false;
  });
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (W / rect.width);
  });
  canvas.addEventListener('mousedown', launch);
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    mouseX = (t.clientX - rect.left) * (W / rect.width);
    launch();
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    mouseX = (t.clientX - rect.left) * (W / rect.width);
  }, { passive: false });
  overlay.addEventListener('click', e => {
    if (e.target.tagName === 'A') return;
    if (state === 'menu' || state === 'over') start();
  });
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && state === 'play') state = 'paused';
  });

  paddle.x = W / 2 - paddle.w / 2;
  loop();
})();
</script>
</body>
</html>
