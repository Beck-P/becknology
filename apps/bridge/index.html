<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Bridge — Becknology</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/bridge/css/bridge.css">
</head>
<body>
  <!-- Main canvas — starfield, cockpit windshield, star map, hyperspace all render here -->
  <canvas id="bridge-canvas"></canvas>

  <!-- DOM overlays — shown/hidden by state machine -->
  <div id="intro-overlay" class="overlay"></div>
  <div id="identity-overlay" class="overlay" style="display:none;"></div>
  <div id="cockpit-overlay" class="overlay" style="display:none;"></div>
  <div id="starmap-overlay" class="overlay" style="display:none;"></div>
  <div id="selection-overlay" class="overlay" style="display:none;"></div>
  <div id="world-overlay" class="overlay" style="display:none;"></div>
  <div id="landing-overlay" class="overlay" style="display:none;"></div>

  <!-- Mobile d-pad -->
  <div id="dpad" class="dpad" style="display:none;">
    <button class="dpad-btn dpad-up">&#9650;</button>
    <button class="dpad-btn dpad-left">&#9664;</button>
    <button class="dpad-btn dpad-right">&#9654;</button>
    <button class="dpad-btn dpad-down">&#9660;</button>
    <button class="dpad-btn dpad-action">A</button>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Bridge modules (order matters — dependencies first) -->
  <script src="/bridge/js/db.js"></script>
  <script src="/bridge/js/state.js"></script>
  <script src="/bridge/js/starfield.js"></script>
  <script src="/bridge/js/intro.js"></script>
  <script src="/bridge/js/identity.js"></script>
  <script src="/bridge/js/cockpit.js"></script>
  <script src="/bridge/js/starmap.js"></script>
  <script src="/bridge/js/controls.js"></script>
  <script src="/bridge/js/character.js"></script>
  <script src="/bridge/js/world.js"></script>
  <script src="/bridge/js/worlds/arcadia.js"></script>
  <script src="/bridge/js/worlds/singularity.js"></script>
  <script src="/bridge/js/worlds/enigma.js"></script>
  <script src="/bridge/js/worlds/lumar.js"></script>
  <script src="/bridge/js/interactions.js"></script>
  <script src="/bridge/js/landing.js"></script>
  <script src="/bridge/js/hyperspace.js"></script>
  <script src="/bridge/js/main.js"></script>
</body>
</html>
