// ============================================================
// PARTICLES
// ============================================================
function addP(type, x, y, data) {
  particles.push({ type, x, y, life: 1, age: 0, vx: 0, vy: 0, maxLife: 3000, ...data });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age += dt; p.life -= dt / p.maxLife;
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.type === 'leaf') p.x += Math.sin(p.age * 0.002 + (p.seed || 0)) * 0.3;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    const a = Math.min(1, p.life * 2);
    ctx.globalAlpha = a;
    if (p.type === 'leaf') {
      ctx.fillStyle = p.color || '#FF8C42';
      ctx.fillRect(p.x, p.y, 4, 3);
    } else if (p.type === 'sparkle') {
      ctx.fillStyle = p.color || '#FFD700';
      ctx.globalAlpha = a * (0.4 + 0.6 * Math.sin(p.age * 0.008));
      ctx.fillRect(p.x, p.y, 2, 2);
    } else if (p.type === 'magic') {
      ctx.fillStyle = p.color || '#A78BFA';
      ctx.globalAlpha = a * (0.3 + 0.7 * Math.sin(p.age * 0.004));
      const sz = 2 + Math.sin(p.age * 0.003);
      ctx.fillRect(p.x, p.y, sz, sz);
    }
  });
  ctx.globalAlpha = 1;
}

function emitParticles(scene) {
  const { W, H } = G;
  if (!scene) return;
  const bg = scene.bg;
  if (bg === 'autumn') {
    const cols = ['#FF6B35','#FFD700','#DC2626','#FF8C42'];
    addP('leaf', Math.random() * W, -5, { vy: 0.025 + Math.random() * 0.015,
      color: cols[Math.floor(Math.random() * cols.length)], seed: Math.random() * 99, maxLife: 5000 });
  } else if (bg === 'ship' || bg === 'shipFull' || bg === 'shipBattle' || bg === 'shore' || bg === 'openWater' || bg === 'shipBelow' || bg === 'seaCrossing') {
    const wt = scene.waterType || 'emerald';
    const c = wt === 'midnight' ? '#3B82F6' : wt === 'crimson' ? '#F87171' : '#A7F3D0';
    addP('sparkle', Math.random() * W, H * 0.3 + Math.random() * H * 0.15, { vy: 0.005, color: c, maxLife: 3000 });
  } else if (bg === 'lakeSunset') {
    addP('sparkle', Math.random() * W, Math.random() * H * 0.25, { vy: 0.003, color: '#FFD700', maxLife: 4000 });
  } else if (bg === 'tower' || bg === 'towerTop') {
    const cols = ['#A78BFA','#C084FC','#34D399'];
    addP('magic', W * 0.1 + Math.random() * W * 0.8, H, {
      vy: -0.025 - Math.random() * 0.015, vx: (Math.random() - 0.5) * 0.008,
      color: cols[Math.floor(Math.random() * cols.length)], maxLife: 4000 });
  } else if (bg === 'ending') {
    const cols = ['#FFD700','#A7F3D0','#A78BFA','#F5A0C0'];
    addP('sparkle', Math.random() * W, Math.random() * H, {
      vy: -0.005, color: cols[Math.floor(Math.random() * cols.length)], maxLife: 5000 });
  }
}

// ============================================================
// GAME ENGINE
// ============================================================
function resize() {
  const sw = window.innerWidth, sh = window.innerHeight;
  // Low-res pixel art canvas — CSS scales it up with pixelated rendering
  const short = Math.min(sw, sh);
  const scale = short < 600 ? 2 : 3;
  G.W = Math.ceil(sw / scale);
  G.H = Math.ceil(sh / scale);
  canvas.width = G.W; canvas.height = G.H;
  canvas.style.width = sw + 'px';
  canvas.style.height = sh + 'px';
}

function loadScene(idx) {
  G.sceneIdx = idx; G.dIdx = 0; G.charIdx = 0; G.charTimer = 0;
  G.textDone = false; G.phase = 'dialogue'; G.mg = null;
  particles.length = 0;
  const scene = scenes[idx];
  if (scene.music) audio.playMusic(scene.music);
  if (scene.init) scene.init();
  document.getElementById('skip').style.display = 'block';
  showDialogue();
}

function showDialogue() {
  const scene = scenes[G.sceneIdx];
  if (!scene || G.dIdx >= scene.dialogue.length) {
    if (G.sceneIdx < scenes.length - 1) transitionTo(G.sceneIdx + 1);
    else showEnding();
    return;
  }
  const d = scene.dialogue[G.dIdx];

  // Handle actions
  if (d.action === 'choice') { showChoices(d); return; }
  if (d.action === 'minigame') { startMinigame(d); return; }
  if (d.action === 'end') { showEnding(); return; }

  // Normal dialogue line
  $dbox.style.display = 'block'; $choices.style.display = 'none';
  const sp = SPEAKER_COLORS[d.s] || SPEAKER_COLORS.n;
  $speaker.textContent = sp.name; $speaker.style.color = sp.color;
  $text.textContent = ''; G.charIdx = 0; G.textDone = false;
  $hint.style.opacity = '0';
  if (d.onShow) d.onShow();
}

function advanceDialogue() {
  if (G.state !== 'playing' || G.phase !== 'dialogue') return;
  const d = scenes[G.sceneIdx]?.dialogue[G.dIdx];
  if (!d) return;
  if (G.textDone) {
    audio.sfx('tap'); G.dIdx++; showDialogue();
  } else {
    $text.textContent = d.t; G.textDone = true; G.charIdx = d.t.length;
    $hint.style.opacity = '1';
  }
}

function showChoices(d) {
  G.phase = 'choice';
  $dbox.style.display = 'none';
  $choices.style.display = 'flex';
  $choices.innerHTML = '';
  if (d.prompt) {
    const p = document.createElement('div');
    p.className = 'ch-prompt'; p.textContent = d.prompt;
    $choices.appendChild(p);
  }
  d.choices.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'ch-btn'; btn.textContent = ch.text;
    btn.onclick = () => {
      audio.sfx('sparkle'); $choices.style.display = 'none';
      if (d.onChoice) d.onChoice(i);
      G.dIdx++; G.phase = 'dialogue'; showDialogue();
    };
    $choices.appendChild(btn);
  });
}

function transitionTo(idx) {
  G.state = 'transition';
  $dbox.style.display = 'none'; $choices.style.display = 'none'; $mgui.style.display = 'none';
  $fade.style.opacity = '1';
  setTimeout(() => {
    loadScene(idx);
    setTimeout(() => { $fade.style.opacity = '0'; G.state = 'playing'; }, 350);
  }, 550);
}

function showEnding() {
  G.state = 'ending';
  audio.playMusic('victory');
  $dbox.style.display = 'none'; $choices.style.display = 'none';
  setTimeout(() => { $ending.style.display = 'flex'; $ending.style.opacity = '1'; }, 1200);
}

// ============================================================
// MINIGAMES
// ============================================================
function startMinigame(d) {
  G.phase = 'minigame';
  G.mg = { type: d.game, data: d.data, done: false };
  $dbox.style.display = 'none'; $mgui.style.display = 'block';

  if (d.game === 'quiz') initQuiz(d.data);
  else if (d.game === 'timeloop') initTimeLoop(d.data);
  else if (d.game === 'navigate') initNavigation(d.data);
  else if (d.game === 'memory') initMemory(d.data);
  else if (d.game === 'timing') initTiming(d.data);
}

function endMinigame() {
  $mgui.style.display = 'none'; $mgui.innerHTML = '<div id="mghud"></div>';
  G.mg = null; G.dIdx++; G.phase = 'dialogue';
  showDialogue();
}

// --- Quiz ---
function initQuiz(data) {
  let qIdx = 0;
  function show() {
    if (qIdx >= data.questions.length) { audio.sfx('success'); endMinigame(); return; }
    const q = data.questions[qIdx];
    $mgui.innerHTML = `<div id="mghud">${data.hudText || ''}</div>`;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:fixed;bottom:0;left:0;right:0;padding:14px 16px 28px;background:rgba(8,8,20,0.92);border-top:1px solid rgba(167,243,208,0.1)';
    const qt = document.createElement('p');
    qt.style.cssText = 'color:#f0e6d3;font-size:15px;line-height:1.5;margin-bottom:14px;font-family:Georgia,serif';
    qt.textContent = q.question; wrap.appendChild(qt);
    q.options.forEach((opt, i) => {
      const b = document.createElement('button'); b.className = 'ch-btn'; b.textContent = opt;
      b.onclick = () => {
        if (i === q.answer) { audio.sfx('success'); qIdx++; show(); }
        else { audio.sfx('fail'); b.style.borderColor = '#F87171'; b.style.opacity = '0.5';
          setTimeout(() => { b.style.borderColor = ''; b.style.opacity = ''; }, 400); }
      };
      wrap.appendChild(b);
    });
    $mgui.appendChild(wrap);
  }
  show();
}

// --- Time Loop ---
function initTimeLoop(data) {
  let loopN = 0;
  function show() {
    const loop = data.loops[Math.min(loopN, data.loops.length - 1)];
    $mgui.innerHTML = `<div id="mghud">${data.hudText || 'Break the loop!'}</div>`;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:fixed;bottom:0;left:0;right:0;padding:14px 16px 28px;background:rgba(8,8,20,0.92);border-top:1px solid rgba(167,243,208,0.1)';
    const qt = document.createElement('p');
    qt.style.cssText = 'color:#f0e6d3;font-size:15px;line-height:1.5;margin-bottom:8px;font-family:Georgia,serif';
    qt.textContent = loop.prompt; wrap.appendChild(qt);
    if (loop.beckLine) {
      const bl = document.createElement('p');
      bl.style.cssText = 'color:#A8D8EA;font-size:13px;font-style:italic;margin-bottom:14px';
      bl.textContent = `Beck-rat: "${loop.beckLine}"`; wrap.appendChild(bl);
    }
    loop.options.forEach(opt => {
      const b = document.createElement('button'); b.className = 'ch-btn'; b.textContent = opt.text;
      b.onclick = () => {
        if (opt.correct) { audio.sfx('success'); endMinigame(); }
        else {
          audio.sfx('fail'); loopN++;
          $fade.style.opacity = '0.7';
          setTimeout(() => { $fade.style.opacity = '0'; show(); }, 350);
        }
      };
      wrap.appendChild(b);
    });
    $mgui.appendChild(wrap);
  }
  show();
}

// --- Navigation (Midnight Sea) ---
function initNavigation(data) {
  G.mg.nav = { lane: 1, obs: [], score: 0, target: data.target || 8, spT: 0, shipY: G.H * 0.55 };
  $mgui.innerHTML = `<div id="mghud">Navigate: 0/${G.mg.nav.target}</div>
    <div style="position:fixed;bottom:16px;left:16px;right:16px;display:flex;gap:10px">
      <button class="ch-btn" style="flex:1;text-align:center;padding:22px;font-size:20px" onclick="navMove(-1)">◀</button>
      <button class="ch-btn" style="flex:1;text-align:center;padding:22px;font-size:20px" onclick="navMove(1)">▶</button>
    </div>`;
}
window.navMove = function(dir) {
  if (!G.mg?.nav) return;
  const n = G.mg.nav;
  n.lane = Math.max(0, Math.min(2, n.lane + dir));
  audio.sfx('tap');
};

function updateNav(dt) {
  if (!G.mg?.nav) return;
  const n = G.mg.nav;
  n.spT += dt;
  if (n.spT > 900) {
    n.spT = 0;
    n.obs.push({ lane: Math.floor(Math.random() * 3), y: -20,
      type: ['tentacle','shadow','spore'][Math.floor(Math.random() * 3)] });
  }
  for (let i = n.obs.length - 1; i >= 0; i--) {
    const o = n.obs[i]; o.y += dt * 0.18;
    if (o.y > n.shipY - 15 && o.y < n.shipY + 15 && o.lane === n.lane) {
      n.obs.splice(i, 1); audio.sfx('fail');
    } else if (o.y > G.H + 20) {
      n.obs.splice(i, 1); n.score++;
      document.getElementById('mghud').textContent = `Navigate: ${n.score}/${n.target}`;
      if (n.score >= n.target) { audio.sfx('success'); endMinigame(); }
    }
  }
}

function drawNav() {
  if (!G.mg?.nav) return;
  const { W, H } = G; const n = G.mg.nav; const lw = W / 3;
  // Lane highlight
  ctx.fillStyle = 'rgba(167,243,208,0.06)';
  ctx.fillRect(n.lane * lw, 0, lw, H);
  // Ship
  const sx = n.lane * lw + lw / 2;
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(sx - 10, n.shipY - 6, 20, 12);
  ctx.fillStyle = '#FFF8E7';
  ctx.beginPath(); ctx.moveTo(sx, n.shipY - 16); ctx.lineTo(sx + 8, n.shipY - 6); ctx.lineTo(sx, n.shipY - 3); ctx.fill();
  // Obstacles
  n.obs.forEach(o => {
    const ox = o.lane * lw + lw / 2;
    if (o.type === 'tentacle') {
      ctx.fillStyle = '#4B0082';
      for (let j = 0; j < 3; j++) ctx.fillRect(ox + Math.sin(o.y * 0.05 + j) * 6 - 3, o.y + j * 5, 5, 4);
    } else if (o.type === 'shadow') {
      ctx.fillStyle = 'rgba(20,0,40,0.7)';
      ctx.beginPath(); ctx.arc(ox, o.y, 12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#FF3333'; ctx.fillRect(ox - 3, o.y - 2, 2, 2); ctx.fillRect(ox + 1, o.y - 2, 2, 2);
    } else {
      ctx.fillStyle = '#7B68EE';
      for (let j = 0; j < 4; j++) {
        const a = (j / 4) * Math.PI * 2 + o.y * 0.02;
        ctx.fillRect(ox + Math.cos(a) * 8, o.y + Math.sin(a) * 8, 3, 3);
      }
    }
  });
}

// --- Memory Fragments ---
function initMemory(data) {
  let step = 0;
  function show() {
    $mgui.innerHTML = `<div id="mghud">Tap the memories in order... (${step}/${data.order.length})</div>`;
    const grid = document.createElement('div');
    grid.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px;width:min(92vw,360px)';
    data.fragments.forEach((frag, i) => {
      const b = document.createElement('button'); b.className = 'ch-btn';
      b.style.cssText = `text-align:center;padding:18px 12px;min-height:70px;font-size:14px;${frag.done ? 'opacity:0.25;border-color:#34D399;' : ''}`;
      b.textContent = frag.label;
      if (!frag.done) {
        b.onclick = () => {
          if (data.order[step] === i) {
            audio.sfx('sparkle'); frag.done = true; step++;
            if (step >= data.order.length) {
              audio.sfx('magic'); setTimeout(endMinigame, 500);
            } else show();
          } else {
            audio.sfx('fail'); b.style.borderColor = '#F87171';
            setTimeout(() => { b.style.borderColor = ''; }, 400);
          }
        };
      }
      grid.appendChild(b);
    });
    $mgui.appendChild(grid);
  }
  show();
}

// --- Timing (Dock Stealth) ---
function initTiming(data) {
  G.mg.timing = { gx: 0, gdir: 1, gspd: 0.12, progress: 0, target: data.target || 3, safe: false, cd: 0 };
  $mgui.innerHTML = `<div id="mghud">Sneak past when the guard looks away!</div>
    <div id="timing-status" style="position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);
      font-size:clamp(22px,6vw,32px);font-weight:bold;font-family:-apple-system,sans-serif;
      text-shadow:0 2px 12px rgba(0,0,0,0.8);pointer-events:none;transition:color 0.2s"></div>
    <div style="position:fixed;bottom:0;left:0;right:0;padding:14px 16px 28px;
      background:rgba(8,8,20,0.92);border-top:1px solid rgba(167,243,208,0.1)">
      <div id="timing-dots" style="text-align:center;margin-bottom:10px;font-size:18px;letter-spacing:4px"></div>
      <button id="sneak-btn" style="display:block;width:100%;padding:22px;border-radius:14px;
        border:2px solid rgba(248,113,113,0.3);background:rgba(248,113,113,0.12);
        color:#f0e6d3;font-size:clamp(17px,4.5vw,22px);font-family:Georgia,serif;
        cursor:pointer;transition:all 0.15s">SNEAK</button>
    </div>`;
  document.getElementById('sneak-btn').addEventListener('click', function() {
    if (!G.mg?.timing) return;
    const tm = G.mg.timing;
    if (tm.cd > 0) return;
    const btn = document.getElementById('sneak-btn');
    const status = document.getElementById('timing-status');
    if (tm.safe) {
      audio.sfx('success'); tm.progress++; tm.cd = 400;
      if (btn) { btn.textContent = 'SNEAKED!'; btn.style.background = 'rgba(52,211,153,0.25)'; btn.style.borderColor = '#34D399'; }
      if (status) { status.textContent = 'NICE!'; status.style.color = '#34D399'; }
      updateTimingDots();
      if (tm.progress >= tm.target) { setTimeout(endMinigame, 400); }
      else { setTimeout(() => { if (btn) { btn.textContent = 'SNEAK'; btn.style.background = ''; btn.style.borderColor = ''; } }, 350); }
    } else {
      audio.sfx('fail'); tm.cd = 700;
      if (btn) { btn.textContent = 'SPOTTED!'; btn.style.background = 'rgba(248,113,113,0.25)'; btn.style.borderColor = '#F87171'; }
      if (status) { status.textContent = 'SPOTTED!'; status.style.color = '#F87171'; }
      setTimeout(() => { if (btn) { btn.textContent = 'SNEAK'; btn.style.background = ''; btn.style.borderColor = ''; } }, 600);
    }
  });
  updateTimingDots();
}
function updateTimingDots() {
  const dots = document.getElementById('timing-dots');
  const tm = G.mg?.timing;
  if (!dots || !tm) return;
  let h = '';
  for (let i = 0; i < tm.target; i++) h += i < tm.progress ? '● ' : '○ ';
  dots.innerHTML = `<span style="color:#34D399">${h.trim()}</span>`;
}

function updateTiming(dt) {
  if (!G.mg?.timing) return;
  const tm = G.mg.timing;
  tm.gx += tm.gdir * tm.gspd * dt;
  if (tm.gx > 100) { tm.gdir = -1; tm.safe = true; }
  if (tm.gx < 0) { tm.gdir = 1; tm.safe = false; }
  if (tm.cd > 0) tm.cd -= dt;
  // Update live status indicator
  const status = document.getElementById('timing-status');
  const btn = document.getElementById('sneak-btn');
  if (tm.cd <= 0 && status) {
    status.textContent = tm.safe ? 'GO NOW!' : 'WAIT...';
    status.style.color = tm.safe ? '#34D399' : '#F87171';
  }
  if (tm.cd <= 0 && btn) {
    btn.style.background = tm.safe ? 'rgba(52,211,153,0.12)' : 'rgba(248,113,113,0.12)';
    btn.style.borderColor = tm.safe ? 'rgba(52,211,153,0.3)' : 'rgba(248,113,113,0.3)';
  }
}

function drawTiming() {
  if (!G.mg?.timing) return;
  const { W, H } = G; const tm = G.mg.timing;
  const gx = W * 0.15 + (tm.gx / 100) * W * 0.7;
  drawConnor(gx, H * 0.56, tm.gdir, G.t);
  // Safe zone tint
  if (tm.safe) {
    ctx.fillStyle = 'rgba(52,211,153,0.06)'; ctx.fillRect(0, 0, W, H);
  }
  // Indicator bar
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(W * 0.2, H * 0.14, W * 0.6, 8);
  ctx.fillStyle = tm.safe ? '#34D399' : '#F87171';
  const indicX = W * 0.2 + (tm.gx / 100) * W * 0.6;
  ctx.beginPath(); ctx.arc(indicX, H * 0.14 + 4, 8, 0, Math.PI * 2); ctx.fill();
  // Progress dots on canvas
  for (let i = 0; i < tm.target; i++) {
    ctx.fillStyle = i < tm.progress ? '#34D399' : 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.arc(W * 0.5 - (tm.target - 1) * 14 + i * 28, H * 0.08, 6, 0, Math.PI * 2); ctx.fill();
  }
}

    { s:'m', t:"You were braver and smarter than me. You didn't listen. And I am so, so glad you didn't listen." },
    { s:'n', t:'He looked at her the way the sun looks at the sea on the kind of evening where everything is forgiven and nothing needs explaining.' },
    { s:'m', t:"Thank you for sailing the aether seas for me. Can this rat be your boyfriend? (ps: I'm not a dog)",
      action:'choice', choices:[{ text:'Yes' }, { text:'Obviously' }], onChoice:()=>{} },
    { s:'n', t:'She said yes. Or obviously. Either way, it was the right answer.' },
    { s:'n', t:'They stood together at the top of the tower, above the midnight sea, under a sky full of stars that had been waiting for exactly this moment.' },
    { s:'n', t:'The seas calmed. The spores drifted. Somewhere, a very annoyed cat named Felix was looking for a rat to chase.' },
    { s:'n', t:'But up here, everything was warm, and bright, and exactly as it should be.' },
    { s:'m', t:'So... about the burrito thing.' },
    { s:'u', t:"We're not talking about the burrito thing." },
    { s:'m', t:'Fair.' },
    { s:'n', t:"And they lived. Not happily ever after — that's for stories that end. They lived happily ever forward, which is much better, because it means the story keeps going." },
    { s:'n', t:'', action:'end' },
  ]},
];

// ============================================================
// RENDER + GAME LOOP
// ============================================================
function render() {
  const { W, H, t } = G;
  ctx.clearRect(0, 0, W, H);
  const scene = scenes[G.sceneIdx];
  if (!scene) return;

  // Background
  const bg = scene.bg;
  if (bg === 'autumn') BG.autumn(t);
  else if (bg === 'shore') BG.shore(t);
  else if (bg === 'shipFull') BG.shipFull(t, scene.waterType);
  else if (bg === 'shipBattle') BG.shipBattle(t);
  else if (bg === 'openWater') BG.openWater(t);
  else if (bg === 'shipBelow') BG.shipBelow(t);
  else if (bg === 'bookstore') BG.bookstore(t);
  else if (bg === 'seaCrossing') BG.seaCrossing(t);
  else if (bg === 'cabinDoor') BG.cabinDoor(t);
  else if (bg === 'seaParting') BG.seaParting(t);
  else if (bg === 'ship') BG.ship(t, scene.waterType);
  else if (bg === 'burritos') BG.burritos(t);
  else if (bg === 'cafe') BG.cafe(t);
  else if (bg === 'museum') BG.museum(t);
  else if (bg === 'lakeSunset') BG.lakeSunset(t);
  else if (bg === 'tower') BG.tower(t);
  else if (bg === 'towerTop') BG.towerTop(t);

  // Characters (hide during minigames and wide establishing shots)
  if (scene.bg !== 'shipFull' && (G.phase !== 'minigame' || !['navigate','timing'].includes(G.mg?.type))) {
    drawSceneChars(scene.id, t);
  }

  // Particles
  drawParticles();

  // Minigame overlays
  if (G.phase === 'minigame' && G.mg) {
    if (G.mg.type === 'navigate') drawNav();
    if (G.mg.type === 'timing') drawTiming();
  }
}

function update(dt) {
  G.t += dt;

  // Typewriter
  if (G.state === 'playing' && G.phase === 'dialogue' && !G.textDone) {
    G.charTimer += dt;
    const d = scenes[G.sceneIdx]?.dialogue[G.dIdx];
    if (d && G.charTimer > 28) {
      G.charTimer = 0; G.charIdx++;
      $text.textContent = d.t.substring(0, G.charIdx);
      if (G.charIdx >= d.t.length) {
        G.textDone = true; $hint.style.opacity = '1';
      }
    }
  }

  // Particles
  updateParticles(dt);
  G.pTimer += dt;
  if (G.pTimer > 250) {
    G.pTimer = 0;
    if (G.state === 'ending') emitParticles({ bg: 'ending' });
    else emitParticles(scenes[G.sceneIdx]);
  }

  // Minigame updates
  if (G.phase === 'minigame' && G.mg) {
    if (G.mg.type === 'navigate') updateNav(dt);
    if (G.mg.type === 'timing') updateTiming(dt);
  }
}

let lastTime = 0;
function loop(time) {
  const dt = Math.min(time - lastTime, 50);
  lastTime = time;

  if (G.state === 'title') {
    // Animated title background
    ctx.clearRect(0, 0, G.W, G.H);
    drawSky(['#050020','#0d3a2a'], G.H * 0.55);
    drawStars(G.H * 0.45, time);
    drawWater(G.H * 0.5, ['#059669','#34D399','#A7F3D0'], time);
    // Tiny ship silhouette
    const sx = G.W * 0.5 + Math.sin(time * 0.0003) * G.W * 0.1;
    ctx.fillStyle = '#1a3a2a';
    ctx.fillRect(sx - 8, G.H * 0.48, 16, 6);
    ctx.fillRect(sx - 1, G.H * 0.44, 2, 8);
    // Title sparkles
    for (let i = 0; i < 12; i++) {
      const px = (i * 173.7 + time * 0.008) % G.W;
      const py = (i * 97.3 + Math.sin(time * 0.001 + i) * 15) % G.H;
      ctx.fillStyle = `rgba(167,243,208,${0.15 + 0.25 * Math.sin(time * 0.002 + i * 3)})`;
      ctx.fillRect(px, py, 2, 2);
    }
  } else if (G.state === 'playing' || G.state === 'transition') {
    render();
    update(dt);
  } else if (G.state === 'ending') {
    ctx.clearRect(0, 0, G.W, G.H);
    BG.ending(time);
    drawUlisa(G.W * 0.4, G.H * 0.62, 1, time);
    drawMitchell(G.W * 0.57, G.H * 0.59, -1, time);
    drawParticles();
    update(dt);
  }

  requestAnimationFrame(loop);
}

// ============================================================
// INPUT
// ============================================================
$title.addEventListener('click', () => {
  audio.init(); audio.resume();
  $title.style.opacity = '0';
  setTimeout(() => {
    $title.style.display = 'none';
    G.state = 'playing';
    loadScene(0);
  }, 1000);
});

$dbox.addEventListener('click', (e) => {
  e.stopPropagation();
  advanceDialogue();
});

// Hold to skip
const $skip = document.getElementById('skip');
let _skipInt = null;
function startSkip(e) { e.preventDefault(); e.stopPropagation();
  _skipInt = setInterval(() => {
    if (G.state === 'playing' && G.phase === 'dialogue') advanceDialogue();
  }, 120);
}
function stopSkip() { if (_skipInt) { clearInterval(_skipInt); _skipInt = null; } }
$skip.addEventListener('touchstart', startSkip); $skip.addEventListener('mousedown', startSkip);
$skip.addEventListener('touchend', stopSkip); $skip.addEventListener('mouseup', stopSkip);
$skip.addEventListener('mouseleave', stopSkip);

$snd.addEventListener('click', (e) => {
  e.stopPropagation();
  audio.on = !audio.on;
  $snd.style.opacity = audio.on ? '1' : '0.4';
  $snd.textContent = audio.on ? '♪' : '✕';
  if (!audio.on) audio.stopAll();
  else { audio.init(); audio.resume(); const s = scenes[G.sceneIdx]; if (s?.music) audio.playMusic(s.music); }
});

// ============================================================
// INIT
// ============================================================
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(loop);
</script>
</body>
