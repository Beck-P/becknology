<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080810">
<title>The Aether Seas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080810;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;
  font-family:Georgia,'Times New Roman',serif}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;display:block}

/* Title */
#title{position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:auto;transition:opacity 1s}
#title h1{font-size:clamp(28px,8vw,48px);color:#A7F3D0;
  text-shadow:0 0 30px rgba(52,211,153,0.4),0 2px 4px rgba(0,0,0,0.5);
  letter-spacing:4px;margin-bottom:10px}
#title h2{font-size:clamp(13px,3.5vw,17px);color:#f0e6d3;opacity:0.6;
  font-weight:normal;font-style:italic;margin-bottom:50px;letter-spacing:1px}
#title .tap{font-size:13px;color:rgba(240,230,211,0.4);animation:pulse 2.5s ease-in-out infinite;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}

/* Dialogue */
#dbox{position:fixed;bottom:0;left:0;right:0;z-index:12;pointer-events:auto;
  background:rgba(8,8,20,0.88);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  padding:18px 20px 26px;min-height:26vh;
  border-top:1.5px solid rgba(167,243,208,0.12);display:none}
#dbox .speaker{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  margin-bottom:6px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#dbox .text{font-size:clamp(16px,4.2vw,20px);line-height:1.65;color:#f0e6d3;min-height:2.5em}
#dbox .hint{text-align:right;font-size:10px;color:rgba(240,230,211,0.25);margin-top:10px;
  font-family:-apple-system,sans-serif;opacity:0;transition:opacity 0.3s}

/* Choices */
#choices{position:fixed;bottom:0;left:0;right:0;z-index:13;
  padding:16px 16px 28px;display:none;flex-direction:column;gap:10px;
  background:rgba(8,8,20,0.88);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-top:1.5px solid rgba(167,243,208,0.12)}
.ch-prompt{color:#f0e6d3;font-size:clamp(15px,3.8vw,18px);margin-bottom:12px;padding:0 4px}
.ch-btn{display:block;width:100%;padding:16px 20px;
  background:rgba(167,243,208,0.07);border:1.5px solid rgba(167,243,208,0.18);
  border-radius:14px;color:#f0e6d3;font-size:clamp(15px,3.8vw,18px);
  font-family:Georgia,serif;text-align:left;cursor:pointer;transition:all 0.15s}
.ch-btn:active{background:rgba(167,243,208,0.18);transform:scale(0.98)}

/* Minigame overlay */
#mgui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:14;display:none;pointer-events:auto}
#mghud{position:fixed;top:16px;left:16px;right:56px;z-index:15;
  color:#f0e6d3;font-size:13px;font-family:-apple-system,sans-serif;
  background:rgba(8,8,20,0.6);padding:8px 12px;border-radius:8px;pointer-events:none}

/* Sound toggle */
#snd{position:fixed;top:12px;right:12px;z-index:30;width:42px;height:42px;
  border-radius:50%;background:rgba(8,8,20,0.5);
  border:1px solid rgba(255,255,255,0.12);color:#f0e6d3;font-size:17px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto}

/* Fade overlay */
#fade{position:fixed;top:0;left:0;width:100%;height:100%;
  background:#080810;z-index:18;opacity:0;pointer-events:none;transition:opacity 0.5s}

/* Ending */
#ending{position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;transition:opacity 1.5s}
#ending h1{font-size:clamp(24px,7vw,40px);color:#A7F3D0;margin-bottom:8px;
  text-shadow:0 0 20px rgba(52,211,153,0.3)}
#ending p{font-size:clamp(16px,4vw,22px);color:#f0e6d3;opacity:0.6;font-style:italic}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">
  <h1>The Aether Seas</h1>
  <h2>A Love Story in Several Rats</h2>
  <div class="tap">tap to begin</div>
</div>
<div id="dbox">
  <div class="speaker"></div>
  <div class="text"></div>
  <div class="hint">tap to continue ▾</div>
</div>
<div id="choices"></div>
<div id="mgui"><div id="mghud"></div></div>
<div id="fade"></div>
<div id="ending"><h1>The End</h1><p>♥</p></div>
<button id="snd">♪</button>

<script>
// ============================================================
// THE AETHER SEAS — A Love Story in Several Rats
// ============================================================

// --- DOM ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const $title = document.getElementById('title');
const $dbox = document.getElementById('dbox');
const $speaker = $dbox.querySelector('.speaker');
const $text = $dbox.querySelector('.text');
const $hint = $dbox.querySelector('.hint');
const $choices = document.getElementById('choices');
const $fade = document.getElementById('fade');
const $mgui = document.getElementById('mgui');
const $mghud = document.getElementById('mghud');
const $snd = document.getElementById('snd');
const $ending = document.getElementById('ending');

// --- CONSTANTS ---
const PX = 3; // pixel scale for characters
const SPEAKER_COLORS = {
  n:  { name: '',               color: '#f0e6d3' },
  u:  { name: 'Uh-Lee-Suh',    color: '#F5A0C0' },
  b:  { name: 'Beck-rat',       color: '#A8D8EA' },
  m:  { name: 'Mitchell',       color: '#6FB5A3' },
  c:  { name: 'Captain Harrow', color: '#CD853F' },
  k:  { name: 'Connor',         color: '#FFD700' },
  g:  { name: 'Sir Gibsabella', color: '#C084FC' },
  d:  { name: 'Duke Real Zono', color: '#4ADE80' },
  f:  { name: 'Felix',          color: '#F87171' },
  w:  { name: 'The Keeper',     color: '#A78BFA' },
  cr: { name: 'Crew',           color: '#DEB887' },
};

// --- GAME STATE ---
const G = {
  state: 'title',     // title | playing | transition | ending
  phase: 'dialogue',  // dialogue | choice | minigame
  sceneIdx: -1,
  dIdx: 0,
  charIdx: 0,
  charTimer: 0,
  textDone: false,
  t: 0,
  W: 0, H: 0,
  mg: null,
  pTimer: 0,
};
const particles = [];

// ============================================================
// AUDIO
// ============================================================
const audio = {
  ctx: null, on: true, nodes: [], _int: null,

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },
  resume() { if (this.ctx?.state === 'suspended') this.ctx.resume(); },

  stopAll() {
    this.nodes.forEach(n => { try { n.stop(); } catch(e) {} });
    this.nodes = [];
    if (this._int) { clearInterval(this._int); this._int = null; }
  },

  playMusic(key) {
    if (!this.on || !this.ctx) return;
    this.stopAll();
    const ac = this.ctx;
    const master = ac.createGain();
    master.gain.value = 0.1;
    master.connect(ac.destination);

    const C = {
      autumn:  { drone: 174.61, pad: 261.63, notes: [349.23,392,440,523.25,587.33] },
      emerald: { drone: 130.81, pad: 196,    notes: [261.63,293.66,329.63,392,440] },
      crimson: { drone: 110,    pad: 165,    notes: [220,261.63,293.66,349.23,392] },
      midnight:{ drone: 73.42,  pad: 110,    notes: [146.83,174.61,196,220,261.63] },
      victory: { drone: 130.81, pad: 196,    notes: [261.63,329.63,392,523.25,659.25] },
    };
    const c = C[key] || C.emerald;

    // Drone
    const dr = ac.createOscillator();
    dr.type = 'sine'; dr.frequency.value = c.drone;
    const dg = ac.createGain(); dg.gain.value = 0.2;
    dr.connect(dg); dg.connect(master); dr.start();
    this.nodes.push(dr);

    // Pad + LFO
    const pd = ac.createOscillator();
    pd.type = 'triangle'; pd.frequency.value = c.pad;
    const pg = ac.createGain(); pg.gain.value = 0.1;
    const lfo = ac.createOscillator(); lfo.frequency.value = 0.2;
    const lg = ac.createGain(); lg.gain.value = 6;
    lfo.connect(lg); lg.connect(pd.frequency);
    pd.connect(pg); pg.connect(master);
    lfo.start(); pd.start();
    this.nodes.push(pd, lfo);

    // Melodic pings
    const pingFn = () => {
      if (!this.on || !this.ctx) return;
      const note = c.notes[Math.floor(Math.random() * c.notes.length)];
      const oct = Math.random() > 0.6 ? 2 : 1;
      const o = ac.createOscillator();
      o.type = 'sine'; o.frequency.value = note * oct;
      const e = ac.createGain();
      e.gain.setValueAtTime(0.05, ac.currentTime);
      e.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 2.5);
      o.connect(e); e.connect(master);
      o.start(); o.stop(ac.currentTime + 2.5);
    };
    this._int = setInterval(pingFn, 3000);
    setTimeout(pingFn, 500);
  },

  sfx(type) {
    if (!this.on || !this.ctx) return;
    const ac = this.ctx;
    if (type === 'tap') {
      const o = ac.createOscillator(); o.frequency.value = 600 + Math.random() * 200;
      const g = ac.createGain();
      g.gain.setValueAtTime(0.06, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.06);
      o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + 0.06);
    } else if (type === 'sparkle') {
      const o = ac.createOscillator();
      o.frequency.setValueAtTime(1200, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(2400, ac.currentTime + 0.15);
      const g = ac.createGain();
      g.gain.setValueAtTime(0.05, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
      o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + 0.2);
    } else if (type === 'success') {
      [0, 0.1, 0.2].forEach((t, i) => {
        const o = ac.createOscillator();
        o.frequency.value = [523.25, 659.25, 783.99][i];
        const e = ac.createGain();
        e.gain.setValueAtTime(0, ac.currentTime + t);
        e.gain.linearRampToValueAtTime(0.06, ac.currentTime + t + 0.02);
        e.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.3);
        o.connect(e); e.connect(ac.destination);
        o.start(ac.currentTime + t); o.stop(ac.currentTime + t + 0.3);
      });
    } else if (type === 'fail') {
      const o = ac.createOscillator();
      o.frequency.setValueAtTime(300, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(100, ac.currentTime + 0.2);
      const g = ac.createGain();
      g.gain.setValueAtTime(0.06, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
      o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + 0.25);
    } else if (type === 'magic') {
      [0,0.06,0.12,0.18,0.24].forEach((t, i) => {
        const o = ac.createOscillator();
        o.frequency.value = 400 + i * 180;
        o.type = i % 2 ? 'triangle' : 'sine';
        const e = ac.createGain();
        e.gain.setValueAtTime(0.03, ac.currentTime + t);
        e.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.5);
        o.connect(e); e.connect(ac.destination);
        o.start(ac.currentTime + t); o.stop(ac.currentTime + t + 0.5);
      });
    }
  }
};

// ============================================================
// DRAWING — Backgrounds
// ============================================================
function drawSky(colors, h) {
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, colors[0]);
  g.addColorStop(1, colors[1]);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, G.W, h);
}

function drawWater(y0, colors, t) {
  const { W, H } = G;
  for (let layer = 0; layer < 3; layer++) {
    const y = y0 + layer * H * 0.06;
    ctx.fillStyle = colors[layer];
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 3) {
      ctx.lineTo(x, y + Math.sin(x * 0.015 + t * 0.001 + layer * 1.5) * (3 + layer * 2));
    }
    ctx.lineTo(W, H); ctx.fill();
  }
}

function drawStars(maxY, t) {
  for (let i = 0; i < 40; i++) {
    const sx = (i * 137.5 + 23) % G.W;
    const sy = (i * 83.7 + 11) % maxY;
    ctx.fillStyle = `rgba(255,255,255,${0.25 + 0.5 * Math.sin(t * 0.001 + i * 2.1)})`;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
}

function drawTree(x, y, h, autumn) {
  ctx.fillStyle = '#5D4037';
  ctx.fillRect(x - 3, y - h * 0.4, 6, h * 0.4);
  const cols = autumn ? ['#FF6B35','#FFD700','#DC2626','#FF8C42'] : ['#2E7D32','#4CAF50','#388E3C'];
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = cols[i % cols.length];
    const w = (3 - i) * h * 0.14;
    const cy = y - h * 0.4 - i * h * 0.18;
    ctx.beginPath();
    ctx.moveTo(x, cy - h * 0.18);
    ctx.lineTo(x + w, cy);
    ctx.lineTo(x - w, cy);
    ctx.fill();
  }
}

const BG = {
  autumn(t) {
    const { W, H } = G;
    drawSky(['#FFB347','#87CEEB'], H * 0.6);
    ctx.fillStyle = '#8B7355'; ctx.fillRect(0, H * 0.6, W, H * 0.4);
    ctx.fillStyle = '#7B9E44'; ctx.fillRect(0, H * 0.58, W, H * 0.04);
    ctx.fillStyle = '#D2B48C'; ctx.fillRect(W * 0.15, H * 0.63, W * 0.7, H * 0.05);
    drawTree(W * 0.08, H * 0.6, H * 0.32, true);
    drawTree(W * 0.28, H * 0.58, H * 0.28, true);
    drawTree(W * 0.72, H * 0.59, H * 0.3, true);
    drawTree(W * 0.92, H * 0.6, H * 0.26, true);
    // Birds
    for (let i = 0; i < 5; i++) {
      const bx = (W * 0.2 + i * W * 0.12 + Math.sin(t * 0.0008 + i) * 15) % W;
      const by = H * 0.12 + Math.sin(t * 0.001 + i * 2) * 10;
      ctx.strokeStyle = '#444'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(bx - 6, by + 2); ctx.quadraticCurveTo(bx - 3, by - 3, bx, by);
      ctx.moveTo(bx, by); ctx.quadraticCurveTo(bx + 3, by - 3, bx + 6, by + 2);
      ctx.stroke();
    }
  },

  shore(t) {
    const { W, H } = G;
    drawSky(['#87CEEB','#B4D7E8'], H * 0.45);
    drawWater(H * 0.35, ['#059669','#34D399','#A7F3D0'], t);
    ctx.fillStyle = '#F5DEB3'; ctx.fillRect(0, H * 0.58, W, H * 0.42);
    ctx.fillStyle = '#DEB887'; ctx.fillRect(0, H * 0.57, W, H * 0.03);
    // Dock
    ctx.fillStyle = '#8B7355';
    ctx.fillRect(W * 0.55, H * 0.42, W * 0.38, H * 0.035);
    ctx.fillRect(W * 0.65, H * 0.42, 4, H * 0.16);
    ctx.fillRect(W * 0.82, H * 0.42, 4, H * 0.16);
  },

  ship(t, waterType) {
    const { W, H } = G;
    const wt = waterType || 'emerald';
    const skyC = wt === 'crimson' ? ['#FFB4B4','#E08888'] : wt === 'midnight' ? ['#0F172A','#1E293B'] : ['#87CEEB','#B4D7E8'];
    const watC = wt === 'crimson' ? ['#DC2626','#F87171','#FECACA'] : wt === 'midnight' ? ['#0F172A','#1E3A5F','#0a0a20'] : ['#059669','#34D399','#A7F3D0'];
    drawSky(skyC, H * 0.55);
    if (wt === 'midnight') drawStars(H * 0.4, t);
    drawWater(H * 0.5, watC, t);
    // Deck
    ctx.fillStyle = '#8B6914'; ctx.fillRect(0, H * 0.66, W, H * 0.34);
    ctx.fillStyle = '#A0822A';
    for (let i = 0; i < 7; i++) ctx.fillRect(0, H * 0.66 + i * H * 0.045, W, 1);
    // Railing
    ctx.fillStyle = '#654321'; ctx.fillRect(0, H * 0.64, W, H * 0.025);
    for (let x = 0; x < W; x += 28) ctx.fillRect(x, H * 0.56, 3, H * 0.09);
    // Mast + sail
    ctx.fillRect(W * 0.5 - 2, H * 0.15, 4, H * 0.42);
    ctx.fillStyle = '#FFF8E7';
    ctx.beginPath();
    ctx.moveTo(W * 0.5, H * 0.16);
    ctx.lineTo(W * 0.5 + W * 0.18, H * 0.22);
    ctx.lineTo(W * 0.5, H * 0.42);
    ctx.fill();
  },

  burritos(t) {
    const { W, H } = G;
    drawSky(['#87CEEB','#FFB347'], H * 0.4);
    ctx.fillStyle = '#F5DEB3'; ctx.fillRect(0, H * 0.5, W, H * 0.5);
    ctx.fillStyle = '#E8D5B0'; ctx.fillRect(0, H * 0.48, W, H * 0.04);
    // Shop
    ctx.fillStyle = '#CD853F'; ctx.fillRect(W * 0.2, H * 0.3, W * 0.6, H * 0.2);
    ctx.fillStyle = '#8B4513';
    ctx.beginPath(); ctx.moveTo(W * 0.15, H * 0.3); ctx.lineTo(W * 0.5, H * 0.15); ctx.lineTo(W * 0.85, H * 0.3); ctx.fill();
    // Sign
    ctx.fillStyle = '#FFD700'; ctx.fillRect(W * 0.3, H * 0.2, W * 0.4, H * 0.06);
    ctx.fillStyle = '#5D3A1A'; ctx.font = `bold ${Math.max(11, W * 0.03)}px -apple-system,sans-serif`;
    ctx.textAlign = 'center'; ctx.fillText('LITOS BURRITOS', W * 0.5, H * 0.245);
    // Door
    ctx.fillStyle = '#5D3A1A'; ctx.fillRect(W * 0.44, H * 0.36, W * 0.12, H * 0.14);
    // Windows
    ctx.fillStyle = '#FFE4B5';
    ctx.fillRect(W * 0.26, H * 0.35, W * 0.1, H * 0.08);
    ctx.fillRect(W * 0.64, H * 0.35, W * 0.1, H * 0.08);
  },

  cafe(t) {
    const { W, H } = G;
    ctx.fillStyle = '#3E2723'; ctx.fillRect(0, 0, W, H);
    const lg = ctx.createRadialGradient(W * 0.5, H * 0.3, 0, W * 0.5, H * 0.3, W * 0.5);
    lg.addColorStop(0, 'rgba(255,180,80,0.25)'); lg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = lg; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#5D4037'; ctx.fillRect(0, H * 0.65, W, H * 0.35);
    // Counter
    ctx.fillStyle = '#795548'; ctx.fillRect(W * 0.05, H * 0.52, W * 0.9, H * 0.06);
    // Shelves
    ctx.fillStyle = '#4E342E';
    ctx.fillRect(W * 0.05, H * 0.2, W * 0.12, H * 0.03);
    ctx.fillRect(W * 0.83, H * 0.2, W * 0.12, H * 0.03);
    ctx.fillRect(W * 0.05, H * 0.32, W * 0.12, H * 0.03);
    ctx.fillRect(W * 0.83, H * 0.32, W * 0.12, H * 0.03);
    // Cups on shelves
    const cupColors = ['#A7F3D0','#F5A0C0','#A8D8EA','#FFD700'];
    for (let i = 0; i < 4; i++) {
      ctx.fillStyle = cupColors[i];
      ctx.fillRect(W * 0.07 + i * W * 0.025, H * 0.17, W * 0.015, H * 0.03);
    }
  },

  museum(t) {
    const { W, H } = G;
    ctx.fillStyle = '#F5F5F0'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#D4C5A9'; ctx.fillRect(0, H * 0.72, W, H * 0.28);
    // Frames
    const frameColors = ['#E8D4B0','#D4E8D0','#D0D4E8'];
    for (let i = 0; i < 3; i++) {
      const fx = W * 0.08 + i * W * 0.3;
      ctx.fillStyle = '#8B7355'; ctx.fillRect(fx, H * 0.12, W * 0.22, H * 0.35);
      ctx.fillStyle = frameColors[i]; ctx.fillRect(fx + 5, H * 0.12 + 5, W * 0.22 - 10, H * 0.35 - 10);
    }
    // Bench
    ctx.fillStyle = '#654321'; ctx.fillRect(W * 0.3, H * 0.6, W * 0.4, H * 0.04);
    ctx.fillRect(W * 0.33, H * 0.64, W * 0.02, H * 0.08);
    ctx.fillRect(W * 0.65, H * 0.64, W * 0.02, H * 0.08);
  },

  lakeSunset(t) {
    const { W, H } = G;
    const sg = ctx.createLinearGradient(0, 0, 0, H * 0.48);
    sg.addColorStop(0, '#1a0a3e'); sg.addColorStop(0.3, '#C04060');
    sg.addColorStop(0.6, '#FF8C42'); sg.addColorStop(1, '#FFD700');
    ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H * 0.48);
    drawStars(H * 0.2, t);
    // Mountains
    ctx.fillStyle = '#1a0a2e'; ctx.beginPath(); ctx.moveTo(0, H * 0.42);
    for (let x = 0; x <= W; x += 15) ctx.lineTo(x, H * 0.37 + Math.sin(x * 0.008 + 2) * H * 0.04);
    ctx.lineTo(W, H * 0.5); ctx.lineTo(0, H * 0.5); ctx.fill();
    // Reflection
    const wg = ctx.createLinearGradient(0, H * 0.46, 0, H);
    wg.addColorStop(0, '#FFB347'); wg.addColorStop(0.3, '#C04060'); wg.addColorStop(1, '#1a0a3e');
    ctx.fillStyle = wg; ctx.fillRect(0, H * 0.46, W, H * 0.54);
    // Sun ripples
    for (let i = 0; i < 5; i++) {
      const ry = H * 0.5 + i * H * 0.04;
      const rw = W * 0.12 - i * W * 0.015;
      ctx.fillStyle = `rgba(255,200,100,${0.25 - i * 0.04})`;
      ctx.fillRect(W * 0.5 - rw / 2 + Math.sin(t * 0.001 + i) * 3, ry, rw, 2);
    }
    // Distant town
    ctx.fillStyle = '#2a1a3e';
    for (let i = 0; i < 5; i++) {
      ctx.fillRect(W * 0.62 + i * W * 0.035, H * 0.39 - H * 0.02 - Math.random() * H * 0.015, W * 0.015, H * 0.03);
    }
  },

  tower(t) {
    const { W, H } = G;
    const tg = ctx.createLinearGradient(0, 0, 0, H);
    tg.addColorStop(0, '#0a0015'); tg.addColorStop(1, '#1a0a2e');
    ctx.fillStyle = tg; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#201030'; ctx.fillRect(0, 0, W * 0.07, H); ctx.fillRect(W * 0.93, 0, W * 0.07, H);
    for (let i = 0; i < 15; i++) {
      const px = W * 0.1 + (i * 173.7) % (W * 0.8);
      const py = (H * 0.1 + (i * 97.3 + t * 0.015) % (H * 0.7));
      ctx.fillStyle = `rgba(139,92,246,${0.2 + 0.4 * Math.sin(t * 0.002 + i * 3)})`;
      ctx.fillRect(px, py, 2.5, 2.5);
    }
    ctx.fillStyle = '#150a25'; ctx.fillRect(0, H * 0.75, W, H * 0.25);
    ctx.strokeStyle = '#2a1a45';
    for (let x = 0; x < W; x += W * 0.08) ctx.strokeRect(x, H * 0.75, W * 0.08, H * 0.08);
  },

  towerTop(t) {
    const { W, H } = G;
    const sg = ctx.createLinearGradient(0, 0, 0, H);
    sg.addColorStop(0, '#050015'); sg.addColorStop(0.5, '#150a3e'); sg.addColorStop(1, '#2C1654');
    ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);
    drawStars(H * 0.6, t);
    // Glow
    const mg = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, W * 0.35);
    mg.addColorStop(0, 'rgba(167,243,208,0.12)'); mg.addColorStop(1, 'rgba(167,243,208,0)');
    ctx.fillStyle = mg; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#201040'; ctx.fillRect(0, H * 0.72, W, H * 0.28);
  },

  ending(t) {
    const { W, H } = G;
    const sg = ctx.createLinearGradient(0, 0, 0, H * 0.42);
    sg.addColorStop(0, '#050020'); sg.addColorStop(1, '#2C1654');
    ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H * 0.42);
    drawStars(H * 0.38, t);
    const hg = ctx.createLinearGradient(0, H * 0.36, 0, H * 0.46);
    hg.addColorStop(0, '#FF6B6B'); hg.addColorStop(1, '#FFB347');
    ctx.fillStyle = hg; ctx.fillRect(0, H * 0.36, W, H * 0.1);
    drawWater(H * 0.43, ['#1E3A5F','#2C1654','#0a0020'], t);
  }
};

// DRAWING — Characters
// ============================================================
function drawPerson(x, y, hair, shirt, pants, shoes, hairLen, facing, t) {
  const s = PX;
  const bob = Math.sin((t || 0) * 0.0015) * 1.5;
  ctx.save();
  ctx.translate(x, y + bob);
  if (facing < 0) ctx.scale(-1, 1);
  // Head
  ctx.fillStyle = '#F5DEB3'; ctx.fillRect(-2*s, -11*s, 4*s, 4*s);
  // Hair
  ctx.fillStyle = hair;
  ctx.fillRect(-3*s, -12*s, 6*s, 3*s);
  if (hairLen > 0) { ctx.fillRect(-3*s, -9*s, s, hairLen*s); ctx.fillRect(2*s, -9*s, s, hairLen*s); }
  // Eyes
  ctx.fillStyle = '#3a2a1a'; ctx.fillRect(-s, -10*s, s, s); ctx.fillRect(s, -10*s, s, s);
  // Shirt
  ctx.fillStyle = shirt;
  ctx.fillRect(-2*s, -7*s, 4*s, 4*s);
  ctx.fillRect(-3*s, -7*s, s, 3*s); ctx.fillRect(2*s, -7*s, s, 3*s);
  // Pants
  ctx.fillStyle = pants;
  ctx.fillRect(-2*s, -3*s, 2*s, 3*s); ctx.fillRect(0, -3*s, 2*s, 3*s);
  // Shoes
  ctx.fillStyle = shoes;
  ctx.fillRect(-2*s, 0, 2*s, s); ctx.fillRect(0, 0, 2*s, s);
  ctx.restore();
}

function drawUlisa(x, y, f, t) { drawPerson(x, y, '#F0C060', '#F5A0B0', '#4A6FA5', '#FFF', 5, f, t); }
function drawMitchell(x, y, f, t) { drawPerson(x, y, '#F0C060', '#1E3A5F', '#4A6FA5', '#654321', 0, f, t); }

function drawBeckRat(x, y, t) {
  const s = PX;
  const bob = Math.sin((t || 0) * 0.003) * 2;
  ctx.save(); ctx.translate(x, y + bob);
  ctx.fillStyle = '#909090';
  ctx.fillRect(-2*s, -3*s, 4*s, 3*s); // body
  ctx.fillRect(-s, -5*s, 3*s, 2*s);   // head
  ctx.fillStyle = '#B8B8B8'; // ears
  ctx.fillRect(-s, -6*s, s, s); ctx.fillRect(s, -6*s, s, s);
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, -4*s, s, s); // eye
  ctx.fillStyle = '#FF8888'; ctx.fillRect(s, -4*s, s, s);  // nose
  ctx.fillStyle = '#1E3A5F'; ctx.fillRect(-2*s, -3*s, 4*s, s); // scarf
  ctx.fillStyle = '#808080'; // tail
  ctx.fillRect(-3*s, -s, s, s); ctx.fillRect(-4*s, -2*s, s, s);
  ctx.restore();
}

function drawConnor(x, y, f, t) {
  const s = PX;
  const bob = Math.sin((t || 0) * 0.0015) * 1.5;
  ctx.save(); ctx.translate(x, y + bob); if (f < 0) ctx.scale(-1, 1);
  ctx.fillStyle = '#C0C0C0'; // armor
  ctx.fillRect(-2*s, -7*s, 4*s, 4*s);
  ctx.fillRect(-3*s, -7*s, s, 3*s); ctx.fillRect(2*s, -7*s, s, 3*s);
  ctx.fillRect(-2*s, -11*s, 4*s, 4*s); // helmet
  ctx.fillStyle = '#FFD700'; ctx.fillRect(-2*s, -11*s, 4*s, s);
  ctx.fillStyle = '#1a1a3a'; ctx.fillRect(-s, -9*s, 2*s, s); // visor
  ctx.fillStyle = '#808080'; ctx.fillRect(-2*s, -3*s, 2*s, 3*s); ctx.fillRect(0, -3*s, 2*s, 3*s);
  ctx.fillStyle = '#654321'; ctx.fillRect(-2*s, 0, 2*s, s); ctx.fillRect(0, 0, 2*s, s);
  ctx.restore();
}

function drawFelix(x, y, t) {
  const s = PX;
  const bob = Math.sin((t || 0) * 0.004) * 1.5;
  ctx.save(); ctx.translate(x, y + bob);
  ctx.fillStyle = '#2D2D2D';
  ctx.fillRect(-2*s, -3*s, 4*s, 3*s); ctx.fillRect(-s, -5*s, 3*s, 2*s);
  ctx.fillStyle = '#FF3333'; ctx.fillRect(0, -4*s, s, s); ctx.fillRect(s, -4*s, s, s);
  ctx.fillStyle = '#C0C0C0'; ctx.fillRect(2*s, -3*s, s, 2*s); // knife
  ctx.restore();
}

// ============================================================
// PARTICLES
// ============================================================
function addP(type, x, y, data) {
  particles.push({ type, x, y, life: 1, age: 0, vx: 0, vy: 0, maxLife: 3000, ...data });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age += dt; p.life -= dt / p.maxLife;
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.type === 'leaf') p.x += Math.sin(p.age * 0.002 + (p.seed || 0)) * 0.3;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    const a = Math.min(1, p.life * 2);
    ctx.globalAlpha = a;
    if (p.type === 'leaf') {
      ctx.fillStyle = p.color || '#FF8C42';
      ctx.fillRect(p.x, p.y, 4, 3);
    } else if (p.type === 'sparkle') {
      ctx.fillStyle = p.color || '#FFD700';
      ctx.globalAlpha = a * (0.4 + 0.6 * Math.sin(p.age * 0.008));
      ctx.fillRect(p.x, p.y, 2, 2);
    } else if (p.type === 'magic') {
      ctx.fillStyle = p.color || '#A78BFA';
      ctx.globalAlpha = a * (0.3 + 0.7 * Math.sin(p.age * 0.004));
      const sz = 2 + Math.sin(p.age * 0.003);
      ctx.fillRect(p.x, p.y, sz, sz);
    }
  });
  ctx.globalAlpha = 1;
}

function emitParticles(scene) {
  const { W, H } = G;
  if (!scene) return;
  const bg = scene.bg;
  if (bg === 'autumn') {
    const cols = ['#FF6B35','#FFD700','#DC2626','#FF8C42'];
    addP('leaf', Math.random() * W, -5, { vy: 0.025 + Math.random() * 0.015,
      color: cols[Math.floor(Math.random() * cols.length)], seed: Math.random() * 99, maxLife: 5000 });
  } else if (bg === 'ship' || bg === 'shore') {
    const wt = scene.waterType || 'emerald';
    const c = wt === 'midnight' ? '#3B82F6' : wt === 'crimson' ? '#F87171' : '#A7F3D0';
    addP('sparkle', Math.random() * W, H * 0.3 + Math.random() * H * 0.15, { vy: 0.005, color: c, maxLife: 3000 });
  } else if (bg === 'lakeSunset') {
    addP('sparkle', Math.random() * W, Math.random() * H * 0.25, { vy: 0.003, color: '#FFD700', maxLife: 4000 });
  } else if (bg === 'tower' || bg === 'towerTop') {
    const cols = ['#A78BFA','#C084FC','#34D399'];
    addP('magic', W * 0.1 + Math.random() * W * 0.8, H, {
      vy: -0.025 - Math.random() * 0.015, vx: (Math.random() - 0.5) * 0.008,
      color: cols[Math.floor(Math.random() * cols.length)], maxLife: 4000 });
  } else if (bg === 'ending') {
    const cols = ['#FFD700','#A7F3D0','#A78BFA','#F5A0C0'];
    addP('sparkle', Math.random() * W, Math.random() * H, {
      vy: -0.005, color: cols[Math.floor(Math.random() * cols.length)], maxLife: 5000 });
  }
}

// ============================================================
// GAME ENGINE
// ============================================================
function resize() {
  G.W = window.innerWidth; G.H = window.innerHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = G.W * dpr; canvas.height = G.H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function loadScene(idx) {
  G.sceneIdx = idx; G.dIdx = 0; G.charIdx = 0; G.charTimer = 0;
  G.textDone = false; G.phase = 'dialogue'; G.mg = null;
  particles.length = 0;
  const scene = scenes[idx];
  if (scene.music) audio.playMusic(scene.music);
  if (scene.init) scene.init();
  showDialogue();
}

function showDialogue() {
  const scene = scenes[G.sceneIdx];
  if (!scene || G.dIdx >= scene.dialogue.length) {
    if (G.sceneIdx < scenes.length - 1) transitionTo(G.sceneIdx + 1);
    else showEnding();
    return;
  }
  const d = scene.dialogue[G.dIdx];

  // Handle actions
  if (d.action === 'choice') { showChoices(d); return; }
  if (d.action === 'minigame') { startMinigame(d); return; }
  if (d.action === 'end') { showEnding(); return; }

  // Normal dialogue line
  $dbox.style.display = 'block'; $choices.style.display = 'none';
  const sp = SPEAKER_COLORS[d.s] || SPEAKER_COLORS.n;
  $speaker.textContent = sp.name; $speaker.style.color = sp.color;
  $text.textContent = ''; G.charIdx = 0; G.textDone = false;
  $hint.style.opacity = '0';
  if (d.onShow) d.onShow();
}

function advanceDialogue() {
  if (G.state !== 'playing' || G.phase !== 'dialogue') return;
  const d = scenes[G.sceneIdx]?.dialogue[G.dIdx];
  if (!d) return;
  if (G.textDone) {
    audio.sfx('tap'); G.dIdx++; showDialogue();
  } else {
    $text.textContent = d.t; G.textDone = true; G.charIdx = d.t.length;
    $hint.style.opacity = '1';
  }
}

function showChoices(d) {
  G.phase = 'choice';
  $dbox.style.display = 'none';
  $choices.style.display = 'flex';
  $choices.innerHTML = '';
  if (d.prompt) {
    const p = document.createElement('div');
    p.className = 'ch-prompt'; p.textContent = d.prompt;
    $choices.appendChild(p);
  }
  d.choices.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'ch-btn'; btn.textContent = ch.text;
    btn.onclick = () => {
      audio.sfx('sparkle'); $choices.style.display = 'none';
      if (d.onChoice) d.onChoice(i);
      G.dIdx++; G.phase = 'dialogue'; showDialogue();
    };
    $choices.appendChild(btn);
  });
}

function transitionTo(idx) {
  G.state = 'transition';
  $dbox.style.display = 'none'; $choices.style.display = 'none'; $mgui.style.display = 'none';
  $fade.style.opacity = '1';
  setTimeout(() => {
    loadScene(idx);
    setTimeout(() => { $fade.style.opacity = '0'; G.state = 'playing'; }, 350);
  }, 550);
}

function showEnding() {
  G.state = 'ending';
  audio.playMusic('victory');
  $dbox.style.display = 'none'; $choices.style.display = 'none';
  setTimeout(() => { $ending.style.display = 'flex'; $ending.style.opacity = '1'; }, 1200);
}

// ============================================================
// MINIGAMES
// ============================================================
function startMinigame(d) {
  G.phase = 'minigame';
  G.mg = { type: d.game, data: d.data, done: false };
  $dbox.style.display = 'none'; $mgui.style.display = 'block';

  if (d.game === 'quiz') initQuiz(d.data);
  else if (d.game === 'timeloop') initTimeLoop(d.data);
  else if (d.game === 'navigate') initNavigation(d.data);
  else if (d.game === 'memory') initMemory(d.data);
  else if (d.game === 'timing') initTiming(d.data);
}

function endMinigame() {
  $mgui.style.display = 'none'; $mgui.innerHTML = '<div id="mghud"></div>';
  G.mg = null; G.dIdx++; G.phase = 'dialogue';
  showDialogue();
}

// --- Quiz ---
function initQuiz(data) {
  let qIdx = 0;
  function show() {
    if (qIdx >= data.questions.length) { audio.sfx('success'); endMinigame(); return; }
    const q = data.questions[qIdx];
    $mgui.innerHTML = `<div id="mghud">${data.hudText || ''}</div>`;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:fixed;bottom:0;left:0;right:0;padding:14px 16px 28px;background:rgba(8,8,20,0.92);border-top:1px solid rgba(167,243,208,0.1)';
    const qt = document.createElement('p');
    qt.style.cssText = 'color:#f0e6d3;font-size:15px;line-height:1.5;margin-bottom:14px;font-family:Georgia,serif';
    qt.textContent = q.question; wrap.appendChild(qt);
    q.options.forEach((opt, i) => {
      const b = document.createElement('button'); b.className = 'ch-btn'; b.textContent = opt;
      b.onclick = () => {
        if (i === q.answer) { audio.sfx('success'); qIdx++; show(); }
        else { audio.sfx('fail'); b.style.borderColor = '#F87171'; b.style.opacity = '0.5';
          setTimeout(() => { b.style.borderColor = ''; b.style.opacity = ''; }, 400); }
      };
      wrap.appendChild(b);
    });
    $mgui.appendChild(wrap);
  }
  show();
}

// --- Time Loop ---
function initTimeLoop(data) {
  let loopN = 0;
  function show() {
    const loop = data.loops[Math.min(loopN, data.loops.length - 1)];
    $mgui.innerHTML = `<div id="mghud">${data.hudText || 'Break the loop!'}</div>`;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:fixed;bottom:0;left:0;right:0;padding:14px 16px 28px;background:rgba(8,8,20,0.92);border-top:1px solid rgba(167,243,208,0.1)';
    const qt = document.createElement('p');
    qt.style.cssText = 'color:#f0e6d3;font-size:15px;line-height:1.5;margin-bottom:8px;font-family:Georgia,serif';
    qt.textContent = loop.prompt; wrap.appendChild(qt);
    if (loop.beckLine) {
      const bl = document.createElement('p');
      bl.style.cssText = 'color:#A8D8EA;font-size:13px;font-style:italic;margin-bottom:14px';
      bl.textContent = `Beck-rat: "${loop.beckLine}"`; wrap.appendChild(bl);
    }
    loop.options.forEach(opt => {
      const b = document.createElement('button'); b.className = 'ch-btn'; b.textContent = opt.text;
      b.onclick = () => {
        if (opt.correct) { audio.sfx('success'); endMinigame(); }
        else {
          audio.sfx('fail'); loopN++;
          $fade.style.opacity = '0.7';
          setTimeout(() => { $fade.style.opacity = '0'; show(); }, 350);
        }
      };
      wrap.appendChild(b);
    });
    $mgui.appendChild(wrap);
  }
  show();
}

// --- Navigation (Midnight Sea) ---
function initNavigation(data) {
  G.mg.nav = { lane: 1, obs: [], score: 0, target: data.target || 8, spT: 0, shipY: G.H * 0.55 };
  $mgui.innerHTML = `<div id="mghud">Navigate: 0/${G.mg.nav.target}</div>
    <div style="position:fixed;bottom:16px;left:16px;right:16px;display:flex;gap:10px">
      <button class="ch-btn" style="flex:1;text-align:center;padding:22px;font-size:20px" onclick="navMove(-1)">◀</button>
      <button class="ch-btn" style="flex:1;text-align:center;padding:22px;font-size:20px" onclick="navMove(1)">▶</button>
    </div>`;
}
window.navMove = function(dir) {
  if (!G.mg?.nav) return;
  const n = G.mg.nav;
  n.lane = Math.max(0, Math.min(2, n.lane + dir));
  audio.sfx('tap');
};

function updateNav(dt) {
  if (!G.mg?.nav) return;
  const n = G.mg.nav;
  n.spT += dt;
  if (n.spT > 900) {
    n.spT = 0;
    n.obs.push({ lane: Math.floor(Math.random() * 3), y: -20,
      type: ['tentacle','shadow','spore'][Math.floor(Math.random() * 3)] });
  }
  for (let i = n.obs.length - 1; i >= 0; i--) {
    const o = n.obs[i]; o.y += dt * 0.18;
    if (o.y > n.shipY - 15 && o.y < n.shipY + 15 && o.lane === n.lane) {
      n.obs.splice(i, 1); audio.sfx('fail');
    } else if (o.y > G.H + 20) {
      n.obs.splice(i, 1); n.score++;
      document.getElementById('mghud').textContent = `Navigate: ${n.score}/${n.target}`;
      if (n.score >= n.target) { audio.sfx('success'); endMinigame(); }
    }
  }
}

function drawNav() {
  if (!G.mg?.nav) return;
  const { W, H } = G; const n = G.mg.nav; const lw = W / 3;
  // Lane highlight
  ctx.fillStyle = 'rgba(167,243,208,0.06)';
  ctx.fillRect(n.lane * lw, 0, lw, H);
  // Ship
  const sx = n.lane * lw + lw / 2;
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(sx - 10, n.shipY - 6, 20, 12);
  ctx.fillStyle = '#FFF8E7';
  ctx.beginPath(); ctx.moveTo(sx, n.shipY - 16); ctx.lineTo(sx + 8, n.shipY - 6); ctx.lineTo(sx, n.shipY - 3); ctx.fill();
  // Obstacles
  n.obs.forEach(o => {
    const ox = o.lane * lw + lw / 2;
    if (o.type === 'tentacle') {
      ctx.fillStyle = '#4B0082';
      for (let j = 0; j < 3; j++) ctx.fillRect(ox + Math.sin(o.y * 0.05 + j) * 6 - 3, o.y + j * 5, 5, 4);
    } else if (o.type === 'shadow') {
      ctx.fillStyle = 'rgba(20,0,40,0.7)';
      ctx.beginPath(); ctx.arc(ox, o.y, 12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#FF3333'; ctx.fillRect(ox - 3, o.y - 2, 2, 2); ctx.fillRect(ox + 1, o.y - 2, 2, 2);
    } else {
      ctx.fillStyle = '#7B68EE';
      for (let j = 0; j < 4; j++) {
        const a = (j / 4) * Math.PI * 2 + o.y * 0.02;
        ctx.fillRect(ox + Math.cos(a) * 8, o.y + Math.sin(a) * 8, 3, 3);
      }
    }
  });
}

// --- Memory Fragments ---
function initMemory(data) {
  let step = 0;
  function show() {
    $mgui.innerHTML = `<div id="mghud">Tap the memories in order... (${step}/${data.order.length})</div>`;
    const grid = document.createElement('div');
    grid.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px;width:min(92vw,360px)';
    data.fragments.forEach((frag, i) => {
      const b = document.createElement('button'); b.className = 'ch-btn';
      b.style.cssText = `text-align:center;padding:18px 12px;min-height:70px;font-size:14px;${frag.done ? 'opacity:0.25;border-color:#34D399;' : ''}`;
      b.textContent = frag.label;
      if (!frag.done) {
        b.onclick = () => {
          if (data.order[step] === i) {
            audio.sfx('sparkle'); frag.done = true; step++;
            if (step >= data.order.length) {
              audio.sfx('magic'); setTimeout(endMinigame, 500);
            } else show();
          } else {
            audio.sfx('fail'); b.style.borderColor = '#F87171';
            setTimeout(() => { b.style.borderColor = ''; }, 400);
          }
        };
      }
      grid.appendChild(b);
    });
    $mgui.appendChild(grid);
  }
  show();
}

// --- Timing (Dock Stealth) ---
function initTiming(data) {
  G.mg.timing = { gx: 0, gdir: 1, gspd: 0.12, progress: 0, target: data.target || 3, safe: false, cd: 0 };
  $mgui.innerHTML = `<div id="mghud">Sneak past when the guard looks away!</div>
    <div id="timing-status" style="position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);
      font-size:clamp(22px,6vw,32px);font-weight:bold;font-family:-apple-system,sans-serif;
      text-shadow:0 2px 12px rgba(0,0,0,0.8);pointer-events:none;transition:color 0.2s"></div>
    <div style="position:fixed;bottom:0;left:0;right:0;padding:14px 16px 28px;
      background:rgba(8,8,20,0.92);border-top:1px solid rgba(167,243,208,0.1)">
      <div id="timing-dots" style="text-align:center;margin-bottom:10px;font-size:18px;letter-spacing:4px"></div>
      <button id="sneak-btn" style="display:block;width:100%;padding:22px;border-radius:14px;
        border:2px solid rgba(248,113,113,0.3);background:rgba(248,113,113,0.12);
        color:#f0e6d3;font-size:clamp(17px,4.5vw,22px);font-family:Georgia,serif;
        cursor:pointer;transition:all 0.15s">SNEAK</button>
    </div>`;
  document.getElementById('sneak-btn').addEventListener('click', function() {
    if (!G.mg?.timing) return;
    const tm = G.mg.timing;
    if (tm.cd > 0) return;
    const btn = document.getElementById('sneak-btn');
    const status = document.getElementById('timing-status');
    if (tm.safe) {
      audio.sfx('success'); tm.progress++; tm.cd = 400;
      if (btn) { btn.textContent = 'SNEAKED!'; btn.style.background = 'rgba(52,211,153,0.25)'; btn.style.borderColor = '#34D399'; }
      if (status) { status.textContent = 'NICE!'; status.style.color = '#34D399'; }
      updateTimingDots();
      if (tm.progress >= tm.target) { setTimeout(endMinigame, 400); }
      else { setTimeout(() => { if (btn) { btn.textContent = 'SNEAK'; btn.style.background = ''; btn.style.borderColor = ''; } }, 350); }
    } else {
      audio.sfx('fail'); tm.cd = 700;
      if (btn) { btn.textContent = 'SPOTTED!'; btn.style.background = 'rgba(248,113,113,0.25)'; btn.style.borderColor = '#F87171'; }
      if (status) { status.textContent = 'SPOTTED!'; status.style.color = '#F87171'; }
      setTimeout(() => { if (btn) { btn.textContent = 'SNEAK'; btn.style.background = ''; btn.style.borderColor = ''; } }, 600);
    }
  });
  updateTimingDots();
}
function updateTimingDots() {
  const dots = document.getElementById('timing-dots');
  const tm = G.mg?.timing;
  if (!dots || !tm) return;
  let h = '';
  for (let i = 0; i < tm.target; i++) h += i < tm.progress ? '● ' : '○ ';
  dots.innerHTML = `<span style="color:#34D399">${h.trim()}</span>`;
}

function updateTiming(dt) {
  if (!G.mg?.timing) return;
  const tm = G.mg.timing;
  tm.gx += tm.gdir * tm.gspd * dt;
  if (tm.gx > 100) { tm.gdir = -1; tm.safe = true; }
  if (tm.gx < 0) { tm.gdir = 1; tm.safe = false; }
  if (tm.cd > 0) tm.cd -= dt;
  // Update live status indicator
  const status = document.getElementById('timing-status');
  const btn = document.getElementById('sneak-btn');
  if (tm.cd <= 0 && status) {
    status.textContent = tm.safe ? 'GO NOW!' : 'WAIT...';
    status.style.color = tm.safe ? '#34D399' : '#F87171';
  }
  if (tm.cd <= 0 && btn) {
    btn.style.background = tm.safe ? 'rgba(52,211,153,0.12)' : 'rgba(248,113,113,0.12)';
    btn.style.borderColor = tm.safe ? 'rgba(52,211,153,0.3)' : 'rgba(248,113,113,0.3)';
  }
}

function drawTiming() {
  if (!G.mg?.timing) return;
  const { W, H } = G; const tm = G.mg.timing;
  const gx = W * 0.15 + (tm.gx / 100) * W * 0.7;
  drawConnor(gx, H * 0.56, tm.gdir, G.t);
  // Safe zone tint
  if (tm.safe) {
    ctx.fillStyle = 'rgba(52,211,153,0.06)'; ctx.fillRect(0, 0, W, H);
  }
  // Indicator bar
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(W * 0.2, H * 0.14, W * 0.6, 8);
  ctx.fillStyle = tm.safe ? '#34D399' : '#F87171';
  const indicX = W * 0.2 + (tm.gx / 100) * W * 0.6;
  ctx.beginPath(); ctx.arc(indicX, H * 0.14 + 4, 8, 0, Math.PI * 2); ctx.fill();
  // Progress dots on canvas
  for (let i = 0; i < tm.target; i++) {
    ctx.fillStyle = i < tm.progress ? '#34D399' : 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.arc(W * 0.5 - (tm.target - 1) * 14 + i * 28, H * 0.08, 6, 0, Math.PI * 2); ctx.fill();
  }
}

// ============================================================
// RENDER + GAME LOOP
// ============================================================
function render() {
  const { W, H, t } = G;
  ctx.clearRect(0, 0, W, H);
  const scene = scenes[G.sceneIdx];
  if (!scene) return;

  // Background
  const bg = scene.bg;
  if (bg === 'autumn') BG.autumn(t);
  else if (bg === 'shore') BG.shore(t);
  else if (bg === 'ship') BG.ship(t, scene.waterType);
  else if (bg === 'burritos') BG.burritos(t);
  else if (bg === 'cafe') BG.cafe(t);
  else if (bg === 'museum') BG.museum(t);
  else if (bg === 'lakeSunset') BG.lakeSunset(t);
  else if (bg === 'tower') BG.tower(t);
  else if (bg === 'towerTop') BG.towerTop(t);

  // Characters (hide during certain minigames)
  if (G.phase !== 'minigame' || !['navigate','timing'].includes(G.mg?.type)) {
    drawSceneChars(scene.id, t);
  }

  // Particles
  drawParticles();

  // Minigame overlays
  if (G.phase === 'minigame' && G.mg) {
    if (G.mg.type === 'navigate') drawNav();
    if (G.mg.type === 'timing') drawTiming();
  }
}

function update(dt) {
  G.t += dt;

  // Typewriter
  if (G.state === 'playing' && G.phase === 'dialogue' && !G.textDone) {
    G.charTimer += dt;
    const d = scenes[G.sceneIdx]?.dialogue[G.dIdx];
    if (d && G.charTimer > 28) {
      G.charTimer = 0; G.charIdx++;
      $text.textContent = d.t.substring(0, G.charIdx);
      if (G.charIdx >= d.t.length) {
        G.textDone = true; $hint.style.opacity = '1';
      }
    }
  }

  // Particles
  updateParticles(dt);
  G.pTimer += dt;
  if (G.pTimer > 250) {
    G.pTimer = 0;
    if (G.state === 'ending') emitParticles({ bg: 'ending' });
    else emitParticles(scenes[G.sceneIdx]);
  }

  // Minigame updates
  if (G.phase === 'minigame' && G.mg) {
    if (G.mg.type === 'navigate') updateNav(dt);
    if (G.mg.type === 'timing') updateTiming(dt);
  }
}

let lastTime = 0;
function loop(time) {
  const dt = Math.min(time - lastTime, 50);
  lastTime = time;

  if (G.state === 'title') {
    // Animated title background
    ctx.clearRect(0, 0, G.W, G.H);
    drawSky(['#050020','#0d3a2a'], G.H * 0.55);
    drawStars(G.H * 0.45, time);
    drawWater(G.H * 0.5, ['#059669','#34D399','#A7F3D0'], time);
    // Tiny ship silhouette
    const sx = G.W * 0.5 + Math.sin(time * 0.0003) * G.W * 0.1;
    ctx.fillStyle = '#1a3a2a';
    ctx.fillRect(sx - 8, G.H * 0.48, 16, 6);
    ctx.fillRect(sx - 1, G.H * 0.44, 2, 8);
    // Title sparkles
    for (let i = 0; i < 12; i++) {
      const px = (i * 173.7 + time * 0.008) % G.W;
      const py = (i * 97.3 + Math.sin(time * 0.001 + i) * 15) % G.H;
      ctx.fillStyle = `rgba(167,243,208,${0.15 + 0.25 * Math.sin(time * 0.002 + i * 3)})`;
      ctx.fillRect(px, py, 2, 2);
    }
  } else if (G.state === 'playing' || G.state === 'transition') {
    render();
    update(dt);
  } else if (G.state === 'ending') {
    ctx.clearRect(0, 0, G.W, G.H);
    BG.ending(time);
    drawUlisa(G.W * 0.4, G.H * 0.62, 1, time);
    drawMitchell(G.W * 0.57, G.H * 0.59, -1, time);
    drawParticles();
    update(dt);
  }

  requestAnimationFrame(loop);
}

// ============================================================
// INPUT
// ============================================================
$title.addEventListener('click', () => {
  audio.init(); audio.resume();
  $title.style.opacity = '0';
  setTimeout(() => {
    $title.style.display = 'none';
    G.state = 'playing';
    loadScene(0);
  }, 1000);
});

$dbox.addEventListener('click', (e) => {
  e.stopPropagation();
  advanceDialogue();
});

$snd.addEventListener('click', (e) => {
  e.stopPropagation();
  audio.on = !audio.on;
  $snd.style.opacity = audio.on ? '1' : '0.4';
  $snd.textContent = audio.on ? '♪' : '✕';
  if (!audio.on) audio.stopAll();
  else { audio.init(); audio.resume(); const s = scenes[G.sceneIdx]; if (s?.music) audio.playMusic(s.music); }
});

// ============================================================
// INIT
// ============================================================
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(loop);
</script>
