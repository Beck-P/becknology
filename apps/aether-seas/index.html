<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080810">
<title>The Aether Seas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080810;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;
  font-family:Georgia,'Times New Roman',serif}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;display:block;image-rendering:pixelated;image-rendering:crisp-edges}

/* Title */
#title{position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:auto;transition:opacity 1s}
#title h1{font-size:clamp(28px,8vw,48px);color:#A7F3D0;
  text-shadow:0 0 30px rgba(52,211,153,0.4),0 2px 4px rgba(0,0,0,0.5);
  letter-spacing:4px;margin-bottom:10px}
#title h2{font-size:clamp(13px,3.5vw,17px);color:#f0e6d3;opacity:0.6;
  font-weight:normal;font-style:italic;margin-bottom:50px;letter-spacing:1px}
#title .tap{font-size:13px;color:rgba(240,230,211,0.4);animation:pulse 2.5s ease-in-out infinite;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}

/* Dialogue */
#dbox{position:fixed;bottom:0;left:0;right:0;z-index:12;pointer-events:auto;
  background:rgba(8,8,20,0.88);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  padding:18px 20px 26px;min-height:26vh;
  border-top:1.5px solid rgba(167,243,208,0.12);display:none}
#dbox .speaker{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  margin-bottom:6px;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#dbox .text{font-size:clamp(16px,4.2vw,20px);line-height:1.65;color:#f0e6d3;min-height:2.5em}
#dbox .hint{text-align:right;font-size:10px;color:rgba(240,230,211,0.25);margin-top:10px;
  font-family:-apple-system,sans-serif;opacity:0;transition:opacity 0.3s}

/* Choices */
#choices{position:fixed;bottom:0;left:0;right:0;z-index:13;
  padding:16px 16px 28px;display:none;flex-direction:column;gap:10px;
  background:rgba(8,8,20,0.88);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-top:1.5px solid rgba(167,243,208,0.12)}
.ch-prompt{color:#f0e6d3;font-size:clamp(15px,3.8vw,18px);margin-bottom:12px;padding:0 4px}
.ch-btn{display:block;width:100%;padding:16px 20px;
  background:rgba(167,243,208,0.07);border:1.5px solid rgba(167,243,208,0.18);
  border-radius:14px;color:#f0e6d3;font-size:clamp(15px,3.8vw,18px);
  font-family:Georgia,serif;text-align:left;cursor:pointer;transition:all 0.15s}
.ch-btn:active{background:rgba(167,243,208,0.18);transform:scale(0.98)}

/* Minigame overlay */
#mgui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:14;display:none;pointer-events:auto}
#mghud{position:fixed;top:16px;left:16px;right:56px;z-index:15;
  color:#f0e6d3;font-size:13px;font-family:-apple-system,sans-serif;
  background:rgba(8,8,20,0.6);padding:8px 12px;border-radius:8px;pointer-events:none}

/* Sound toggle */
#skip{position:fixed;top:12px;left:12px;z-index:30;padding:4px 10px;border-radius:8px;
  background:rgba(8,8,20,0.4);border:1px solid rgba(255,255,255,0.1);
  color:rgba(240,230,211,0.4);font-size:10px;font-family:-apple-system,sans-serif;
  cursor:pointer;pointer-events:auto;display:none}
#snd{position:fixed;top:12px;right:12px;z-index:30;width:42px;height:42px;
  border-radius:50%;background:rgba(8,8,20,0.5);
  border:1px solid rgba(255,255,255,0.12);color:#f0e6d3;font-size:17px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto}

/* Fade overlay */
#fade{position:fixed;top:0;left:0;width:100%;height:100%;
  background:#080810;z-index:18;opacity:0;pointer-events:none;transition:opacity 0.5s}

/* Ending */
#ending{position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;transition:opacity 1.5s}
#ending h1{font-size:clamp(24px,7vw,40px);color:#A7F3D0;margin-bottom:8px;
  text-shadow:0 0 20px rgba(52,211,153,0.3)}
#ending p{font-size:clamp(16px,4vw,22px);color:#f0e6d3;opacity:0.6;font-style:italic}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">
  <h1>The Aether Seas</h1>
  <h2>A Love Story in Several Rats</h2>
  <div class="tap">tap to begin</div>
</div>
<div id="dbox">
  <div class="speaker"></div>
  <div class="text"></div>
  <div class="hint">tap to continue ▾</div>
</div>
<div id="choices"></div>
<div id="mgui"><div id="mghud"></div></div>
<div id="fade"></div>
<div id="ending"><h1>The End</h1><p>♥</p></div>
<button id="skip">hold to skip ⏩</button>
<button id="snd">♪</button>

<script>
// ============================================================
// THE AETHER SEAS — A Love Story in Several Rats
// ============================================================

// --- DOM ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const $title = document.getElementById('title');
const $dbox = document.getElementById('dbox');
const $speaker = $dbox.querySelector('.speaker');
const $text = $dbox.querySelector('.text');
const $hint = $dbox.querySelector('.hint');
const $choices = document.getElementById('choices');
const $fade = document.getElementById('fade');
const $mgui = document.getElementById('mgui');
const $mghud = document.getElementById('mghud');
const $snd = document.getElementById('snd');
const $ending = document.getElementById('ending');

// --- CONSTANTS ---
const PX = 3; // pixel scale for characters
const SPEAKER_COLORS = {
  n:  { name: '',               color: '#f0e6d3' },
  u:  { name: 'Uh-Lee-Suh',    color: '#F5A0C0' },
  b:  { name: 'Beck-rat',       color: '#A8D8EA' },
  m:  { name: 'Mitchell',       color: '#6FB5A3' },
  c:  { name: 'Captain Harrow', color: '#CD853F' },
  k:  { name: 'Connor',         color: '#FFD700' },
  g:  { name: 'Sir Gibsabella', color: '#C084FC' },
  d:  { name: 'Duke Real Zono', color: '#4ADE80' },
  f:  { name: 'Felix',          color: '#F87171' },
  w:  { name: 'The Keeper',     color: '#A78BFA' },
  cr: { name: 'Crew',           color: '#DEB887' },
};

// --- GAME STATE ---
const G = {
  state: 'title',     // title | playing | transition | ending
  phase: 'dialogue',  // dialogue | choice | minigame
  sceneIdx: -1,
  dIdx: 0,
  charIdx: 0,
  charTimer: 0,
  textDone: false,
  t: 0,
  W: 0, H: 0,
  mg: null,
  pTimer: 0,
};
const particles = [];

// ============================================================
// AUDIO
// ============================================================
const audio = {
  ctx: null, on: true, nodes: [], _int: null,

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },
  resume() { if (this.ctx?.state === 'suspended') this.ctx.resume(); },

  stopAll() {
    this.nodes.forEach(n => { try { n.stop(); } catch(e) {} });
    this.nodes = [];
    if (this._int) { clearInterval(this._int); this._int = null; }
  },

  playMusic(key) {
    if (!this.on || !this.ctx) return;
    this.stopAll();
    const ac = this.ctx;
    const master = ac.createGain();
    master.gain.value = 0.1;
    master.connect(ac.destination);

    const C = {
      autumn:  { drone: 174.61, pad: 261.63, notes: [349.23,392,440,523.25,587.33] },
      emerald: { drone: 130.81, pad: 196,    notes: [261.63,293.66,329.63,392,440] },
      crimson: { drone: 110,    pad: 165,    notes: [220,261.63,293.66,349.23,392] },
      midnight:{ drone: 73.42,  pad: 110,    notes: [146.83,174.61,196,220,261.63] },
      victory: { drone: 130.81, pad: 196,    notes: [261.63,329.63,392,523.25,659.25] },
    };
    const c = C[key] || C.emerald;

    // Drone
    const dr = ac.createOscillator();
    dr.type = 'sine'; dr.frequency.value = c.drone;
    const dg = ac.createGain(); dg.gain.value = 0.2;
    dr.connect(dg); dg.connect(master); dr.start();
    this.nodes.push(dr);

    // Pad + LFO
    const pd = ac.createOscillator();
    pd.type = 'triangle'; pd.frequency.value = c.pad;
    const pg = ac.createGain(); pg.gain.value = 0.1;
    const lfo = ac.createOscillator(); lfo.frequency.value = 0.2;
    const lg = ac.createGain(); lg.gain.value = 6;
    lfo.connect(lg); lg.connect(pd.frequency);
    pd.connect(pg); pg.connect(master);
    lfo.start(); pd.start();
    this.nodes.push(pd, lfo);

    // Melodic pings
    const pingFn = () => {
      if (!this.on || !this.ctx) return;
      const note = c.notes[Math.floor(Math.random() * c.notes.length)];
      const oct = Math.random() > 0.6 ? 2 : 1;
      const o = ac.createOscillator();
      o.type = 'sine'; o.frequency.value = note * oct;
      const e = ac.createGain();
      e.gain.setValueAtTime(0.05, ac.currentTime);
      e.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 2.5);
      o.connect(e); e.connect(master);
      o.start(); o.stop(ac.currentTime + 2.5);
    };
    this._int = setInterval(pingFn, 3000);
    setTimeout(pingFn, 500);
  },

  sfx(type) {
    if (!this.on || !this.ctx) return;
    const ac = this.ctx;
    if (type === 'tap') {
      const o = ac.createOscillator(); o.frequency.value = 600 + Math.random() * 200;
      const g = ac.createGain();
      g.gain.setValueAtTime(0.06, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.06);
      o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + 0.06);
    } else if (type === 'sparkle') {
      const o = ac.createOscillator();
      o.frequency.setValueAtTime(1200, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(2400, ac.currentTime + 0.15);
      const g = ac.createGain();
      g.gain.setValueAtTime(0.05, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
      o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + 0.2);
    } else if (type === 'success') {
      [0, 0.1, 0.2].forEach((t, i) => {
        const o = ac.createOscillator();
        o.frequency.value = [523.25, 659.25, 783.99][i];
        const e = ac.createGain();
        e.gain.setValueAtTime(0, ac.currentTime + t);
        e.gain.linearRampToValueAtTime(0.06, ac.currentTime + t + 0.02);
        e.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.3);
        o.connect(e); e.connect(ac.destination);
        o.start(ac.currentTime + t); o.stop(ac.currentTime + t + 0.3);
      });
    } else if (type === 'fail') {
      const o = ac.createOscillator();
      o.frequency.setValueAtTime(300, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(100, ac.currentTime + 0.2);
      const g = ac.createGain();
      g.gain.setValueAtTime(0.06, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
      o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + 0.25);
    } else if (type === 'magic') {
      [0,0.06,0.12,0.18,0.24].forEach((t, i) => {
        const o = ac.createOscillator();
        o.frequency.value = 400 + i * 180;
        o.type = i % 2 ? 'triangle' : 'sine';
        const e = ac.createGain();
        e.gain.setValueAtTime(0.03, ac.currentTime + t);
        e.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.5);
        o.connect(e); e.connect(ac.destination);
        o.start(ac.currentTime + t); o.stop(ac.currentTime + t + 0.5);
      });
    }
  }
};

// ============================================================
// DRAWING — Backgrounds
// ============================================================
// --- Noise helpers for organic shapes ---
function hash(n) { let x = Math.sin(n * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }
function noise1d(x) {
  const i = Math.floor(x), f = x - i;
  return hash(i) * (1 - f * f * (3 - 2 * f)) + hash(i + 1) * f * f * (3 - 2 * f);
}
function fbm(x, oct) {
  let v = 0, a = 0.5, freq = 1;
  for (let i = 0; i < oct; i++) { v += noise1d(x * freq) * a; freq *= 2; a *= 0.5; }
  return v;
}

// --- Reflection canvas (reused each frame) ---
const _rc = document.createElement('canvas');
const _rx = _rc.getContext('2d');

function drawSky(colors, h) {
  const g = ctx.createLinearGradient(0, 0, 0, Math.round(h));
  g.addColorStop(0, colors[0]); g.addColorStop(1, colors[1]);
  ctx.fillStyle = g; ctx.fillRect(0, 0, G.W, Math.round(h));
}

function drawGrad(y0, y1, stops) {
  const g = ctx.createLinearGradient(0, y0, 0, y1);
  stops.forEach(([c, s]) => g.addColorStop(s, c));
  ctx.fillStyle = g; ctx.fillRect(0, y0, G.W, y1 - y0);
}

function drawStars(maxY, t) {
  const my = Math.round(maxY);
  for (let i = 0; i < 50; i++) {
    const sx = Math.round((i * 137.5 + 23) % G.W);
    const sy = Math.round((i * 83.7 + 11) % my);
    ctx.fillStyle = `rgba(255,255,255,${0.2 + 0.6 * Math.sin(t * 0.0008 + i * 2.1)})`;
    ctx.fillRect(sx, sy, hash(i * 17) > 0.88 ? 2 : 1, 1);
  }
}

function drawWater(y0, colors, t) {
  const { W, H } = G;
  for (let layer = 0; layer < 3; layer++) {
    const y = Math.round(y0 + layer * H * 0.05);
    ctx.fillStyle = colors[layer];
    ctx.beginPath(); ctx.moveTo(0, H);
    for (let x = 0; x <= W; x++) {
      ctx.lineTo(x, y + Math.round(Math.sin(x * 0.06 + t * 0.001 + layer * 1.5) * (1.5 + layer)));
    }
    ctx.lineTo(W, H); ctx.fill();
  }
}

function drawCloudBand(maxH, t, color, amp, seed, yFrac) {
  const { W } = G;
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.moveTo(-1, Math.round(maxH));
  for (let x = -1; x <= W + 1; x++) {
    const n = fbm(x * 0.012 + seed + t * 0.00003, 4);
    ctx.lineTo(x, Math.round(maxH * yFrac + (n - 0.5) * maxH * amp));
  }
  ctx.lineTo(W + 1, Math.round(maxH)); ctx.fill();
}

function drawHill(baseY, height, color, seed) {
  const { W, H } = G;
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.moveTo(-1, H);
  for (let x = -1; x <= W + 1; x++) {
    ctx.lineTo(x, Math.round(baseY - fbm(x * 0.008 + seed, 4) * height));
  }
  ctx.lineTo(W + 1, H); ctx.fill();
}

function drawReflection(waterY, tint, t, maxR) {
  const { W, H } = G;
  const wy = Math.round(waterY);
  _rc.width = W; _rc.height = wy;
  _rx.drawImage(canvas, 0, 0, W, wy, 0, 0, W, wy);
  const rows = maxR || Math.min(H - wy, wy);
  for (let y = 0; y < rows; y++) {
    const srcY = wy - 1 - y;
    if (srcY < 0) break;
    const dx = Math.round(Math.sin(y * 0.2 + t * 0.002) * 1.5);
    ctx.drawImage(_rc, 0, srcY, W, 1, dx, wy + y, W, 1);
  }
  ctx.fillStyle = tint || 'rgba(0,15,40,0.2)';
  ctx.fillRect(0, wy, W, rows);
  for (let i = 0; i < 6; i++) {
    const sy = wy + 2 + Math.round(i * rows / 7);
    const sx = Math.round((hash(i * 7 + 99) * W * 0.6 + t * 0.003 * (i + 1)) % W);
    ctx.fillStyle = `rgba(255,240,210,${Math.max(0.04, 0.18 - i * 0.025)})`;
    ctx.fillRect(sx, sy, 2 + Math.round(hash(i * 13 + 77) * 2), 1);
  }
}

function drawPixelTree(x, y, h, colors, seed) {
  const cx = Math.round(x), cy = Math.round(y);
  ctx.fillStyle = '#4A2A15';
  const tw = Math.max(2, Math.round(h * 0.07));
  const th = Math.round(h * 0.4);
  ctx.fillRect(cx - Math.floor(tw / 2), cy - th, tw, th);
  for (let L = 0; L < colors.length; L++) {
    ctx.fillStyle = colors[L];
    const r = Math.round(h * (0.2 - L * 0.025));
    const bx = cx + Math.round((hash(seed + L * 7) - 0.5) * r * 0.5);
    const by = cy - th - Math.round(L * h * 0.1) - r;
    for (let dy = -r; dy <= r; dy++) {
      const dx = Math.round(Math.sqrt(Math.max(0, r * r - dy * dy)) + (hash(seed + dy + L * 10) - 0.5) * r * 0.35);
      if (dx > 0) ctx.fillRect(bx - dx, by + dy, dx * 2, 1);
    }
  }
}

function drawWaveHL(startY, endY, t, rgb, n) {
  const { W } = G;
  for (let i = 0; i < n; i++) {
    const wy = Math.round(startY + 2 + i * (endY - startY) / (n + 1));
    ctx.fillStyle = `rgba(${rgb},${Math.max(0.03, 0.15 - i * 0.02)})`;
    for (let x = 0; x < W; x += 3) {
      if (hash(x * 2 + i * 13 + Math.floor(t * 0.0008)) > 0.55)
        ctx.fillRect(x + Math.round(Math.sin(x * 0.08 + t * 0.001)), wy, 2, 1);
    }
  }
}

function drawMoonWithSpores(t, hue, skyH) {
  const { W, H } = G;
  const moonX = Math.round(W * 0.22), moonY = Math.round(skyH * 0.3);
  const moonR = Math.max(5, Math.round(Math.min(W, H) * 0.035));
  const C = {
    emerald:{ b:[80,255,160], g:[50,200,120], s:[120,255,180], cr:[40,150,90], hi:[200,255,220] },
    crimson:{ b:[255,130,110], g:[200,80,60], s:[255,160,130], cr:[150,50,40], hi:[255,200,190] },
    midnight:{ b:[130,170,255], g:[80,120,200], s:[150,190,255], cr:[60,80,150], hi:[200,220,255] },
  };
  const c = C[hue] || C.emerald;
  // Glow halo
  const mg = ctx.createRadialGradient(moonX, moonY, moonR * 0.5, moonX, moonY, moonR * 2.5);
  mg.addColorStop(0, `rgba(${c.g},0.18)`); mg.addColorStop(0.5, `rgba(${c.g},0.06)`);
  mg.addColorStop(1, `rgba(${c.g},0)`);
  ctx.fillStyle = mg; ctx.fillRect(0, 0, W, skyH);
  // Body (row by row for roundness)
  for (let dy = -moonR; dy <= moonR; dy++) {
    const dx = Math.round(Math.sqrt(Math.max(0, moonR * moonR - dy * dy)));
    const br = 1 - Math.abs(dy) / moonR * 0.35;
    ctx.fillStyle = `rgb(${Math.round(c.b[0]*br)},${Math.round(c.b[1]*br)},${Math.round(c.b[2]*br)})`;
    ctx.fillRect(moonX - dx, moonY + dy, dx * 2, 1);
  }
  // Craters
  ctx.fillStyle = `rgba(${c.cr},0.4)`;
  ctx.fillRect(moonX - 2, moonY - 2, 3, 2);
  ctx.fillRect(moonX + 2, moonY + 1, 2, 2);
  ctx.fillRect(moonX - 3, moonY + 2, 2, 1);
  // Highlight
  ctx.fillStyle = `rgba(${c.hi},0.3)`;
  ctx.fillRect(moonX - Math.round(moonR * 0.3), moonY - Math.round(moonR * 0.5), Math.round(moonR * 0.4), Math.round(moonR * 0.3));
  // Falling spore trails
  for (let i = 0; i < 10; i++) {
    const sx = moonX + Math.round((hash(i * 7 + 100) - 0.5) * moonR * 1.8);
    const sy0 = moonY + moonR + 2;
    const slen = Math.round(hash(i * 13 + 200) * skyH * 0.3 + skyH * 0.08);
    const sa = 0.1 + 0.16 * Math.sin((t * 0.0008 + hash(i * 19 + 300) * 6.28) % 6.28);
    for (let y = 0; y < slen; y++) {
      const fade = 1 - y / slen;
      ctx.fillStyle = `rgba(${c.s},${sa * fade * 0.5})`;
      ctx.fillRect(sx + Math.round(Math.sin(y * 0.15 + t * 0.001 + i)), sy0 + y, 1, 1);
    }
    if (sy0 + slen < skyH) {
      ctx.fillStyle = `rgba(${c.s},${sa + 0.12})`;
      ctx.fillRect(sx, sy0 + slen, 1, 1);
    }
  }
}

const BG = {
  autumn(t) {
    const { W, H } = G;
    const skyH = Math.round(H * 0.55);
    drawGrad(0, skyH, [['#1a1a4e',0],['#4a3a6e',0.2],['#8B5A5A',0.4],['#CC7A4A',0.6],['#FFB347',0.82],['#FFE4A0',1]]);
    drawCloudBand(skyH, t, 'rgba(160,120,140,0.45)', 0.14, 10, 0.28);
    drawCloudBand(skyH, t, 'rgba(200,150,130,0.4)', 0.11, 25, 0.42);
    drawCloudBand(skyH, t, 'rgba(225,195,165,0.3)', 0.07, 40, 0.55);
    drawHill(skyH + Math.round(H * 0.02), H * 0.05, '#3a5a2a', 7);
    drawHill(skyH, H * 0.03, '#4a6a3a', 15);
    drawGrad(skyH - 1, H, [['#7B9E44',0],['#6B8E34',0.05],['#8B7355',0.18],['#5D4037',1]]);
    ctx.fillStyle = '#C4A882';
    const pathY = skyH + Math.round(H * 0.1);
    for (let x = 0; x < W; x++) {
      const pw = Math.round(4 + Math.sin(x * 0.04 + 1) * 1.5);
      ctx.fillRect(x, pathY - Math.round(pw / 2), 1, pw);
    }
    ctx.fillStyle = '#A08060';
    for (let x = 0; x < W; x += 2) ctx.fillRect(x, pathY + 2, 1, 1);
    drawPixelTree(W * 0.06, skyH, H * 0.28, ['#CC3300','#EE6622','#FFB347'], 1);
    drawPixelTree(W * 0.22, skyH - 2, H * 0.34, ['#BB2200','#DD5500','#FFAA22','#FFD700'], 2);
    drawPixelTree(W * 0.48, skyH + 3, H * 0.18, ['#DD4400','#FF8844'], 5);
    drawPixelTree(W * 0.72, skyH - 1, H * 0.3, ['#AA3300','#EE7744','#FFCC44'], 3);
    drawPixelTree(W * 0.93, skyH, H * 0.26, ['#CC5500','#FF9944','#FFD700'], 4);
    ctx.fillStyle = '#8BA84A';
    for (let i = 0; i < 25; i++) {
      const gx = Math.round(hash(i * 7) * W), gy = Math.round(skyH + hash(i * 13) * H * 0.04);
      ctx.fillRect(gx, gy - 2, 1, 2);
      if (hash(i * 3) > 0.5) ctx.fillRect(gx + 1, gy - 1, 1, 1);
    }
    for (let i = 0; i < 4; i++) {
      const bx = Math.round((W * 0.2 + i * W * 0.15 + Math.sin(t * 0.0005 + i) * 5) % W);
      const by = Math.round(H * 0.08 + Math.sin(t * 0.0007 + i * 2) * 3);
      ctx.fillStyle = '#2a2a3a';
      ctx.fillRect(bx - 2, by, 1, 1); ctx.fillRect(bx - 1, by - 1, 1, 1);
      ctx.fillRect(bx + 1, by - 1, 1, 1); ctx.fillRect(bx + 2, by, 1, 1);
    }
  },

  shore(t) {
    const { W, H } = G;
    const skyH = Math.round(H * 0.38), sandY = Math.round(H * 0.58);
    // Dark sky for emerald moon
    drawGrad(0, skyH, [['#0A1A20',0],['#0E2A28',0.25],['#153A30',0.5],['#1A4A38',0.75],['#205A42',1]]);
    // Stars
    for (let i = 0; i < 35; i++) {
      const sx = Math.round((i * 137.5 + 23) % W);
      const sy = Math.round((i * 83.7 + 11) % (skyH * 0.7));
      ctx.fillStyle = `rgba(180,255,220,${0.15 + 0.35 * Math.sin(t * 0.0008 + i * 2.1)})`;
      ctx.fillRect(sx, sy, hash(i * 17) > 0.9 ? 2 : 1, 1);
    }
    // Emerald moon with spores
    drawMoonWithSpores(t, 'emerald', skyH);
    // Dark emerald cloud bands
    drawCloudBand(skyH, t, 'rgba(20,80,50,0.4)', 0.08, 50, 0.35);
    drawCloudBand(skyH, t, 'rgba(25,90,55,0.3)', 0.06, 65, 0.55);
    // Emerald sea — solid green base, then lighter reflection on top
    drawGrad(skyH, sandY, [['#06503A',0],['#08604A',0.3],['#0A7058',0.6],['#0D8868',0.85],['#15A080',1]]);
    // Wave texture
    for (let i = 0; i < 5; i++) {
      const wy = skyH + 3 + Math.round(i * (sandY - skyH) / 6);
      ctx.fillStyle = `rgba(30,180,130,${0.18 - i * 0.025})`;
      for (let x = 0; x < W; x += 3) {
        if (hash(x * 2 + i * 13 + Math.floor(t * 0.0008)) > 0.5)
          ctx.fillRect(x + Math.round(Math.sin(x * 0.08 + t * 0.001)), wy, 2, 1);
      }
    }
    // Foam line at shore
    ctx.fillStyle = 'rgba(167,243,208,0.35)';
    for (let x = 0; x < W; x++) {
      const fy = sandY - 1 + Math.round(Math.sin(x * 0.12 + t * 0.002) * 0.8);
      ctx.fillRect(x, fy, 1, 1);
    }
    // Sand
    drawGrad(sandY, H, [['#E8D5B0',0],['#F5DEB3',0.08],['#DEB887',1]]);
    ctx.fillStyle = '#D4C4A0';
    for (let i = 0; i < 15; i++) ctx.fillRect(Math.round(hash(i * 11) * W), sandY + Math.round(hash(i * 19) * H * 0.06) + 2, 2, 1);
    ctx.fillStyle = '#6B8E34';
    for (let i = 0; i < 12; i++) ctx.fillRect(Math.round(hash(i * 7 + 200) * W * 0.5), sandY - 1, 1, 2);
    // Dock — wide planks from sand out to the ship
    const dockStartX = Math.round(W * 0.6);
    const dockEndX = Math.round(W * 0.78); // extends right up to the ship
    const dockTopY = Math.round(sandY - Math.max(2, H * 0.008));
    const dockH = Math.max(4, Math.round(H * 0.02));
    // Plank surface
    ctx.fillStyle = '#6B4A28';
    ctx.fillRect(dockStartX, dockTopY, dockEndX - dockStartX, dockH);
    // Plank highlight top edge
    ctx.fillStyle = '#8A6838';
    ctx.fillRect(dockStartX, dockTopY, dockEndX - dockStartX, 1);
    // Plank lines
    ctx.fillStyle = '#5A3A1A';
    for (let py = dockTopY + 2; py < dockTopY + dockH; py += 2)
      ctx.fillRect(dockStartX, py, dockEndX - dockStartX, 1);
    // Dark underside
    ctx.fillStyle = '#3A2510';
    ctx.fillRect(dockStartX, dockTopY + dockH, dockEndX - dockStartX, 1);
    // Support posts — thick, with visible tops
    ctx.fillStyle = '#4A3018';
    const postSpacing = Math.round((dockEndX - dockStartX) / 3);
    for (let i = 0; i <= 3; i++) {
      const px = dockStartX + i * postSpacing;
      const postW = Math.max(2, Math.round(W * 0.012));
      const postBot = sandY + Math.round(H * 0.06);
      ctx.fillRect(px, dockTopY + dockH, postW, postBot - dockTopY - dockH);
      // Post cap on top of dock
      ctx.fillStyle = '#5A3A20';
      ctx.fillRect(px - 1, dockTopY - 2, postW + 2, 2);
      ctx.fillStyle = '#4A3018';
    }

    // === Big pixel art ship — partially submerged ===
    const bob = Math.round(Math.sin(t * 0.0012) * 1);
    const shipCX = Math.round(W * 0.88);
    const hullW = Math.max(20, Math.round(W * 0.22));
    const hullH = Math.max(10, Math.round(H * 0.08));
    // Deck sits right at the water surface (skyH), hull extends down into water
    const deckY2 = skyH + 2 + bob;
    const hullBot = deckY2 + hullH;
    const hullL = shipCX - Math.round(hullW / 2);
    const hullR = shipCX + Math.round(hullW / 2);
    // How much hull is visible above water overlay
    const waterCoverStart = deckY2 + Math.round(hullH * 0.3); // water covers bottom 70%

    // Hull — curved shape, row by row
    for (let row = 0; row < hullH; row++) {
      const frac = row / hullH;
      // Narrow at bottom, wide at top
      const inset = Math.round(frac * frac * hullW * 0.15);
      const lx = hullL + inset;
      const rx = hullR - inset;
      // Color: lighter brown at top, darker at bottom
      if (frac > 0.75) ctx.fillStyle = '#3A1808';
      else if (frac > 0.5) ctx.fillStyle = '#4A2210';
      else ctx.fillStyle = '#6B3A18';
      ctx.fillRect(lx, deckY2 + row, rx - lx, 1);
    }
    // Hull highlight stripe near top
    ctx.fillStyle = '#8B5A20';
    ctx.fillRect(hullL + 1, deckY2 + 1, hullW - 2, 1);
    // Hull dark trim at waterline
    ctx.fillStyle = '#2A1005';
    const botInset = Math.round(hullW * 0.15);
    ctx.fillRect(hullL + botInset, hullBot - 1, hullW - botInset * 2, 1);

    // Portholes / cabin windows
    ctx.fillStyle = '#2A1408';
    const portY = deckY2 + Math.round(hullH * 0.35);
    const portCount = Math.max(3, Math.round(hullW / 6));
    const portSpacing = Math.round((hullW - 8) / portCount);
    for (let i = 0; i < portCount; i++) {
      ctx.fillRect(hullL + 4 + i * portSpacing, portY, 2, 2);
    }

    // Deck surface
    ctx.fillStyle = '#A07818';
    ctx.fillRect(hullL, deckY2 - 1, hullW, 2);
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(hullL, deckY2 - 2, hullW, 1);

    // Bow accent (pointed left side)
    ctx.fillStyle = '#5A3018';
    ctx.fillRect(hullL - 2, deckY2 + 1, 3, 2);
    ctx.fillRect(hullL - 3, deckY2 + 2, 2, 2);
    // Stern accent (right side)
    ctx.fillRect(hullR, deckY2 + 1, 2, Math.round(hullH * 0.3));
    ctx.fillStyle = '#6B3A18';
    ctx.fillRect(hullR, deckY2 - 2, 2, 3);

    // Railing
    ctx.fillStyle = '#7A5A20';
    const railY = deckY2 - Math.max(3, Math.round(H * 0.015));
    ctx.fillRect(hullL, railY, hullW, 1);
    ctx.fillStyle = '#6B4A18';
    for (let i = 0; i <= 4; i++) {
      ctx.fillRect(hullL + Math.round(i * hullW / 4), railY, 1, deckY2 - railY);
    }

    // Main mast — thick
    const mastX = shipCX;
    const mastH = Math.max(20, Math.round(H * 0.2));
    const mastTop = railY - mastH;
    ctx.fillStyle = '#6B4A20';
    ctx.fillRect(mastX - 1, mastTop, 3, mastH + (deckY2 - railY));
    ctx.fillStyle = '#7A5A28'; ctx.fillRect(mastX - 1, mastTop, 1, mastH + (deckY2 - railY));

    // Main sail — big rectangle with billow
    const sailTop = mastTop + 3;
    const sailBot = mastTop + Math.round(mastH * 0.7);
    const sailW = Math.max(12, Math.round(hullW * 0.6));
    // Cross beam
    ctx.fillStyle = '#6B4A20';
    ctx.fillRect(mastX - Math.round(sailW / 2) - 2, sailTop - 1, sailW + 4, 2);
    // Sail body (light gray)
    ctx.fillStyle = '#D8DDE4';
    for (let sy = sailTop; sy < sailBot; sy++) {
      const frac2 = (sy - sailTop) / (sailBot - sailTop);
      const billow = Math.round(Math.sin(frac2 * Math.PI) * sailW * 0.12);
      ctx.fillRect(mastX - Math.round(sailW / 2) - billow, sy, sailW + billow * 2, 1);
    }
    // Sail shading — darker center
    ctx.fillStyle = '#BCC4CE';
    for (let sy = sailTop + 2; sy < sailBot - 2; sy++) {
      const frac2 = (sy - sailTop) / (sailBot - sailTop);
      const billow = Math.round(Math.sin(frac2 * Math.PI) * sailW * 0.08);
      const shadeW = Math.round(sailW * 0.5);
      ctx.fillRect(mastX - Math.round(shadeW / 2), sy, shadeW + billow, 1);
    }
    // Sail highlight — bright edge left
    ctx.fillStyle = '#EEF0F4';
    for (let sy = sailTop + 1; sy < sailBot - 1; sy++) {
      const frac2 = (sy - sailTop) / (sailBot - sailTop);
      const billow = Math.round(Math.sin(frac2 * Math.PI) * sailW * 0.12);
      ctx.fillRect(mastX - Math.round(sailW / 2) - billow, sy, 2, 1);
    }
    // Horizontal sail ribs
    ctx.fillStyle = '#C8CED6';
    ctx.fillRect(mastX - Math.round(sailW / 2), sailTop, sailW, 1);
    ctx.fillRect(mastX - Math.round(sailW / 2), sailBot - 1, sailW, 1);
    ctx.fillRect(mastX - Math.round(sailW / 2) - 1, Math.round((sailTop + sailBot) / 2), sailW + 2, 1);

    // Cross beam
    ctx.fillStyle = '#6B4A20';
    ctx.fillRect(mastX - Math.round(sailW / 2) - 2, sailTop - 1, sailW + 4, 1);

    // Flag at top
    const flagW = Math.max(4, Math.round(W * 0.03));
    const flagH = Math.max(3, Math.round(H * 0.015));
    ctx.fillStyle = '#CC2020';
    ctx.fillRect(mastX + 1, mastTop - flagH, flagW, flagH);
    ctx.fillStyle = '#AA1818';
    ctx.fillRect(mastX + 1, mastTop - flagH, flagW, 1);
    // Flag pole tip
    ctx.fillStyle = '#6B4A20';
    ctx.fillRect(mastX, mastTop - flagH - 1, 1, 1);

    // Water overlay on lower hull — gradient to blend with surrounding sea
    const waterDepth = hullBot - waterCoverStart + 4;
    for (let row = 0; row < waterDepth; row++) {
      const frac = row / waterDepth;
      const y = waterCoverStart + row;
      // Blend from lighter surface to darker depth, matching the sea gradient
      const r = Math.round(6 + frac * 4);
      const g = Math.round(96 - frac * 30);
      const b = Math.round(74 - frac * 20);
      // Taper width so it doesn't look like a rectangle
      const taper = Math.round(frac * frac * 3);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(hullL - 3 + taper, y, hullW + 6 - taper * 2, 1);
    }
    // Wave foam at waterline around hull
    ctx.fillStyle = '#1AAA78';
    for (let x = hullL - 3; x < hullR + 3; x++) {
      const wy = waterCoverStart - 1 + Math.round(Math.sin(x * 0.2 + t * 0.003) * 0.8);
      ctx.fillRect(x, wy, 1, 1);
    }
    // Subtle foam highlight
    ctx.fillStyle = 'rgba(167,243,208,0.3)';
    for (let x = hullL - 2; x < hullR + 2; x += 2) {
      ctx.fillRect(x, waterCoverStart + Math.round(Math.sin(x * 0.3 + t * 0.002) * 0.5), 1, 1);
    }

    // Rope from dock to ship
    ctx.fillStyle = '#8B7355';
    ctx.fillRect(dockEndX - 1, dockTopY + Math.round(dockH / 2), hullL - dockEndX + 2, 1);
  },

  // --- Helper: draw sky+water for ship scenes ---
  _shipSkyWater(t, wt, skyH, waterEnd) {
    const { W } = G;
    const skyS = { emerald:[['#0A2A30',0],['#1A4A48',0.25],['#2A6A5A',0.5],['#4A8A70',0.75],['#6AAA88',1]],
      crimson:[['#2A1020',0],['#5A2A3A',0.25],['#9A4A5A',0.5],['#DD7A6A',0.8],['#FFB090',1]],
      midnight:[['#050010',0],['#0A0A1E',0.3],['#101030',0.6],['#1A2040',1]] };
    drawGrad(0, skyH, skyS[wt] || skyS.emerald);
    if (wt === 'midnight') drawStars(skyH, t);
    drawMoonWithSpores(t, wt, skyH);
    const cc = { emerald:[['rgba(40,120,80,0.3)',0.3],['rgba(60,140,90,0.25)',0.45],['rgba(80,160,110,0.18)',0.58]],
      crimson:[['rgba(140,70,70,0.35)',0.25],['rgba(190,110,90,0.3)',0.4],['rgba(220,150,120,0.25)',0.55]],
      midnight:[['rgba(25,25,50,0.4)',0.2],['rgba(35,35,65,0.3)',0.4]] };
    (cc[wt] || cc.emerald).forEach(([c, y], i) => drawCloudBand(skyH, t, c, 0.09, 10 + i * 15, y));
    const wb = { emerald:'#0A4A35', crimson:'#4A1A1A', midnight:'#050510' };
    ctx.fillStyle = wb[wt] || wb.emerald; ctx.fillRect(0, skyH, W, waterEnd - skyH);
    const rt = { emerald:'rgba(5,50,35,0.28)', crimson:'rgba(50,12,12,0.28)', midnight:'rgba(3,3,10,0.25)' };
    drawReflection(skyH, rt[wt] || rt.emerald, t, waterEnd - skyH);
    const wr = { emerald:'52,211,153', crimson:'248,113,113', midnight:'59,130,246' };
    drawWaveHL(skyH, waterEnd, t, wr[wt] || wr.emerald, 4);
  },

  // --- Full ship on open water (establishing shot) ---
  shipFull(t, waterType) {
    const { W, H } = G;
    const wt = waterType || 'emerald';
    const skyH = Math.round(H * 0.4);
    BG._shipSkyWater(t, wt, skyH, H);
    // Draw a full ship floating on the water
    const bob = Math.round(Math.sin(t * 0.001) * 1);
    const cx = Math.round(W * 0.5), waterLine = Math.round(H * 0.52) + bob;
    const hw = Math.max(24, Math.round(W * 0.25));
    const hh = Math.max(10, Math.round(H * 0.07));
    // Hull (only top portion visible above water)
    const visRows = Math.round(hh * 0.35);
    for (let row = 0; row < visRows; row++) {
      const frac = row / hh;
      const inset = Math.round(frac * frac * hw * 0.12);
      ctx.fillStyle = frac > 0.3 ? '#4A2210' : '#6B3A18';
      ctx.fillRect(cx - Math.round(hw / 2) + inset, waterLine + row, hw - inset * 2, 1);
    }
    ctx.fillStyle = '#8B5A20'; ctx.fillRect(cx - Math.round(hw / 2) + 1, waterLine + 1, hw - 2, 1);
    // Deck
    ctx.fillStyle = '#A07818'; ctx.fillRect(cx - Math.round(hw / 2), waterLine - 1, hw, 2);
    // Railing
    const railH = Math.max(3, Math.round(H * 0.012));
    ctx.fillStyle = '#7A5A20'; ctx.fillRect(cx - Math.round(hw / 2), waterLine - railH, hw, 1);
    ctx.fillStyle = '#6B4A18';
    for (let i = 0; i <= 5; i++) ctx.fillRect(cx - Math.round(hw / 2) + Math.round(i * hw / 5), waterLine - railH, 1, railH);
    // Bow/stern accents
    ctx.fillStyle = '#5A3018';
    ctx.fillRect(cx - Math.round(hw / 2) - 2, waterLine, 3, 2);
    ctx.fillRect(cx + Math.round(hw / 2), waterLine - 1, 2, 3);
    // Main mast — thick, full height
    const mastTop = waterLine - Math.round(H * 0.22);
    ctx.fillStyle = '#6B4A20'; ctx.fillRect(cx - 1, mastTop, 3, waterLine - mastTop);
    ctx.fillStyle = '#7A5A28'; ctx.fillRect(cx - 1, mastTop, 1, waterLine - mastTop);
    // Large sail
    const sT = mastTop + 3, sB = mastTop + Math.round(H * 0.15);
    const sW = Math.max(14, Math.round(hw * 0.55));
    // Cross beam
    ctx.fillStyle = '#6B4A20'; ctx.fillRect(cx - Math.round(sW / 2) - 2, sT - 1, sW + 4, 2);
    ctx.fillStyle = '#D8DDE4';
    for (let sy = sT; sy < sB; sy++) {
      const f = (sy - sT) / (sB - sT);
      const b = Math.round(Math.sin(f * Math.PI) * sW * 0.1);
      ctx.fillRect(cx - Math.round(sW / 2) - b, sy, sW + b * 2, 1);
    }
    ctx.fillStyle = '#BCC4CE';
    for (let sy = sT + 2; sy < sB - 2; sy++) {
      const f = (sy - sT) / (sB - sT);
      const b = Math.round(Math.sin(f * Math.PI) * sW * 0.06);
      ctx.fillRect(cx - Math.round(sW * 0.25), sy, Math.round(sW * 0.5) + b, 1);
    }
    ctx.fillStyle = '#C8CED6';
    ctx.fillRect(cx - Math.round(sW / 2), sT, sW, 1);
    ctx.fillRect(cx - Math.round(sW / 2), sB - 1, sW, 1);
    ctx.fillStyle = '#6B4A20'; ctx.fillRect(cx - Math.round(sW / 2) - 2, sT - 1, sW + 4, 1);
    // Animated flag
    const fC = wt === 'crimson' ? '#CC3333' : wt === 'midnight' ? '#3B82F6' : '#34D399';
    ctx.fillStyle = fC;
    for (let fx = 0; fx < Math.max(3, Math.round(W * 0.025)); fx++) {
      const fy = Math.round(Math.sin(fx * 0.7 + t * 0.005) * Math.min(fx * 0.3, 1));
      ctx.fillRect(cx + 1 + fx, mastTop - 2 + fy, 1, 2);
    }
    // Water blending over lower hull — no rectangle, just cover the visible hull rows
    // The hull rows below visRows were never drawn, so the water/reflection already fills that space.
    // Just add foam at the waterline where hull meets water.
    const foamC = wt === 'crimson' ? 'rgba(255,180,180,0.35)' : wt === 'midnight' ? 'rgba(100,140,220,0.25)' : 'rgba(100,230,170,0.35)';
    ctx.fillStyle = foamC;
    for (let x = cx - Math.round(hw / 2) - 2; x < cx + Math.round(hw / 2) + 2; x++) {
      ctx.fillRect(x, waterLine + visRows - 1 + Math.round(Math.sin(x * 0.2 + t * 0.003) * 0.5), 1, 1);
    }
    // Small wake/ripple lines beside the hull
    const wakeC = wt === 'crimson' ? 'rgba(200,100,100,0.2)' : wt === 'midnight' ? 'rgba(80,120,200,0.15)' : 'rgba(80,200,150,0.2)';
    ctx.fillStyle = wakeC;
    for (let i = 0; i < 3; i++) {
      const wy = waterLine + visRows + 1 + i * 2;
      const wOff = Math.round(Math.sin(wy * 0.3 + t * 0.002) * 1);
      ctx.fillRect(cx - Math.round(hw / 2) - 3 - i + wOff, wy, 2, 1);
      ctx.fillRect(cx + Math.round(hw / 2) + 1 + i + wOff, wy, 2, 1);
    }
    // Midnight: bioluminescence
    if (wt === 'midnight') {
      for (let i = 0; i < 10; i++) {
        const bx = Math.round((hash(i * 7 + 800) * W));
        const by = Math.round(H * 0.55 + hash(i * 13 + 900) * H * 0.3);
        const ba = 0.1 + 0.15 * Math.sin(t * 0.001 + i * 2);
        ctx.fillStyle = `rgba(80,180,255,${ba})`;
        ctx.fillRect(bx, by, 2, 1);
      }
    }
  },

  // --- Ship deck view (conversations, close-up) ---
  ship(t, waterType) {
    const { W, H } = G;
    const wt = waterType || 'emerald';
    const skyH = Math.round(H * 0.48), deckY = Math.round(H * 0.64);
    BG._shipSkyWater(t, wt, skyH, deckY);
    // Distant island silhouette
    if (wt !== 'midnight') {
      ctx.fillStyle = wt === 'crimson' ? 'rgba(60,20,20,0.4)' : 'rgba(10,50,30,0.3)';
      ctx.beginPath(); ctx.moveTo(0, skyH);
      const ix = Math.round(W * 0.8);
      for (let x = ix - 15; x <= ix + 15; x++) {
        const d = Math.abs(x - ix) / 15;
        ctx.lineTo(x, skyH - Math.round((1 - d * d) * H * 0.025));
      }
      ctx.lineTo(W, skyH); ctx.fill();
    }
    // Midnight: bioluminescence in water
    if (wt === 'midnight') {
      for (let i = 0; i < 8; i++) {
        const bx = Math.round(hash(i * 7 + 800) * W);
        const by = Math.round(skyH + 3 + hash(i * 13 + 900) * (deckY - skyH - 5));
        ctx.fillStyle = `rgba(80,180,255,${0.08 + 0.12 * Math.sin(t * 0.001 + i * 2)})`;
        ctx.fillRect(bx, by, 2, 1);
      }
    }
    // === DECK ===
    drawGrad(deckY, H, [['#8B6914',0],['#7A5A10',0.05],['#5A4010',1]]);
    // Plank lines
    ctx.fillStyle = '#9A7A20';
    for (let i = 0; i < 6; i++) ctx.fillRect(0, deckY + 1 + Math.round(i * H * 0.045), W, 1);
    // Railing
    ctx.fillStyle = '#5A3A10'; ctx.fillRect(0, deckY - 2, W, 3);
    for (let x = 0; x < W; x += Math.max(6, Math.round(W * 0.06)))
      ctx.fillRect(x, deckY - Math.round(H * 0.05), 2, Math.round(H * 0.05));
    // Main mast (center) — thick, extends from above sail down to deck
    const mx = Math.round(W * 0.5);
    const mastTopY = Math.round(H * 0.18);
    ctx.fillStyle = '#5A3A10';
    ctx.fillRect(mx - 1, mastTopY, 3, deckY - mastTopY); // mast reaches deck
    // Mast highlight
    ctx.fillStyle = '#6B4A18';
    ctx.fillRect(mx - 1, mastTopY, 1, deckY - mastTopY);
    // Cross beam
    ctx.fillStyle = '#5A3A10';
    ctx.fillRect(mx - Math.round(W * 0.08), mastTopY + 2, Math.round(W * 0.16), 2);
    // Sail
    const sailL = mx - Math.round(W * 0.07), sailR = mx + Math.round(W * 0.07);
    const sailTop2 = mastTopY + 5, sailBot2 = Math.round(H * 0.42);
    ctx.fillStyle = '#F0E4D0';
    for (let sy = sailTop2; sy < sailBot2; sy++) {
      const f = (sy - sailTop2) / (sailBot2 - sailTop2);
      const billow = Math.round(Math.sin(f * Math.PI) * W * 0.015);
      ctx.fillRect(sailL - billow, sy, sailR - sailL + billow * 2, 1);
    }
    // Sail shading
    ctx.fillStyle = '#D8D0C0';
    for (let sy = sailTop2 + 2; sy < sailBot2 - 2; sy++) {
      const f = (sy - sailTop2) / (sailBot2 - sailTop2);
      const billow = Math.round(Math.sin(f * Math.PI) * W * 0.01);
      const sw2 = Math.round((sailR - sailL) * 0.4);
      ctx.fillRect(mx - Math.round(sw2 / 2), sy, sw2 + billow, 1);
    }
    // Sail ribs
    ctx.fillStyle = '#C8C0B0';
    ctx.fillRect(sailL, sailTop2, sailR - sailL, 1);
    ctx.fillRect(sailL - 1, sailBot2 - 1, sailR - sailL + 2, 1);
    ctx.fillRect(sailL - 1, Math.round((sailTop2 + sailBot2) / 2), sailR - sailL + 2, 1);
    // Animated flag (flutters in wind)
    const flagC = wt === 'crimson' ? '#CC3333' : wt === 'midnight' ? '#3B82F6' : '#34D399';
    ctx.fillStyle = flagC;
    const flagW2 = Math.max(4, Math.round(W * 0.04));
    for (let fx = 0; fx < flagW2; fx++) {
      const fy = Math.round(Math.sin(fx * 0.6 + t * 0.005) * Math.min(fx * 0.25, 1.5));
      ctx.fillRect(mx + 2 + fx, mastTopY - 2 + fy, 1, 2);
    }

    // === DECK FURNITURE ===
    // Barrels (left side)
    const by = deckY + Math.round(H * 0.02);
    ctx.fillStyle = '#6B4A20';
    ctx.fillRect(Math.round(W * 0.06), by - 5, 4, 5);
    ctx.fillRect(Math.round(W * 0.11), by - 6, 4, 5);
    ctx.fillStyle = '#8B6A30'; // barrel bands
    ctx.fillRect(Math.round(W * 0.06), by - 4, 4, 1);
    ctx.fillRect(Math.round(W * 0.06), by - 2, 4, 1);
    ctx.fillRect(Math.round(W * 0.11), by - 5, 4, 1);
    ctx.fillRect(Math.round(W * 0.11), by - 3, 4, 1);
    // Crate
    ctx.fillStyle = '#7A5A28';
    ctx.fillRect(Math.round(W * 0.16), by - 4, 5, 4);
    ctx.fillStyle = '#6A4A20';
    ctx.fillRect(Math.round(W * 0.16), by - 4, 5, 1);
    ctx.fillRect(Math.round(W * 0.18), by - 4, 1, 4);
    // Coiled rope
    ctx.fillStyle = '#C4A870';
    ctx.fillRect(Math.round(W * 0.06), by - 7, 3, 2);
    ctx.fillStyle = '#B49860';
    ctx.fillRect(Math.round(W * 0.07), by - 8, 2, 1);

    // Ship's wheel (right side)
    const wx = Math.round(W * 0.82), wy = deckY - Math.round(H * 0.02);
    ctx.fillStyle = '#5A3A10';
    ctx.fillRect(wx, wy, 2, Math.round(H * 0.02));
    // Wheel spokes
    ctx.fillStyle = '#7A5A20';
    for (let a = 0; a < 8; a++) {
      const angle = a * Math.PI / 4 + t * 0.0003;
      const sx = wx + 1 + Math.round(Math.cos(angle) * 3);
      const sy = wy - 1 + Math.round(Math.sin(angle) * 3);
      ctx.fillRect(sx, sy, 1, 1);
    }
    ctx.fillStyle = '#6B4A18';
    ctx.fillRect(wx, wy - 1, 2, 1); // hub

    // Lantern (near left)
    const lx = Math.round(W * 0.25);
    ctx.fillStyle = '#5A3A10'; ctx.fillRect(lx, deckY - Math.round(H * 0.04), 1, Math.round(H * 0.04));
    ctx.fillStyle = '#FFD040';
    ctx.fillRect(lx - 1, deckY - Math.round(H * 0.05), 3, 2);
    // Lantern glow
    const lg = ctx.createRadialGradient(lx, deckY - Math.round(H * 0.04), 0, lx, deckY - Math.round(H * 0.04), Math.round(W * 0.04));
    lg.addColorStop(0, 'rgba(255,200,80,0.12)'); lg.addColorStop(1, 'rgba(255,200,80,0)');
    ctx.fillStyle = lg; ctx.fillRect(lx - Math.round(W * 0.04), deckY - Math.round(H * 0.07), Math.round(W * 0.08), Math.round(H * 0.06));

    // Lantern (right)
    const lx2 = Math.round(W * 0.72);
    ctx.fillStyle = '#5A3A10'; ctx.fillRect(lx2, deckY - Math.round(H * 0.04), 1, Math.round(H * 0.04));
    ctx.fillStyle = '#FFD040'; ctx.fillRect(lx2 - 1, deckY - Math.round(H * 0.05), 3, 2);
    const lg2 = ctx.createRadialGradient(lx2, deckY - Math.round(H * 0.04), 0, lx2, deckY - Math.round(H * 0.04), Math.round(W * 0.04));
    lg2.addColorStop(0, 'rgba(255,200,80,0.12)'); lg2.addColorStop(1, 'rgba(255,200,80,0)');
    ctx.fillStyle = lg2; ctx.fillRect(lx2 - Math.round(W * 0.04), deckY - Math.round(H * 0.07), Math.round(W * 0.08), Math.round(H * 0.06));

    // Rigging ropes from mast
    ctx.fillStyle = 'rgba(140,120,90,0.4)';
    ctx.beginPath(); ctx.moveTo(mx, Math.round(H * 0.2));
    ctx.lineTo(Math.round(W * 0.15), deckY - 2); ctx.lineTo(Math.round(W * 0.15) + 1, deckY - 2);
    ctx.lineTo(mx + 1, Math.round(H * 0.2)); ctx.fill();
    ctx.beginPath(); ctx.moveTo(mx, Math.round(H * 0.2));
    ctx.lineTo(Math.round(W * 0.88), deckY - 2); ctx.lineTo(Math.round(W * 0.88) + 1, deckY - 2);
    ctx.lineTo(mx + 1, Math.round(H * 0.2)); ctx.fill();

    // Cabin structure (far right, behind wheel)
    ctx.fillStyle = '#5A4010';
    ctx.fillRect(Math.round(W * 0.88), deckY - Math.round(H * 0.06), Math.round(W * 0.1), Math.round(H * 0.06));
    ctx.fillStyle = '#6B5020';
    ctx.fillRect(Math.round(W * 0.88), deckY - Math.round(H * 0.06), Math.round(W * 0.1), 1);
    // Cabin window
    ctx.fillStyle = '#FFE8A0';
    ctx.fillRect(Math.round(W * 0.91), deckY - Math.round(H * 0.04), 2, 2);
    // Cabin glow
    const cg = ctx.createRadialGradient(Math.round(W * 0.92), deckY - Math.round(H * 0.03), 0, Math.round(W * 0.92), deckY - Math.round(H * 0.03), Math.round(W * 0.03));
    cg.addColorStop(0, 'rgba(255,230,160,0.08)'); cg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cg; ctx.fillRect(Math.round(W * 0.88), deckY - Math.round(H * 0.06), Math.round(W * 0.12), Math.round(H * 0.06));
  },

  // --- Barnes & Noble battle scene ---
  shipBattle(t) {
    const { W, H } = G;
    const skyH = Math.round(H * 0.48), deckY = Math.round(H * 0.64);
    // Stormy emerald sky — darker and more dramatic
    drawGrad(0, skyH, [['#051510',0],['#0A2A1A',0.2],['#153A25',0.4],['#2A5A3A',0.6],['#3A7A4A',0.85],['#4A9A58',1]]);
    // Storm clouds — heavy emerald-tinted
    drawCloudBand(skyH, t, 'rgba(15,50,30,0.5)', 0.14, 5, 0.15);
    drawCloudBand(skyH, t, 'rgba(25,70,40,0.45)', 0.12, 15, 0.3);
    drawCloudBand(skyH, t, 'rgba(40,90,50,0.4)', 0.1, 28, 0.45);
    drawCloudBand(skyH, t, 'rgba(60,110,65,0.3)', 0.07, 40, 0.58);
    // Emerald moon
    drawMoonWithSpores(t, 'emerald', skyH);
    // Churning emerald water
    ctx.fillStyle = '#064A32'; ctx.fillRect(0, skyH, W, deckY - skyH);
    drawReflection(skyH, 'rgba(5,50,30,0.3)', t, deckY - skyH);
    drawWaveHL(skyH, deckY, t, '52,211,153', 6);

    // === Enemy B&N ship (right side, in the water) ===
    const eX = Math.round(W * 0.82), eWY = skyH + Math.round((deckY - skyH) * 0.2);
    const ehw = Math.round(W * 0.14), eBob = Math.round(Math.sin(t * 0.0015 + 1) * 1);
    // Enemy hull (dark, menacing)
    ctx.fillStyle = '#1A0A05';
    for (let row = 0; row < 5; row++) {
      const ins = Math.round(row * row * 0.15);
      ctx.fillRect(eX - Math.round(ehw / 2) + ins, eWY + row + eBob, ehw - ins * 2, 1);
    }
    ctx.fillStyle = '#2A1A0A';
    ctx.fillRect(eX - Math.round(ehw / 2), eWY - 1 + eBob, ehw, 1);
    // Enemy mast + sail
    ctx.fillStyle = '#2A1A0A'; ctx.fillRect(eX, eWY - Math.round(H * 0.1) + eBob, 1, Math.round(H * 0.1));
    ctx.fillStyle = '#A0A8B0';
    const esT = eWY - Math.round(H * 0.09) + eBob, esB = eWY - Math.round(H * 0.02) + eBob;
    for (let sy = esT; sy < esB; sy++) {
      const f = (sy - esT) / (esB - esT);
      const b = Math.round(Math.sin(f * Math.PI) * 2);
      ctx.fillRect(eX - Math.round(ehw * 0.18) - b, sy, Math.round(ehw * 0.36) + b * 2, 1);
    }
    // B&N green flag
    ctx.fillStyle = '#2E8B20'; ctx.fillRect(eX + 1, esT - 2, 3, 2);
    // Cannon flash (occasional)
    if (Math.sin(t * 0.003) > 0.85) {
      ctx.fillStyle = 'rgba(255,200,100,0.6)';
      ctx.fillRect(eX - Math.round(ehw / 2) - 2, eWY - 1 + eBob, 3, 2);
    }

    // === Flying books (arcing across sky) ===
    for (let i = 0; i < 6; i++) {
      const bt = ((t * 0.0016 + i * 0.95) % 3.2);
      if (bt < 2.6) {
        const bx = Math.round(W * 0.88 - bt * W * 0.24);
        const by = Math.round(skyH * 0.35 - Math.sin(bt * 0.9) * skyH * 0.2 + hash(i * 7) * skyH * 0.15);
        const rot = Math.floor(bt * 4) % 2;
        ctx.fillStyle = '#6B3A1A';
        if (rot === 0) {
          ctx.fillRect(bx, by, 3, 4);
          ctx.fillStyle = '#F5F0E0'; ctx.fillRect(bx + 1, by, 1, 4);
        } else {
          ctx.fillRect(bx, by, 4, 3);
          ctx.fillStyle = '#F5F0E0'; ctx.fillRect(bx, by + 1, 4, 1);
        }
      }
    }
    // Book impact splashes in water
    for (let i = 0; i < 3; i++) {
      const st = ((t * 0.001 + i * 1.8) % 2.5);
      if (st < 0.4) {
        const sx = Math.round(W * 0.12 + hash(i * 11 + 700) * W * 0.5);
        const sy = skyH + Math.round(hash(i * 13 + 800) * (deckY - skyH) * 0.4);
        ctx.fillStyle = `rgba(150,255,200,${0.4 - st})`;
        ctx.fillRect(sx - 2, sy - 1, 4, 1); ctx.fillRect(sx - 1, sy - 2, 2, 1); ctx.fillRect(sx - 1, sy, 2, 1);
      }
    }

    // === Deck (battle chaos) ===
    drawGrad(deckY, H, [['#8B6914',0],['#7A5A10',0.05],['#5A4010',1]]);
    ctx.fillStyle = '#9A7A20';
    for (let i = 0; i < 6; i++) ctx.fillRect(0, deckY + 1 + Math.round(i * H * 0.045), W, 1);
    ctx.fillStyle = '#5A3A10'; ctx.fillRect(0, deckY - 2, W, 3);
    for (let x = 0; x < W; x += Math.max(6, Math.round(W * 0.06)))
      ctx.fillRect(x, deckY - Math.round(H * 0.05), 2, Math.round(H * 0.05));
    // Mast — thick, extends to deck
    const mx = Math.round(W * 0.5);
    const bmastTop = Math.round(H * 0.18);
    ctx.fillStyle = '#5A3A10';
    ctx.fillRect(mx - 1, bmastTop, 3, deckY - bmastTop);
    ctx.fillStyle = '#6B4A18'; ctx.fillRect(mx - 1, bmastTop, 1, deckY - bmastTop);
    // Cross beam
    ctx.fillStyle = '#5A3A10';
    ctx.fillRect(mx - Math.round(W * 0.08), bmastTop + 2, Math.round(W * 0.16), 2);
    // Rectangular sail with billow
    const bsailL = mx - Math.round(W * 0.07), bsailR = mx + Math.round(W * 0.07);
    const bsailT = bmastTop + 5, bsailB = Math.round(H * 0.42);
    ctx.fillStyle = '#F0E4D0';
    for (let sy = bsailT; sy < bsailB; sy++) {
      const f = (sy - bsailT) / (bsailB - bsailT);
      const billow = Math.round(Math.sin(f * Math.PI) * W * 0.015);
      ctx.fillRect(bsailL - billow, sy, bsailR - bsailL + billow * 2, 1);
    }
    ctx.fillStyle = '#D8D0C0';
    for (let sy = bsailT + 2; sy < bsailB - 2; sy++) {
      const f = (sy - bsailT) / (bsailB - bsailT);
      const billow = Math.round(Math.sin(f * Math.PI) * W * 0.01);
      const sw3 = Math.round((bsailR - bsailL) * 0.4);
      ctx.fillRect(mx - Math.round(sw3 / 2), sy, sw3 + billow, 1);
    }
    ctx.fillStyle = '#C8C0B0';
    ctx.fillRect(bsailL, bsailT, bsailR - bsailL, 1);
    ctx.fillRect(bsailL - 1, bsailB - 1, bsailR - bsailL + 2, 1);
    ctx.fillRect(bsailL - 1, Math.round((bsailT + bsailB) / 2), bsailR - bsailL + 2, 1);
    // Scattered books on deck
    const bookPositions = [[0.12,0.02],[0.32,0.03],[0.65,0.01],[0.78,0.025],[0.22,0.04]];
    bookPositions.forEach(([bpx, bpy]) => {
      ctx.fillStyle = '#6B3A1A';
      ctx.fillRect(Math.round(W * bpx), deckY + Math.round(H * bpy), 3, 4);
      ctx.fillStyle = '#F5F0E0';
      ctx.fillRect(Math.round(W * bpx) + 1, deckY + Math.round(H * bpy), 1, 4);
    });
    // Barrel (knocked over)
    const by2 = deckY + Math.round(H * 0.02);
    ctx.fillStyle = '#6B4A20'; ctx.fillRect(Math.round(W * 0.08), by2 - 3, 5, 4);
    ctx.fillStyle = '#8B6A30'; ctx.fillRect(Math.round(W * 0.08), by2 - 2, 5, 1);
    // Swinging lantern
    const lx = Math.round(W * 0.28), swing = Math.round(Math.sin(t * 0.004) * 2);
    ctx.fillStyle = '#5A3A10'; ctx.fillRect(lx + swing, deckY - Math.round(H * 0.04), 1, Math.round(H * 0.04));
    ctx.fillStyle = '#FFD040'; ctx.fillRect(lx - 1 + swing, deckY - Math.round(H * 0.05), 3, 2);
    const lg = ctx.createRadialGradient(lx + swing, deckY - Math.round(H * 0.04), 0, lx + swing, deckY - Math.round(H * 0.04), Math.round(W * 0.04));
    lg.addColorStop(0, 'rgba(255,200,80,0.15)'); lg.addColorStop(1, 'rgba(255,200,80,0)');
    ctx.fillStyle = lg; ctx.fillRect(0, deckY - Math.round(H * 0.07), Math.round(W * 0.5), Math.round(H * 0.06));
  },

  // --- Open emerald water (driftwood crossing) ---
  openWater(t) {
    const { W, H } = G;
    const skyH = Math.round(H * 0.4);
    drawGrad(0, skyH, [['#0A2A30',0],['#1A4A48',0.3],['#2A6A5A',0.6],['#4A8A70',1]]);
    drawMoonWithSpores(t, 'emerald', skyH);
    drawCloudBand(skyH, t, 'rgba(40,120,80,0.25)', 0.07, 50, 0.35);
    drawGrad(skyH, H, [['#06503A',0],['#08604A',0.2],['#0A7058',0.5],['#0D8868',0.8],['#15A080',1]]);
    drawWaveHL(skyH, H, t, '52,211,153', 6);

    ctx.fillRect(Math.round(W * 0.25), dwy + bob, Math.round(W * 0.5), 1);

    ctx.fillRect(Math.round(W * 0.28), dwy + bob + 1, Math.round(W * 0.15), 1);

    for (let x = Math.round(W * 0.24); x < Math.round(W * 0.76); x += 3)

  // --- Looking up at a ship from water level ---
  shipBelow(t) {
    const { W, H } = G;
    // Emerald water fills most of screen
    drawGrad(0, Math.round(H * 0.25), [['#0A2A30',0],['#1A4A48',0.5],['#2A6A5A',1]]);
    drawMoonWithSpores(t, 'emerald', Math.round(H * 0.25));
    drawGrad(Math.round(H * 0.25), H, [['#06503A',0],['#08604A',0.3],['#0A7058',0.6],['#0D8868',1]]);
    drawWaveHL(Math.round(H * 0.25), H, t, '52,211,153', 5);
    // Massive ship hull looming above — takes up right/upper portion
    const hullL = Math.round(W * 0.4), hullBot = Math.round(H * 0.45);
    for (let row = 0; row < Math.round(H * 0.2); row++) {
      const y = hullBot - Math.round(H * 0.2) + row;
      const frac = row / (H * 0.2);
      const inset = Math.round((1 - frac) * W * 0.04);
      ctx.fillStyle = frac > 0.7 ? '#3A1808' : frac > 0.4 ? '#4A2210' : '#5A3018';
      ctx.fillRect(hullL + inset, y, W - hullL - inset, 1);
    }
    // Deck edge at top of hull
    ctx.fillStyle = '#8B6914'; ctx.fillRect(hullL, hullBot - Math.round(H * 0.2) - 1, W - hullL, 2);
    // Railing and posts
    ctx.fillStyle = '#6B4A18';
    for (let i = 0; i < 4; i++) {
      const px = hullL + Math.round(i * (W - hullL) / 3);
      ctx.fillRect(px, hullBot - Math.round(H * 0.23), 2, Math.round(H * 0.03));
    }
    ctx.fillRect(hullL, hullBot - Math.round(H * 0.23), W - hullL, 1);
    // Portholes
    ctx.fillStyle = '#2A1408';
    for (let i = 0; i < 3; i++)
      ctx.fillRect(hullL + 8 + i * Math.round((W - hullL) / 4), hullBot - Math.round(H * 0.1), 3, 3);
    // Water splash at hull waterline
    ctx.fillStyle = 'rgba(100,230,170,0.35)';
    for (let x = hullL - 2; x < W; x += 2)
      ctx.fillRect(x, hullBot + Math.round(Math.sin(x * 0.15 + t * 0.003) * 1), 1, 1);
    // Driftwood where Ulisa stands (bottom left)
    const dwy = Math.round(H * 0.6), bob = Math.round(Math.sin(t * 0.001) * 1);
    ctx.fillStyle = '#6B4A20';
    ctx.fillRect(Math.round(W * 0.05), dwy + bob, Math.round(W * 0.35), 3);
    ctx.fillStyle = '#7A5A28';
    ctx.fillRect(Math.round(W * 0.05), dwy + bob, Math.round(W * 0.35), 1);
  },

  // --- Bookstore interior (working at B&N) ---
  bookstore(t) {
    const { W, H } = G;
    drawGrad(0, H, [['#2A1A10',0],['#3A2A18',0.3],['#4A3420',0.7],['#3A2818',1]]);
    // Warm lighting
    const lg = ctx.createRadialGradient(Math.round(W * 0.5), Math.round(H * 0.3), 0, Math.round(W * 0.5), Math.round(H * 0.3), Math.round(W * 0.45));
    lg.addColorStop(0, 'rgba(255,200,120,0.2)'); lg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = lg; ctx.fillRect(0, 0, W, H);
    // Floor
    ctx.fillStyle = '#3A2A18'; ctx.fillRect(0, Math.round(H * 0.65), W, Math.round(H * 0.35));
    ctx.fillStyle = '#2E2010';
    for (let i = 0; i < 5; i++) ctx.fillRect(0, Math.round(H * 0.65 + i * H * 0.06), W, 1);
    // Tall bookshelves (left and right walls)
    for (let side = 0; side < 2; side++) {
      const sx = side === 0 ? 0 : Math.round(W * 0.82);
      const sw = Math.round(W * 0.18);
      ctx.fillStyle = '#4A3420'; ctx.fillRect(sx, 0, sw, Math.round(H * 0.65));
      // Shelf rows
      for (let row = 0; row < 5; row++) {
        const sy = Math.round(H * 0.08 + row * H * 0.11);
        ctx.fillStyle = '#3A2818'; ctx.fillRect(sx, sy + Math.round(H * 0.08), sw, 2);
        // Books on shelf (colored spines)
        const bookColors = ['#CC3333','#2255AA','#228844','#885522','#6644AA','#AA6622','#3366AA','#44AA44'];
        for (let b = 0; b < 6; b++) {
          ctx.fillStyle = bookColors[(row * 6 + b + side * 3) % bookColors.length];
          const bw = 2 + Math.round(hash(row * 10 + b + side * 50) * 2);
          ctx.fillRect(sx + 2 + b * Math.round(sw / 7), sy + 1, bw, Math.round(H * 0.07));
        }
      }
    }
    // Counter in center
    ctx.fillStyle = '#5A4020'; ctx.fillRect(Math.round(W * 0.3), Math.round(H * 0.52), Math.round(W * 0.4), Math.round(H * 0.04));
    ctx.fillStyle = '#6A5028'; ctx.fillRect(Math.round(W * 0.3), Math.round(H * 0.52), Math.round(W * 0.4), 1);
    // Stack of books on counter
    ctx.fillStyle = '#2255AA'; ctx.fillRect(Math.round(W * 0.55), Math.round(H * 0.48), 4, 4);
    ctx.fillStyle = '#CC3333'; ctx.fillRect(Math.round(W * 0.56), Math.round(H * 0.47), 4, 3);
    ctx.fillStyle = '#228844'; ctx.fillRect(Math.round(W * 0.54), Math.round(H * 0.46), 5, 2);
    // "B&N" sign
    ctx.fillStyle = '#2E8B20';
    ctx.fillRect(Math.round(W * 0.35), Math.round(H * 0.06), Math.round(W * 0.3), Math.round(H * 0.06));
    ctx.fillStyle = '#F5F0E0';
    ctx.font = `bold ${Math.max(4, Math.round(W * 0.035))}px -apple-system,sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('BARNES & NOBLE', Math.round(W * 0.5), Math.round(H * 0.1));
  },

  // --- Sea transition: emerald to crimson ---
  seaCrossing(t) {
    const { W, H } = G;
    const skyH = Math.round(H * 0.42), deckY = Math.round(H * 0.64);
    // Sky blends from emerald tones to warm crimson sunset
    drawGrad(0, skyH, [['#0A1A20',0],['#1A2A30',0.15],['#2A3A38',0.3],['#4A3A30',0.5],['#6A3A2A',0.7],['#AA5040',0.85],['#DD7050',1]]);
    drawStars(Math.round(H * 0.15), t);
    drawMoonWithSpores(t, 'emerald', skyH);
    drawCloudBand(skyH, t, 'rgba(60,80,60,0.3)', 0.07, 55, 0.3);
    drawCloudBand(skyH, t, 'rgba(100,60,50,0.25)', 0.06, 70, 0.5);
    // Water: emerald on left, crimson on right (stops at deck)
    for (let x = 0; x < W; x++) {
      const frac = x / W;
      const r = Math.round(6 + frac * 70);
      const g2 = Math.round(80 - frac * 55);
      const b = Math.round(58 - frac * 40);
      ctx.fillStyle = `rgb(${r},${g2},${b})`;
      ctx.fillRect(x, skyH, 1, deckY - skyH);
    }
    // Wave highlights blend
    for (let i = 0; i < 6; i++) {
      const wy = skyH + 3 + Math.round(i * (deckY - skyH) / 7);
      for (let x = 0; x < W; x += 4) {
        if (hash(x * 2 + i * 13 + Math.floor(t * 0.0008)) > 0.55) {
          const frac = x / W;
          const a = Math.max(0.03, 0.12 - i * 0.012);
          ctx.fillStyle = frac < 0.5 ? `rgba(52,211,153,${a})` : `rgba(248,113,113,${a})`;
          ctx.fillRect(x + Math.round(Math.sin(x * 0.08 + t * 0.001)), wy, 2, 1);
        }
      }
    }
    // Shimmering boundary line
    const midX = Math.round(W * 0.5);
    for (let y = skyH; y < deckY; y += 2) {
      const shimmer = Math.round(Math.sin(y * 0.1 + t * 0.002) * 3);
      ctx.fillStyle = `rgba(255,220,180,${0.06 + 0.03 * Math.sin(y * 0.05 + t * 0.001)})`;
      ctx.fillRect(midX + shimmer, y, 1, 2);
    }
    // Ship deck
    drawGrad(deckY, H, [['#8B6914',0],['#7A5A10',0.05],['#5A4010',1]]);
    ctx.fillStyle = '#9A7A20';
    for (let i = 0; i < 6; i++) ctx.fillRect(0, deckY + 1 + Math.round(i * H * 0.045), W, 1);
    // Railing
    ctx.fillStyle = '#5A3A10'; ctx.fillRect(0, deckY - 2, W, 3);
    for (let x = 0; x < W; x += Math.max(6, Math.round(W * 0.06)))
      ctx.fillRect(x, deckY - Math.round(H * 0.05), 2, Math.round(H * 0.05));
  },

  // --- Cabin door (eavesdropping scene) ---
  cabinDoor(t) {
    const { W, H } = G;
    // Dark ship interior
    drawGrad(0, H, [['#1A1008',0],['#2A1A10',0.3],['#3A2818',0.7],['#2A1A10',1]]);
    // Wood plank walls
    ctx.fillStyle = '#3A2818';
    for (let y = 0; y < H; y += Math.max(4, Math.round(H * 0.03))) {
      ctx.fillRect(0, y, W, 1);
      ctx.fillStyle = '#2A1A0A'; ctx.fillRect(0, y + 1, W, 1); ctx.fillStyle = '#3A2818';
    }
    // Floor
    ctx.fillStyle = '#2A1808'; ctx.fillRect(0, Math.round(H * 0.7), W, Math.round(H * 0.3));
    ctx.fillStyle = '#3A2818';
    for (let x = 0; x < W; x += Math.max(6, Math.round(W * 0.06)))
      ctx.fillRect(x, Math.round(H * 0.7), 1, Math.round(H * 0.3));
    // Door frame (center-right)
    const doorL = Math.round(W * 0.45), doorW2 = Math.round(W * 0.25);
    const doorTop = Math.round(H * 0.15), doorBot = Math.round(H * 0.7);
    ctx.fillStyle = '#4A3420';
    ctx.fillRect(doorL - 3, doorTop - 3, doorW2 + 6, doorBot - doorTop + 6);
    // Door
    ctx.fillStyle = '#5A4028';
    ctx.fillRect(doorL, doorTop, doorW2, doorBot - doorTop);
    // Door planks
    ctx.fillStyle = '#4A3018';
    ctx.fillRect(doorL + Math.round(doorW2 * 0.5), doorTop, 1, doorBot - doorTop);
    ctx.fillRect(doorL, doorTop + Math.round((doorBot - doorTop) * 0.33), doorW2, 1);
    ctx.fillRect(doorL, doorTop + Math.round((doorBot - doorTop) * 0.66), doorW2, 1);
    // Door handle
    ctx.fillStyle = '#C0A060';
    ctx.fillRect(doorL + doorW2 - 4, Math.round((doorTop + doorBot) / 2), 2, 2);
    // Light leaking from under/around door
    ctx.fillStyle = 'rgba(255,200,120,0.12)';
    ctx.fillRect(doorL - 1, doorTop, 1, doorBot - doorTop);
    ctx.fillRect(doorL + doorW2, doorTop, 1, doorBot - doorTop);
    ctx.fillRect(doorL, doorBot, doorW2, 2);
    // Warm glow from gap
    const dg = ctx.createRadialGradient(doorL + Math.round(doorW2 / 2), Math.round((doorTop + doorBot) / 2), 0,
      doorL + Math.round(doorW2 / 2), Math.round((doorTop + doorBot) / 2), Math.round(W * 0.2));
    dg.addColorStop(0, 'rgba(255,180,80,0.08)'); dg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = dg; ctx.fillRect(0, 0, W, H);
    // Lantern on wall (left side)
    const lx = Math.round(W * 0.15);
    ctx.fillStyle = '#5A3A10'; ctx.fillRect(lx, Math.round(H * 0.3), 1, 4);
    ctx.fillStyle = '#FFD040'; ctx.fillRect(lx - 1, Math.round(H * 0.28), 3, 2);
    const lg = ctx.createRadialGradient(lx, Math.round(H * 0.29), 0, lx, Math.round(H * 0.29), Math.round(W * 0.06));
    lg.addColorStop(0, 'rgba(255,200,80,0.15)'); lg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = lg; ctx.fillRect(0, Math.round(H * 0.2), Math.round(W * 0.3), Math.round(H * 0.2));
  },

  // --- Crimson sea parting with steps ---
  seaParting(t) {
    const { W, H } = G;
    const skyH = Math.round(H * 0.35);
    // Dark crimson sky
    drawGrad(0, skyH, [['#1A0810',0],['#3A1020',0.3],['#6A2030',0.6],['#AA4040',1]]);
    drawStars(Math.round(H * 0.15), t);
    drawMoonWithSpores(t, 'crimson', skyH);
    drawCloudBand(skyH, t, 'rgba(100,30,30,0.35)', 0.08, 50, 0.3);
    // Crimson sea — left and right sides, parted in the middle
    const gapL = Math.round(W * 0.35), gapR = Math.round(W * 0.65);
    // Left water wall
    drawGrad(skyH, H, [['#4A1A1A',0],['#6A2020',0.3],['#8A3030',0.6],['#AA4040',1]]);
    // Clear the gap
    ctx.fillStyle = '#0A0508'; ctx.fillRect(gapL, skyH, gapR - gapL, H - skyH);
    // Steps going down into the gap
    const stepW = Math.round((gapR - gapL) * 0.6);
    const stepX = Math.round(W * 0.5 - stepW / 2);
    for (let i = 0; i < 12; i++) {
      const sy = skyH + Math.round(i * (H - skyH) / 10);
      const sw = stepW - Math.round(i * stepW * 0.03);
      const sx = Math.round(W * 0.5 - sw / 2);
      ctx.fillStyle = i % 2 === 0 ? '#3A2020' : '#2A1515';
      ctx.fillRect(sx, sy, sw, Math.max(2, Math.round((H - skyH) / 11)));
      // Step edge highlight
      ctx.fillStyle = '#5A3030'; ctx.fillRect(sx, sy, sw, 1);
    }
    // Water walls — wavy edges facing the gap
    ctx.fillStyle = '#8A3030';
    for (let y = skyH; y < H; y++) {
      const waveL = gapL + Math.round(Math.sin(y * 0.08 + t * 0.002) * 3);
      const waveR = gapR + Math.round(Math.sin(y * 0.08 + t * 0.002 + 2) * 3);
      ctx.fillRect(waveL - 2, y, 2, 1);
      ctx.fillRect(waveR, y, 2, 1);
    }
    // Crimson spore mist at the bottom of the gap
    for (let i = 0; i < 8; i++) {
      const mx = gapL + Math.round(hash(i * 7 + 300) * (gapR - gapL));
      const my = Math.round(H * 0.7 + hash(i * 13 + 400) * H * 0.2);
      const ma = 0.1 + 0.1 * Math.sin(t * 0.001 + i * 2);
      ctx.fillStyle = `rgba(255,100,80,${ma})`;
      ctx.fillRect(mx, my, 2, 1);
    }
    // Glowing edges of the water walls
    ctx.fillStyle = 'rgba(255,120,100,0.15)';
    for (let y = skyH; y < H; y += 2) {
      ctx.fillRect(gapL - 1, y, 1, 1);
      ctx.fillRect(gapR, y, 1, 1);
    }
    // Ship deck at top
    ctx.fillStyle = '#8B6914'; ctx.fillRect(0, skyH - 3, W, 3);
    ctx.fillStyle = '#5A3A10'; ctx.fillRect(0, skyH - 5, W, 2);
  },

  burritos(t) {
    const { W, H } = G;
    drawSky(['#87CEEB','#FFB347'], H * 0.4);
    ctx.fillStyle = '#F5DEB3'; ctx.fillRect(0, H * 0.5, W, H * 0.5);
    ctx.fillStyle = '#E8D5B0'; ctx.fillRect(0, H * 0.48, W, H * 0.04);
    // Shop
    ctx.fillStyle = '#CD853F'; ctx.fillRect(W * 0.2, H * 0.3, W * 0.6, H * 0.2);
    ctx.fillStyle = '#8B4513';
    ctx.beginPath(); ctx.moveTo(W * 0.15, H * 0.3); ctx.lineTo(W * 0.5, H * 0.15); ctx.lineTo(W * 0.85, H * 0.3); ctx.fill();
    // Sign
    ctx.fillStyle = '#FFD700'; ctx.fillRect(W * 0.3, H * 0.2, W * 0.4, H * 0.06);
    ctx.fillStyle = '#5D3A1A'; ctx.font = `bold ${Math.max(11, W * 0.03)}px -apple-system,sans-serif`;
    ctx.textAlign = 'center'; ctx.fillText('LITOS BURRITOS', W * 0.5, H * 0.245);
    // Door
    ctx.fillStyle = '#5D3A1A'; ctx.fillRect(W * 0.44, H * 0.36, W * 0.12, H * 0.14);
    // Windows
    ctx.fillStyle = '#FFE4B5';
    ctx.fillRect(W * 0.26, H * 0.35, W * 0.1, H * 0.08);
    ctx.fillRect(W * 0.64, H * 0.35, W * 0.1, H * 0.08);
  },

  cafe(t) {
    const { W, H } = G;
    ctx.fillStyle = '#3E2723'; ctx.fillRect(0, 0, W, H);
    const lg = ctx.createRadialGradient(W * 0.5, H * 0.3, 0, W * 0.5, H * 0.3, W * 0.5);
    lg.addColorStop(0, 'rgba(255,180,80,0.25)'); lg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = lg; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#5D4037'; ctx.fillRect(0, H * 0.65, W, H * 0.35);
    // Counter
    ctx.fillStyle = '#795548'; ctx.fillRect(W * 0.05, H * 0.52, W * 0.9, H * 0.06);
    // Shelves
    ctx.fillStyle = '#4E342E';
    ctx.fillRect(W * 0.05, H * 0.2, W * 0.12, H * 0.03);
    ctx.fillRect(W * 0.83, H * 0.2, W * 0.12, H * 0.03);
    ctx.fillRect(W * 0.05, H * 0.32, W * 0.12, H * 0.03);
    ctx.fillRect(W * 0.83, H * 0.32, W * 0.12, H * 0.03);
    // Cups on shelves
    const cupColors = ['#A7F3D0','#F5A0C0','#A8D8EA','#FFD700'];
    for (let i = 0; i < 4; i++) {
      ctx.fillStyle = cupColors[i];
      ctx.fillRect(W * 0.07 + i * W * 0.025, H * 0.17, W * 0.015, H * 0.03);
    }
  },

  museum(t) {
    const { W, H } = G;
    ctx.fillStyle = '#F5F5F0'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#D4C5A9'; ctx.fillRect(0, H * 0.72, W, H * 0.28);
    // Frames
    const frameColors = ['#E8D4B0','#D4E8D0','#D0D4E8'];
    for (let i = 0; i < 3; i++) {
      const fx = W * 0.08 + i * W * 0.3;
      ctx.fillStyle = '#8B7355'; ctx.fillRect(fx, H * 0.12, W * 0.22, H * 0.35);
      ctx.fillStyle = frameColors[i]; ctx.fillRect(fx + 5, H * 0.12 + 5, W * 0.22 - 10, H * 0.35 - 10);
    }
    // Bench
    ctx.fillStyle = '#654321'; ctx.fillRect(W * 0.3, H * 0.6, W * 0.4, H * 0.04);
    ctx.fillRect(W * 0.33, H * 0.64, W * 0.02, H * 0.08);
    ctx.fillRect(W * 0.65, H * 0.64, W * 0.02, H * 0.08);
  },

  lakeSunset(t) {
    const { W, H } = G;
    const waterY = Math.round(H * 0.46);
    drawGrad(0, waterY, [['#0A0A30',0],['#1A1050',0.12],['#3A1A58',0.25],['#6B3A5E',0.38],
      ['#AA4A5A',0.5],['#DD6A4A',0.65],['#FF9A45',0.8],['#FFD060',0.92],['#FFF0A0',1]]);
    drawStars(Math.round(H * 0.18), t);
    drawMoonWithSpores(t, 'crimson', waterY);
    drawCloudBand(waterY, t, 'rgba(80,40,65,0.45)', 0.12, 5, 0.15);
    drawCloudBand(waterY, t, 'rgba(140,60,70,0.4)', 0.1, 18, 0.28);
    drawCloudBand(waterY, t, 'rgba(190,100,80,0.35)', 0.08, 30, 0.42);
    drawCloudBand(waterY, t, 'rgba(220,150,90,0.3)', 0.06, 42, 0.55);
    const sunX = Math.round(W * 0.5), sunY = Math.round(waterY * 0.88);
    const sg = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, Math.round(W * 0.12));
    sg.addColorStop(0, 'rgba(255,240,180,0.5)'); sg.addColorStop(0.5, 'rgba(255,200,100,0.15)');
    sg.addColorStop(1, 'rgba(255,200,100,0)');
    ctx.fillStyle = sg; ctx.fillRect(0, 0, W, waterY);
    drawHill(waterY + 1, H * 0.04, '#120525', 3);
    drawHill(waterY - 1, H * 0.06, '#0E0420', 8);
    drawHill(waterY + 2, H * 0.025, '#180830', 20);
    ctx.fillStyle = '#FFE0A0';
    for (let i = 0; i < 6; i++) {
      const tx = Math.round(W * 0.6 + i * W * 0.03);
      const ty = Math.round(waterY - 2 - hash(i * 7 + 500) * H * 0.015);
      ctx.fillRect(tx, ty, 1, 1);
      if (hash(i * 11 + 600) > 0.5) ctx.fillRect(tx + 1, ty + 1, 1, 1);
    }
    ctx.fillStyle = '#0A0520'; ctx.fillRect(0, waterY, W, H - waterY);
    drawReflection(waterY, 'rgba(8,4,20,0.12)', t);
    for (let i = 0; i < 10; i++) {
      const py = waterY + 2 + Math.round(i * (H - waterY) / 12);
      const pw = Math.max(1, Math.round(W * 0.05 - i * W * 0.003));
      ctx.fillStyle = `rgba(255,220,140,${Math.max(0.03, 0.22 - i * 0.018)})`;
      ctx.fillRect(Math.round(W * 0.5 - pw / 2) + Math.round(Math.sin(py * 0.2 + t * 0.002)), py, pw, 1);
    }
  },

  tower(t) {
    const { W, H } = G;
    drawGrad(0, H, [['#050010',0],['#0A0520',0.4],['#150A30',1]]);
    const wallW = Math.max(4, Math.round(W * 0.07));
    ctx.fillStyle = '#1A1028'; ctx.fillRect(0, 0, wallW, H); ctx.fillRect(W - wallW, 0, wallW, H);
    ctx.fillStyle = '#201230';
    for (let y = 0; y < H; y += 4) {
      const off = (Math.floor(y / 4) % 2) * 2;
      for (let x = 0; x < wallW; x += 4) ctx.fillRect(x + off, y, 3, 3);
      for (let x = W - wallW; x < W; x += 4) ctx.fillRect(x + off, y, 3, 3);
    }
    for (let i = 0; i < 20; i++) {
      const px = Math.round(W * 0.1 + (i * 173.7) % (W * 0.8));
      const py = Math.round((H * 0.1 + (i * 97.3 + t * 0.01) % (H * 0.65)));
      const bright = 0.15 + 0.45 * Math.sin(t * 0.002 + i * 3);
      ctx.fillStyle = `rgba(139,92,246,${bright * 0.3})`; ctx.fillRect(px - 1, py - 1, 3, 3);
      ctx.fillStyle = `rgba(139,92,246,${bright})`; ctx.fillRect(px, py, 1, 1);
    }
    ctx.fillStyle = '#120820'; ctx.fillRect(0, Math.round(H * 0.75), W, Math.round(H * 0.25));
    ctx.fillStyle = '#1A1030'; ctx.fillRect(0, Math.round(H * 0.75), W, 1);
    const tw = Math.max(4, Math.round(W * 0.07));
    for (let x = 0; x < W; x += tw) ctx.fillRect(x, Math.round(H * 0.75) + 1, tw - 1, tw - 1);
  },

  towerTop(t) {
    const { W, H } = G;
    drawGrad(0, Math.round(H * 0.72), [['#030012',0],['#08032A',0.3],['#120840',0.6],['#1A0A50',1]]);
    drawMoonWithSpores(t, 'midnight', Math.round(H * 0.72));
    for (let i = 0; i < 70; i++) {
      const sx = Math.round((i * 137.5 + 23) % W), sy = Math.round((i * 83.7 + 11) % (H * 0.65));
      const bright = 0.2 + 0.6 * Math.sin(t * 0.0006 + i * 2.1);
      const big = hash(i * 17) > 0.9;
      ctx.fillStyle = `rgba(255,255,255,${bright})`;
      ctx.fillRect(sx, sy, big ? 2 : 1, 1);
      if (big) ctx.fillRect(sx, sy + 1, 1, 1);
    }
    const mg = ctx.createRadialGradient(Math.round(W * 0.5), Math.round(H * 0.42), 0, Math.round(W * 0.5), Math.round(H * 0.42), Math.round(W * 0.3));
    mg.addColorStop(0, 'rgba(100,230,180,0.12)'); mg.addColorStop(0.4, 'rgba(139,92,246,0.06)'); mg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = mg; ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 3; i++) {
      const ay = Math.round(H * 0.15 + i * H * 0.08);
      ctx.fillStyle = `rgba(100,220,180,${0.04 + 0.02 * Math.sin(t * 0.0005 + i)})`;
      for (let x = 0; x < W; x++) {
        const h = Math.round(2 + fbm(x * 0.02 + i * 5 + t * 0.00005, 3) * 3);
        ctx.fillRect(x, ay + Math.round(Math.sin(x * 0.03 + t * 0.0003) * 2), 1, h);
      }
    }
    const platY = Math.round(H * 0.72);
    ctx.fillStyle = '#1A1040'; ctx.fillRect(0, platY, W, H - platY);
    ctx.fillStyle = '#2A1A55'; ctx.fillRect(0, platY, W, 2);
    ctx.fillStyle = '#201245';
    for (let x = 0; x < W; x += Math.max(4, Math.round(W * 0.06)))
      ctx.fillRect(x, platY + 2, Math.max(3, Math.round(W * 0.06) - 1), Math.max(3, Math.round(H * 0.04)));
  },

  ending(t) {
    const { W, H } = G;
    const waterY = Math.round(H * 0.42);
    drawGrad(0, waterY, [['#050020',0],['#150840',0.25],['#301850',0.45],['#6A3055',0.65],['#BB5A55',0.82],['#FFB080',1]]);
    drawStars(Math.round(H * 0.28), t);
    drawMoonWithSpores(t, 'emerald', waterY);
    drawCloudBand(waterY, t, 'rgba(100,50,70,0.28)', 0.06, 55, 0.38);
    drawCloudBand(waterY, t, 'rgba(160,80,80,0.22)', 0.05, 70, 0.54);
    ctx.fillStyle = '#080420'; ctx.fillRect(0, waterY, W, H - waterY);
    drawReflection(waterY, 'rgba(5,3,15,0.12)', t);
    for (let i = 0; i < 6; i++) {
      const py = waterY + 2 + Math.round(i * (H - waterY) / 8);
      const pw = Math.max(1, Math.round(W * 0.03));
      ctx.fillStyle = `rgba(255,200,140,${Math.max(0.03, 0.12 - i * 0.015)})`;
      ctx.fillRect(Math.round(W * 0.5 - pw / 2) + Math.round(Math.sin(py * 0.2 + t * 0.002)), py, pw, 1);
    }
  }
};

// ============================================================
// DRAWING — Characters
// ============================================================
function drawPerson(x, y, hair, shirt, pants, shoes, hairLen, facing, t) {
  const s = PX;
  const bob = Math.sin((t || 0) * 0.0015) * 1.5;
  ctx.save();
  ctx.translate(x, y + bob);
  if (facing < 0) ctx.scale(-1, 1);
  // Head
  ctx.fillStyle = '#F5DEB3'; ctx.fillRect(-2*s, -11*s, 4*s, 4*s);
  // Hair
  ctx.fillStyle = hair;
  ctx.fillRect(-3*s, -12*s, 6*s, 3*s);
  if (hairLen > 0) { ctx.fillRect(-3*s, -9*s, s, hairLen*s); ctx.fillRect(2*s, -9*s, s, hairLen*s); }
  // Eyes
  ctx.fillStyle = '#3a2a1a'; ctx.fillRect(-s, -10*s, s, s); ctx.fillRect(s, -10*s, s, s);
  // Shirt
  ctx.fillStyle = shirt;
  ctx.fillRect(-2*s, -7*s, 4*s, 4*s);
  ctx.fillRect(-3*s, -7*s, s, 3*s); ctx.fillRect(2*s, -7*s, s, 3*s);

}
