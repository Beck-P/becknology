<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helicopter — Becknology</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0a0218; color: #fff; font-family: 'Courier New', Consolas, monospace; height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }

  /* ─────────── Cabinet (Helicopter: synthwave magenta + cyan) ─────────── */
  .cabinet {
    position: relative;
    width: min(1100px, 98vw);
    background:
      linear-gradient(180deg, #2a0c4a 0%, #4a1666 35%, #6e1b66 60%, #2a0c4a 100%);
    border: 1px solid #7c3aed;
    border-radius: 12px;
    padding: 14px;
    box-shadow:
      0 30px 70px rgba(220,40,180,0.25),
      0 0 40px rgba(120,80,240,0.18),
      inset 0 1px 0 rgba(255,255,255,0.06),
      inset 0 -1px 0 rgba(0,0,0,0.6);
  }
  /* faint pixel speckle */
  .cabinet::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 3px 3px;
    border-radius: 12px;
  }

  .marquee {
    position: relative; height: 64px;
    background: linear-gradient(180deg, #1a0030 0%, #2a064a 50%, #1a0030 100%);
    border: 1px solid #ff39c0;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    box-shadow:
      inset 0 0 30px rgba(255,57,192,0.2),
      0 0 16px rgba(255,57,192,0.3);
  }
  .marquee-text {
    font-family: 'Courier New', monospace;
    font-size: 1.6rem;
    font-weight: bold;
    letter-spacing: 12px;
    color: #ff70d0;
    text-shadow:
      0 0 4px #ff70d0,
      0 0 12px #ff39c0,
      0 0 24px rgba(255,57,192,0.6),
      2px 0 0 rgba(0,255,234,0.6),
      -2px 0 0 rgba(255,200,80,0.5);
  }
  .marquee-text .star { color: #00f5ff; opacity: 0.9; margin: 0 10px; text-shadow: 0 0 12px #00f5ff; }

  .marquee-bulbs {
    position: absolute; top: 4px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; pointer-events: none;
  }
  .marquee-bulbs.bottom { top: auto; bottom: 4px; }
  .bulb {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .bulb.pink { background: #ff39c0; box-shadow: 0 0 8px #ff39c0, 0 0 2px #fff; }
  .bulb.cyan { background: #00f5ff; box-shadow: 0 0 8px #00f5ff, 0 0 2px #fff; }
  .bulb.flicker { animation: bulb-flicker 4s steps(1) infinite; animation-delay: var(--d, 0s); }
  @keyframes bulb-flicker {
    0%, 92%, 100% { opacity: 1; }
    93%, 95% { opacity: 0.05; }
    96% { opacity: 1; }
  }

  .cabinet-body {
    display: grid;
    grid-template-columns: 90px 1fr 90px;
    gap: 12px; margin: 14px 0;
  }

  .side-art {
    background:
      linear-gradient(180deg, #1a0030 0%, #350860 40%, #ff39c0 75%, #ff8a3a 88%, #1a0030 100%);
    border: 1px solid #6a1a8a;
    border-radius: 6px;
    position: relative; overflow: hidden;
  }
  /* synthwave grid floor */
  .side-art::before {
    content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 35%;
    background-image:
      linear-gradient(0deg, rgba(0,245,255,0.7) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.4) 1px, transparent 1px);
    background-size: 100% 14%, 30% 100%;
    background-position: 0 100%, 50% 100%;
    transform: perspective(60px) rotateX(40deg);
    transform-origin: bottom;
  }
  /* sun disc */
  .side-art::after {
    content: ''; position: absolute; left: 50%; top: 38%;
    transform: translateX(-50%);
    width: 50px; height: 50px;
    background: radial-gradient(circle, #ffe75e 0%, #ff39c0 60%, transparent 75%);
    border-radius: 50%;
    box-shadow: 0 0 25px rgba(255,57,192,0.6);
  }
  .side-label {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%) rotate(-90deg);
    transform-origin: center; transform: translateX(-50%) rotate(-90deg) translateY(-30px);
    font-size: 0.55rem; letter-spacing: 4px; color: #00f5ff; text-shadow: 0 0 6px #00f5ff;
    white-space: nowrap; pointer-events: none;
  }

  .screen-bezel {
    background: #000;
    border: 6px solid #1a0030;
    border-radius: 6px;
    padding: 8px;
    box-shadow:
      inset 0 0 40px rgba(0,0,0,0.9),
      0 0 30px rgba(255,57,192,0.25),
      0 0 60px rgba(0,245,255,0.1);
    position: relative;
  }

  .stage { position: relative; width: 100%; aspect-ratio: 16/9; }
  canvas { width: 100%; height: 100%; display: block; background: #050010; image-rendering: pixelated; }

  .hud {
    position: absolute; top: 12px; left: 16px; right: 16px;
    display: flex; justify-content: space-between;
    pointer-events: none; font-size: 14px;
    color: #00f5ff; letter-spacing: 2px;
    text-shadow: 0 0 6px #00f5ff, 1px 0 0 #ff39c0;
    z-index: 2;
  }
  .hud .left, .hud .right { display: flex; gap: 16px; align-items: center; }
  .hud .coins { color: #ffe75e; text-shadow: 0 0 6px #ffe75e; }

  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(10,2,30,0.85); text-align: center; padding: 20px; z-index: 3;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 2rem; color: #ff70d0; letter-spacing: 8px; margin-bottom: 0.5rem;
    text-shadow: 0 0 12px #ff39c0, 2px 0 0 #00f5ff, -2px 0 0 #ffe75e;
  }
  .overlay p { color: #aaa; margin: 0.4rem 0; font-size: 0.9rem; letter-spacing: 1px; }
  .overlay .key { color: #00f5ff; text-shadow: 0 0 6px #00f5ff; }
  .overlay .new-best { color: #ffe75e; text-shadow: 0 0 12px #ffe75e; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  .stage::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 4;
    background: repeating-linear-gradient(transparent, transparent 3px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px);
    mix-blend-mode: multiply;
  }

  .back {
    position: absolute; bottom: 10px; left: 14px;
    color: #ff70d0; font-size: 0.7rem; letter-spacing: 2px; text-decoration: none;
    pointer-events: auto; z-index: 5; text-shadow: 0 0 6px #ff39c0;
  }
  .back:hover { color: #00f5ff; text-shadow: 0 0 6px #00f5ff; }

  .control-panel {
    height: 44px;
    background: linear-gradient(180deg, #2a0048 0%, #1a0030 100%);
    border: 1px solid #6a1a8a;
    border-radius: 6px;
    display: flex; align-items: center; padding: 0 18px; gap: 18px;
    font-family: 'Courier New', monospace;
    font-size: 0.7rem; color: #c990e0; letter-spacing: 3px;
    box-shadow: inset 0 0 20px rgba(255,57,192,0.15);
  }
  .control-panel .stick {
    width: 18px; height: 18px;
    border: 1px solid #ff39c0;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff39c0, #6a1a8a);
    box-shadow: 0 0 6px #ff39c0;
  }
  .control-panel .btn {
    padding: 4px 10px; border: 1px solid #ff39c0; border-radius: 3px;
    background: linear-gradient(180deg, #4a1666, #1a0030);
    color: #ff70d0; font-size: 0.65rem; letter-spacing: 2px;
    text-shadow: 0 0 4px #ff39c0;
    box-shadow: 0 0 8px rgba(255,57,192,0.3);
  }
  .control-panel .btn.cyan { border-color: #00f5ff; color: #00f5ff; text-shadow: 0 0 4px #00f5ff; box-shadow: 0 0 8px rgba(0,245,255,0.3); }
  .control-panel .credit { margin-left: auto; color: #ffe75e; text-shadow: 0 0 6px #ffe75e; }
  .control-panel .credit::before { content: '◉'; margin-right: 6px; }

  @media (max-width: 800px) {
    body { padding: 6px; }
    .cabinet { padding: 8px; border-radius: 8px; }
    .cabinet-body { grid-template-columns: 0 1fr 0; gap: 0; }
    .side-art { display: none; }
    .marquee { height: 46px; }
    .marquee-text { font-size: 1rem; letter-spacing: 7px; }
    .control-panel { padding: 0 10px; gap: 10px; font-size: 0.6rem; }
    .control-panel .btn { padding: 3px 6px; }
  }
</style>
</head>
<body>

<div class="cabinet">
  <div class="marquee">
    <div class="marquee-bulbs">
      <span class="bulb pink"></span><span class="bulb cyan"></span><span class="bulb pink"></span>
      <span class="bulb cyan flicker" style="--d: 0s"></span><span class="bulb pink"></span><span class="bulb cyan"></span>
      <span class="bulb pink"></span><span class="bulb cyan"></span>
      <span class="bulb pink flicker" style="--d: 1.7s"></span><span class="bulb cyan"></span><span class="bulb pink"></span>
      <span class="bulb cyan"></span><span class="bulb pink"></span><span class="bulb cyan"></span>
    </div>
    <span class="marquee-text"><span class="star">▼</span>HELICOPTER<span class="star">▼</span></span>
    <div class="marquee-bulbs bottom">
      <span class="bulb cyan"></span><span class="bulb pink"></span><span class="bulb cyan"></span>
      <span class="bulb pink"></span><span class="bulb cyan"></span><span class="bulb pink"></span>
      <span class="bulb cyan flicker" style="--d: 2.3s"></span>
      <span class="bulb pink"></span><span class="bulb cyan"></span><span class="bulb pink"></span>
      <span class="bulb cyan"></span><span class="bulb pink"></span><span class="bulb cyan"></span>
      <span class="bulb pink"></span>
    </div>
  </div>

  <div class="cabinet-body">
    <div class="side-art">
      <span class="side-label">SUNSET · DRIVE</span>
    </div>
    <div class="screen-bezel">
      <div class="stage">
        <canvas id="game"></canvas>
        <div class="hud">
          <span class="left"><span id="score">DIST 0</span><span id="coins" class="coins">◆ 0</span></span>
          <span class="right"><span id="best">BEST 0</span></span>
        </div>
        <div class="overlay" id="overlay">
          <h1>HELICOPTER</h1>
          <p>HOLD <span class="key">SPACE</span> OR <span class="key">CLICK</span> TO ASCEND</p>
          <p>RELEASE TO FALL · COLLECT <span class="coins" style="color:#ffe75e">◆</span> COINS</p>
          <p style="color:#777;font-size:0.75rem;margin-top:0.8rem;">P PAUSE · M MUTE · R RESTART</p>
          <p style="margin-top:1.2rem;color:#ff70d0;">PRESS ANY KEY TO START</p>
        </div>
        <a class="back" href="/">← back</a>
      </div>
    </div>
    <div class="side-art">
      <span class="side-label">NEON · BAY · 1985</span>
    </div>
  </div>

  <div class="control-panel">
    <span class="stick"></span>
    <span class="btn">ASCEND</span>
    <span class="btn cyan">RELEASE</span>
    <span class="credit">1 CREDIT</span>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const coinsEl = document.getElementById('coins');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');

  let W = 0, H = 0;
  function resize() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.floor(rect.width);
    canvas.height = Math.floor(rect.height);
    W = canvas.width; H = canvas.height;
  }
  window.addEventListener('resize', resize);
  resize();

  // Audio
  let muted = localStorage.getItem('heli-muted') === '1';
  let audioCtx = null, rotorGain = null, rotorOsc = null;
  function ensureAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      rotorOsc = audioCtx.createOscillator();
      rotorOsc.type = 'square'; rotorOsc.frequency.value = 60;
      rotorGain = audioCtx.createGain(); rotorGain.gain.value = 0;
      rotorOsc.connect(rotorGain).connect(audioCtx.destination);
      rotorOsc.start();
    } catch (e) { audioCtx = null; }
  }
  function setRotor(intensity) {
    if (!audioCtx || muted) { if (rotorGain) rotorGain.gain.value = 0; return; }
    rotorGain.gain.linearRampToValueAtTime(0.04 + intensity * 0.06, audioCtx.currentTime + 0.05);
    rotorOsc.frequency.linearRampToValueAtTime(50 + intensity * 30, audioCtx.currentTime + 0.05);
  }
  function playBlip(freq, dur, type, vol) {
    if (!audioCtx || muted) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'sine'; o.frequency.value = freq;
    g.gain.value = vol || 0.1;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  }
  function playCrash() {
    if (!audioCtx || muted) return;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.value = 0.25;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    src.connect(g).connect(audioCtx.destination); src.start();
  }

  const HELI_W = 36, HELI_H = 14;
  const COL_W = 8;
  let cols = [];
  let heli = { x: 0, y: 0, vy: 0 };
  let scroll = 0, dist = 0, coins = 0, best = parseInt(localStorage.getItem('heli-best') || '0', 10);
  let thrusting = false, running = false, dead = false, paused = false;
  let particles = [], pickups = [], popups = [];
  let openingY = 0, openingH = 0;
  let scrollSpeed = 1.8;
  let difficultyTimer = 0;
  let shake = 0;
  let milestoneShown = 0;
  let beatBest = false;
  let bobPhase = 0;
  let warmup = 0;
  let mountains = []; // parallax silhouettes

  function buildMountains() {
    mountains = [];
    // 3 parallax layers
    for (let layer = 0; layer < 3; layer++) {
      const peaks = [];
      const peakCount = 8 + layer * 3;
      for (let i = 0; i < peakCount; i++) {
        peaks.push({
          x: (i / peakCount) * W * 1.5,
          h: 30 + Math.random() * (40 + layer * 10),
        });
      }
      mountains.push({ peaks, scrollFactor: 0.05 + layer * 0.08, color: layer === 0 ? '#1a0040' : layer === 1 ? '#2a0560' : '#3a0980' });
    }
  }

  function reset() {
    cols = [];
    openingY = H * 0.12;
    openingH = H * 0.76;
    const colCount = Math.ceil(W / COL_W) + 8;
    for (let i = 0; i < colCount; i++) cols.push({ top: openingY, bot: openingY + openingH });
    heli.x = W * 0.18; heli.y = H * 0.5; heli.vy = 0;
    scroll = 0; dist = 0; coins = 0;
    dead = false;
    particles = []; pickups = []; popups = [];
    scrollSpeed = 1.8;
    difficultyTimer = 0;
    shake = 0;
    milestoneShown = 0;
    beatBest = false;
    paused = false;
    warmup = 90;
    buildMountains();
    updateHud();
  }

  function updateHud() {
    scoreEl.textContent = 'DIST ' + Math.floor(dist);
    coinsEl.textContent = '◆ ' + coins;
    bestEl.textContent = 'BEST ' + best;
  }

  function start() {
    ensureAudio();
    overlay.classList.add('hidden');
    reset();
    running = true;
    playBlip(440, 0.1, 'square', 0.08);
  }

  function gameOver() {
    dead = true; running = false; paused = false;
    setRotor(0); playCrash(); shake = 22;
    for (let i = 0; i < 36; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 1 + Math.random() * 4;
      const colors = ['#ff39c0', '#00f5ff', '#ffe75e', '#ff8a3a'];
      particles.push({
        x: heli.x, y: heli.y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1,
        life: 50, color: colors[i % colors.length], big: true,
      });
    }
    const finalDist = Math.floor(dist) + coins * 5;
    if (finalDist > best) { best = finalDist; beatBest = true; localStorage.setItem('heli-best', String(best)); }
    bestEl.textContent = 'BEST ' + best;
    overlay.innerHTML = '<h1>CRASHED</h1>' +
      '<p>DISTANCE <span class="key">' + Math.floor(dist) + '</span></p>' +
      '<p>COINS <span class="coins" style="color:#ffe75e">◆ ' + coins + '</span> · BONUS <span class="key">' + (coins * 5) + '</span></p>' +
      '<p>FINAL <span class="key">' + finalDist + '</span></p>' +
      (beatBest ? '<p class="new-best">★ NEW BEST ★</p>' : '<p>BEST <span class="key">' + best + '</span></p>') +
      '<p style="margin-top:1.5rem;color:#ff70d0;">PRESS ANY KEY TO RETRY</p>';
    overlay.classList.remove('hidden');
  }

  function generateColumn(prev) {
    if (warmup > 0) return { top: openingY, bot: openingY + openingH, coin: false };
    difficultyTimer++;
    if (difficultyTimer > 70) {
      difficultyTimer = 0;
      openingH = Math.max(140, openingH - 1.2);
      scrollSpeed = Math.min(5.5, scrollSpeed + 0.04);
    }
    const drift = (Math.random() - 0.5) * 14;
    let y = prev.top + drift;
    const minTop = 30, maxTop = H - openingH - 30;
    if (y < minTop) y = minTop;
    if (y > maxTop) y = maxTop;
    return { top: y, bot: y + openingH, coin: false };
  }

  function maybeSpawnPickup() {
    if (Math.random() < 0.012) {
      const lastCol = cols[cols.length - 1];
      const y = lastCol.top + 30 + Math.random() * (openingH - 60);
      pickups.push({ x: W + 20, y, t: 0, alive: true });
    }
  }

  function spawnTrail() {
    particles.push({
      x: heli.x - 6, y: heli.y + (Math.random() - 0.5) * 4,
      life: 22,
      vx: -1.2 - Math.random() * 1.5,
      vy: (Math.random() - 0.5) * 0.4,
      color: thrusting ? '#ff8a3a' : 'rgba(160,180,255,0.4)',
    });
  }

  function checkMilestone() {
    const m = Math.floor(dist / 100);
    if (m > milestoneShown) {
      milestoneShown = m;
      popups.push({ text: m * 100 + 'M!', x: W / 2, y: H * 0.3, life: 50, vy: -0.6, color: '#00f5ff' });
      playBlip(660 + m * 30, 0.15, 'sine', 0.1);
    }
  }

  function update() {
    bobPhase += 0.06;
    if (!running) {
      if (!dead && cols.length) heli.y = H * 0.5 + Math.sin(bobPhase) * 6;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.big) p.vy += 0.18;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      shake *= 0.85;
      setRotor(0);
      return;
    }
    if (paused) { setRotor(0); return; }

    heli.vy += thrusting ? -0.55 : 0.45;
    heli.vy = Math.max(-7, Math.min(8, heli.vy));
    heli.y += heli.vy;
    if (warmup > 0) warmup--;
    dist += scrollSpeed * 0.1;
    if ((Math.floor(dist * 10) % 3) === 0) updateHud();
    checkMilestone();

    setRotor(thrusting ? 0.9 : 0.4);

    scroll += scrollSpeed;
    while (scroll >= COL_W) {
      scroll -= COL_W;
      const last = cols[cols.length - 1];
      cols.shift();
      cols.push(generateColumn(last));
    }
    maybeSpawnPickup();

    spawnTrail();
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      if (p.big) p.vy += 0.18;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    for (let i = pickups.length - 1; i >= 0; i--) {
      const pk = pickups[i];
      pk.x -= scrollSpeed;
      pk.t += 0.15;
      if (Math.abs(pk.x - heli.x) < 14 && Math.abs(pk.y - heli.y) < 14) {
        coins++;
        playBlip(880, 0.12, 'square', 0.08);
        popups.push({ text: '+1', x: pk.x, y: pk.y, life: 30, vy: -1, color: '#ffe75e' });
        pickups.splice(i, 1);
        updateHud();
        continue;
      }
      if (pk.x < -20) pickups.splice(i, 1);
    }

    for (let i = popups.length - 1; i >= 0; i--) {
      const p = popups[i];
      p.y += p.vy; p.life--;
      if (p.life <= 0) popups.splice(i, 1);
    }

    shake *= 0.88;

    const hx = heli.x, hy = heli.y;
    const colIdx = Math.floor((hx + scroll) / COL_W);
    for (let i = colIdx - 4; i <= colIdx + 4; i++) {
      if (i < 0 || i >= cols.length) continue;
      const cx = i * COL_W - scroll;
      const c = cols[i];
      if (hx + HELI_W * 0.4 > cx && hx - HELI_W * 0.4 < cx + COL_W) {
        if (hy - HELI_H * 0.4 < c.top || hy + HELI_H * 0.4 > c.bot) {
          gameOver();
          return;
        }
      }
    }
  }

  function drawSynthwaveBackground() {
    // sky gradient: deep purple → magenta → orange → cyan grid
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#1a0040');
    sky.addColorStop(0.4, '#5a0e80');
    sky.addColorStop(0.6, '#ff39c0');
    sky.addColorStop(0.7, '#ff8a3a');
    sky.addColorStop(0.72, '#0a0420');
    sky.addColorStop(1, '#0a0420');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // sun on horizon (with horizontal stripes for retro effect)
    const sunCenterX = W * 0.7;
    const sunCenterY = H * 0.7;
    const sunRadius = H * 0.2;
    const sunGrad = ctx.createLinearGradient(0, sunCenterY - sunRadius, 0, sunCenterY + sunRadius);
    sunGrad.addColorStop(0, '#ffe75e');
    sunGrad.addColorStop(0.5, '#ff8a3a');
    sunGrad.addColorStop(1, '#ff39c0');
    ctx.fillStyle = sunGrad;
    ctx.beginPath();
    ctx.arc(sunCenterX, sunCenterY, sunRadius, 0, Math.PI * 2);
    ctx.fill();
    // black stripes across sun (synthwave staple)
    ctx.fillStyle = '#0a0420';
    for (let i = 0; i < 5; i++) {
      const y = sunCenterY + sunRadius * 0.3 + i * 6;
      ctx.fillRect(sunCenterX - sunRadius, y, sunRadius * 2, 2);
    }

    // mountain silhouettes (parallax)
    for (const layer of mountains) {
      ctx.fillStyle = layer.color;
      ctx.beginPath();
      const y0 = H * 0.72;
      ctx.moveTo(0, H);
      const offset = (scroll * layer.scrollFactor) % (W * 1.5);
      for (let i = 0; i < layer.peaks.length; i++) {
        const p = layer.peaks[i];
        const x = (p.x - offset + W * 1.5) % (W * 1.5);
        ctx.lineTo(x - 50, y0);
        ctx.lineTo(x, y0 - p.h);
        ctx.lineTo(x + 50, y0);
      }
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fill();
    }

    // perspective grid floor
    const horizonY = H * 0.72;
    ctx.strokeStyle = 'rgba(0,245,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, horizonY); ctx.lineTo(W, horizonY);
    ctx.stroke();

    const vanishX = W / 2;
    // perspective lines from horizon
    ctx.strokeStyle = 'rgba(255,57,192,0.35)';
    ctx.lineWidth = 1;
    for (let i = -10; i <= 10; i++) {
      const xBottom = vanishX + i * (W / 8);
      ctx.beginPath();
      ctx.moveTo(vanishX, horizonY);
      ctx.lineTo(xBottom, H);
      ctx.stroke();
    }
    // horizontal grid lines (receding)
    const gridScroll = (scroll * 0.5) % 30;
    ctx.strokeStyle = 'rgba(0,245,255,0.4)';
    for (let i = 1; i < 8; i++) {
      const t = i / 8;
      const y = horizonY + (H - horizonY) * (t * t * 1.4) - gridScroll * (t * t * 0.4);
      if (y > horizonY && y < H) {
        ctx.beginPath();
        ctx.moveTo(0, y); ctx.lineTo(W, y);
        ctx.stroke();
      }
    }
  }

  function draw() {
    const sx = (Math.random() - 0.5) * shake;
    const sy = (Math.random() - 0.5) * shake;
    ctx.save();
    ctx.translate(sx, sy);

    drawSynthwaveBackground();

    // walls — top wall magenta gradient, bottom wall cyan gradient
    for (let i = 0; i < cols.length; i++) {
      const cx = i * COL_W - scroll;
      const c = cols[i];
      // top wall
      const topGrad = ctx.createLinearGradient(0, 0, 0, c.top);
      topGrad.addColorStop(0, '#5a0e80');
      topGrad.addColorStop(1, '#ff39c0');
      ctx.fillStyle = topGrad;
      ctx.fillRect(cx, 0, COL_W + 1, c.top);
      // bottom wall
      const botGrad = ctx.createLinearGradient(0, c.bot, 0, H);
      botGrad.addColorStop(0, '#0098a8');
      botGrad.addColorStop(1, '#003040');
      ctx.fillStyle = botGrad;
      ctx.fillRect(cx, c.bot, COL_W + 1, H - c.bot);
      // neon edges
      ctx.fillStyle = '#ff70d0';
      ctx.shadowColor = '#ff39c0';
      ctx.shadowBlur = 6;
      ctx.fillRect(cx, c.top - 1, COL_W + 1, 1);
      ctx.fillStyle = '#00f5ff';
      ctx.shadowColor = '#00f5ff';
      ctx.shadowBlur = 6;
      ctx.fillRect(cx, c.bot, COL_W + 1, 1);
      ctx.shadowBlur = 0;
    }

    // pickups (golden coins)
    for (const pk of pickups) {
      const pulse = 1 + Math.sin(pk.t) * 0.15;
      ctx.save();
      ctx.translate(pk.x, pk.y);
      ctx.rotate(pk.t * 0.5);
      ctx.scale(pulse, pulse);
      ctx.fillStyle = '#ffe75e';
      ctx.shadowColor = '#ffe75e';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.moveTo(0, -7);
      ctx.lineTo(7, 0);
      ctx.lineTo(0, 7);
      ctx.lineTo(-7, 0);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // particles
    for (const p of particles) {
      const alpha = p.big ? p.life / 50 : p.life / 22;
      ctx.fillStyle = p.color || 'rgba(160,180,255,0.6)';
      ctx.globalAlpha = alpha * (p.big ? 1 : 0.7);
      const sz = p.big ? 3 : 2;
      ctx.fillRect(p.x | 0, p.y | 0, sz, sz);
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // chrome heli
    if (!dead) {
      const tilt = Math.max(-0.3, Math.min(0.3, heli.vy * 0.04));
      ctx.save();
      ctx.translate(heli.x, heli.y);
      ctx.rotate(tilt);
      // body — chrome with cyan/pink edge
      const bodyGrad = ctx.createLinearGradient(0, -HELI_H / 2, 0, HELI_H / 2);
      bodyGrad.addColorStop(0, '#ff70d0');
      bodyGrad.addColorStop(0.4, '#ffffff');
      bodyGrad.addColorStop(0.6, '#ffffff');
      bodyGrad.addColorStop(1, '#00f5ff');
      ctx.fillStyle = bodyGrad;
      ctx.fillRect(-HELI_W / 2, -HELI_H / 2, HELI_W - 8, HELI_H);
      // cockpit
      ctx.fillStyle = '#ff39c0';
      ctx.shadowColor = '#ff39c0'; ctx.shadowBlur = 8;
      ctx.fillRect(-HELI_W / 2 + 4, -HELI_H / 2 + 2, 6, 4);
      ctx.shadowBlur = 0;
      // tail
      ctx.fillStyle = '#fff';
      ctx.fillRect(HELI_W / 2 - 10, -2, 12, 4);
      ctx.fillRect(HELI_W / 2 - 2, -1, 4, 2);
      // rotor
      const rotorPhase = (performance.now() / 16) % 8;
      ctx.fillStyle = 'rgba(0,245,255,0.7)';
      ctx.shadowColor = '#00f5ff'; ctx.shadowBlur = 4;
      ctx.fillRect(-HELI_W / 2, -HELI_H / 2 - 4, HELI_W, 1);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-HELI_W / 2 + rotorPhase * 2, -HELI_H / 2 - 5, 6, 2);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // popups
    for (const p of popups) {
      ctx.globalAlpha = Math.min(1, p.life / 30);
      ctx.fillStyle = p.color;
      ctx.font = 'bold 20px "Courier New"';
      ctx.textAlign = 'center';
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      ctx.fillText(p.text, p.x, p.y);
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // pause overlay
    if (paused) {
      ctx.fillStyle = 'rgba(10,2,30,0.7)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ff70d0';
      ctx.font = 'bold 36px "Courier New"';
      ctx.textAlign = 'center';
      ctx.shadowColor = '#ff39c0'; ctx.shadowBlur = 12;
      ctx.fillText('PAUSED', W / 2, H / 2);
      ctx.shadowBlur = 0;
      ctx.font = '14px "Courier New"';
      ctx.fillStyle = '#aaa';
      ctx.fillText('PRESS P TO RESUME', W / 2, H / 2 + 30);
    }

    if (muted) {
      ctx.fillStyle = '#ff39c0';
      ctx.font = '11px "Courier New"';
      ctx.textAlign = 'right';
      ctx.fillText('MUTED', W - 16, H - 16);
    }
    ctx.restore();
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  function togglePause() { if (!running || dead) return; paused = !paused; }
  function toggleMute() {
    muted = !muted;
    localStorage.setItem('heli-muted', muted ? '1' : '0');
    if (muted && rotorGain) rotorGain.gain.value = 0;
  }

  function keydown(e) {
    if (e.key === 'm' || e.key === 'M') { toggleMute(); return; }
    if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
    if (e.key === 'r' || e.key === 'R') { if (running || dead) { reset(); start(); } return; }
    const isThrustKey = e.code === 'Space' || e.key === ' ' || e.key === 'ArrowUp';
    if (!running && !dead) { start(); if (isThrustKey) thrusting = true; return; }
    if (dead) { start(); if (isThrustKey) thrusting = true; return; }
    if (isThrustKey) { e.preventDefault(); thrusting = true; }
  }
  function keyup(e) {
    if (e.code === 'Space' || e.key === ' ' || e.key === 'ArrowUp') thrusting = false;
  }
  function pointerDown(e) {
    if (e.target && e.target.tagName === 'A') return;
    if (!running && !dead) { start(); thrusting = true; return; }
    if (dead) { start(); thrusting = true; return; }
    thrusting = true;
  }
  function pointerUp() { thrusting = false; }

  window.addEventListener('keydown', keydown);
  window.addEventListener('keyup', keyup);
  canvas.addEventListener('mousedown', pointerDown);
  window.addEventListener('mouseup', pointerUp);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); pointerDown(e); }, { passive: false });
  window.addEventListener('touchend', pointerUp);
  overlay.addEventListener('click', e => { if (e.target.tagName === 'A') return; if (!running) start(); });
  document.addEventListener('visibilitychange', () => { if (document.hidden && running && !dead) paused = true; });

  bestEl.textContent = 'BEST ' + best;
  reset();
  running = false;
  loop();
})();
</script>
</body>
</html>
